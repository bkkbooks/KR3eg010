body:
  text: 凡例一是書倣仲景傷寒論作法文尚簡要便於記誦又恐簡則不明一切議論悉以分注注明俾綱舉目張一見瞭然並免後人𡚶注致失本文奧義一是書雖為溫病而設實可羽翼傷寒若真能識得傷寒斷不致疑麻桂之法不可用若真能識得溫病斷不致以辛溫治傷寒之法治溫病傷寒自以仲景為祖參考諸家注述可也溫病當於是書中之辨似處究心焉一晉唐以來諸名家其識見學問工夫未易窺測瑭豈敢輕率毀謗乎奈溫病一症諸賢悉未能透過此關多所彌縫補救皆未得其本真心雖疑慮未敢直斷明確其故皆由不能脫𨚫傷寒論去藍本其心以為推戴仲景不知反晦仲景之法至王安道始能脫𨚫傷寒辨證溫病惜其論之未詳立法未備吳又可力為卸𨚫傷寒單論溫病惜其立論不精立法不純又不可從惟葉天士持論平和立法精細然葉氏吳人所治多南方證又立論甚簡但有醫案散見於雜症之中人多忽之而不深究瑭故厲取諸賢精妙考之內經參以心得為是編之作諸賢如木工鑽眼已至九分瑭特透此一分作圓滿會耳非敢謂高過前賢也至於駁證處不得不下直言恐誤來學禮云事師無犯無隱瑭謹遵之一是書分為五卷首卷歷引經文為綱分注為目原溫病之始卷一為上焦篇凡一切溫病之屬上焦者係之卷二為中焦篇凡溫病之屬中焦者係之卷三為下焦篇凡溫病之屬下焦者係之卷四雜說救逆病後調治俾學者心目瞭然胸有成局不致臨證混淆有治上犯中治中犯下之弊末附一卷專論産後調治與産後驚風小兒急慢驚風痘證緣世醫每於此症惑於邪說隨手殺人毫無依據故也一經謂先夏至為溫病後夏至為病暑可見暑亦溫之類暑自溫而來故將暑溫濕溫並收入溫病論內然治法不能盡與溫病相同故上焦篇內第四條謂溫毒暑溫濕溫不在此例一是書之出實出於不得已因世之醫溫病者毫無尺度人之死於溫病者不可勝紀無論先達後學有能擇其弊竇補其未備瑭將感之如師資之恩一是書原為濟病者之苦醫醫士之病非為獲利而然有能翻版傳播者聽之務望校對真確一傷寒論六經由表入裏由淺及深須橫看本論論三焦由上及下亦由淺入深須竪看與傷寒論為對待文字有一縱一橫之妙學者誠能合二書而細心體察自無難識之證雖不及內傷而萬病診法實不出此一縱一橫之外一方中所定分量宜多宜少不過大概而已尚須臨證者自行斟酌蓋藥必中病而後可病重藥輕見病不愈反生疑惑若病輕藥重傷及無辜又係醫者之大戒夫古人治病胸有定見目無全牛故於攻伐之劑每用多備少服法於調補之劑病輕者日再服重者日三服甚則日三夜一服後人治病多係捉風補影往往病東藥西敗事甚多因拘於約方之說每用藥多者二三錢少則三五分為率遂成痼疾吾見大江南北用甘草必三五分夫甘草之性最為和平有國老之稱坐鎮有餘施為不足設不假之以重權烏能為功即此一端殊屬可笑醫並甘草而不能用尚望其用他藥哉不能用甘草之醫尚足以言醫哉又見北方兒科於小兒痘症自一二朝用大黃日加一二錢甚至三五錢加至十三四朝成數兩之多其勢必咬牙寒戰灰白塌陷猶曰此毒未淨也仍須下之有是理乎經曰大毒治病十衰其六中毒治病十衰其七小毒治病十衰其八無毒治病十衰其九食養盡之勿使過劑醫者全在善測病情宜多宜少胸有確見然後依經訓約之庶無過差也一此書須前後互參往往義詳於前而略於後詳於後而略於前再則法有定而病無定如溫病之不兼濕者忌剛喜柔愈後胃陽不復或因前醫過用苦寒致傷胃陽亦間有少用剛者溫病之兼濕者忌柔喜剛濕退熱存之際烏得不用柔哉全在臨證者善察病情毫無差忒也一是書原為溫病而設如瘧痢疸痺多因暑溫濕溫而成不得不附見數條以粗立規模其詳不及備載以有前人之法可據故不詳論是書所詳論者論前人之未備者也一是書著眼處全在認證無差用藥先後緩急得宜不求識證之真而𡚶議藥之可否不可與言醫也一古人有方即有法故取㩗自如無投不利後世之失一失於測證無方識證不真再失於有方無法本論於各方條下必注明係用內經何法俾學者知先識證而後有治病之法先知有治病之法而後擇用何方有法同而方異者有方似同而法異者稍有不真即不見效不可不詳察也一大匠誨人必以規矩學者亦必以規矩是書有鑒於唐宋以來人自為規而不合乎大中至正之規以致後學宗張者非劉宗朱者非李未識醫道之全體故遠追玉函經補前人之未備尤必詳立規矩使學者有階可升至神明變化出乎規矩之外而仍不離乎規矩之中所謂從心所欲不踰矩是所望於後之達士賢人補其不逮誠不敢自謂盡善又盡美也原病篇一六元正紀大論曰辰戌之歲初之氣民厲溫病卯酉之歲二之氣厲大至民善暴死終之氣其病溫寅申之歲初之氣溫病乃起丑未之歲二之氣溫厲大行遠近咸若子午之歲五之氣其病溫己亥之歲終之氣其病溫厲敘氣運原溫病之始也每歲之溫有早暮微盛不等司天在泉主氣客氣相加臨而然也細考素問注自知茲不多贅按吳又可謂溫病非傷寒溫病多而傷寒少甚通謂非其時而有其氣未免有顧此失彼之誚蓋時和歲稔天氣以寧民氣以和雖當盛之歲亦微至於凶荒兵火之後雖應微之歲亦盛理數自然之道無足怪者二隂陽應象大論曰喜怒不節寒暑過度生乃不固故重隂必陽重陽必隂故曰冬傷於寒春必病溫上節統言司天之病此下專言人受病之故細考宋元以來諸名家皆不知溫病傷寒之辨如龐安常之卒病論朱肱之活人書韓祇和之微旨王實之證治劉守真之傷寒醫鑒傷寒直格張子和之傷寒心鏡等書非以治傷寒之法治溫病即將溫暑認作傷寒而疑麻桂之法不可用遂別立防風通聖雙解通聖九味羌活等湯甚至於辛溫藥中加苦寒王安道溯洄集中辨之最詳茲不再辨論溫病之最詳者莫過張景嶽吳又可喻嘉言三家時醫所宗者三家為多請略陳之按張景嶽喻嘉言皆著講寒字並未理會本文上有故曰二字上文有重隂必陽重陽必隂二句張氏立論出方悉與傷寒混謂溫病即傷寒襲前人之舊全無實得固無足論喻氏立論雖有分析中篇亦混入傷寒少隂厥隂證出方亦不能外辛溫發表辛熱溫裏為害實甚以苦心力學之士尚不免智者千慮之失尚何怪後人之無從取法隨手殺人哉甚矣學問之難也吳又可實能識得寒溫二字所見之證實無取乎辛溫辛熱甘溫又不明伏氣為病之理以為何者為即病之傷寒何者為不即病待春而發之溫病遂直斷溫熱之原非風寒所中不責己之不明反責經言之謬瑭推原三子之偏各自有說張氏混引經文將論傷寒之文引證溫熱以傷寒化熱之後經亦稱熱病故也張氏不能分析遂將溫病認作傷寒喻氏立論開口言春溫當初春之際所見之病多有寒證遂將傷寒認作溫病吳氏當崇禎凶荒兵火之際滿眼溫疫遂直闢經文冬傷於寒春必病溫之文蓋皆各執己見不能融會貫通也瑭按伏氣為病如春溫冬咳溫瘧內經已明言之矣亦有不因伏氣乃司天時令現行之氣如前列六元正紀所云是也此二者皆理數之常者也更有非其時而有其氣如又可所云戾氣間亦有之乃其變也惟在司命者善察其常變而補救之三金匱真言論曰夫精者身之本也故藏於精者春不病溫易曰履霜堅冰至聖人恆示戒於早必謹於微記曰凡事豫則立經曰上工不治已病治未病聖人不治已亂治未亂此一節當與月令參看與上條冬傷於寒互看蓋謂冬傷寒則春病溫惟藏精者足以避之故素問首章上古天真論即言男女隂精之所以生所以長所以枯之理次章緊椄四氣調神大論示人春養生以為夏奉長之地夏養長以為秋奉收之地秋養收以為冬奉藏之地冬養藏以為春奉生之地蓋能藏精者一切病患皆可𨚫豈獨溫病為然哉金匱謂五臟元真通暢人即安和是也何喻氏不明此理將冬傷於寒作一大扇文字將不藏精又作一大扇文字將不藏精而傷於寒又總作一大扇文字勉強割裂傷寒論原文以實之未免有過慮則鑿之弊不藏精三字須活看不專主房勞說一切人事之能搖動其精者皆是即冬日天氣應寒而陽不潛藏如春日之發泄甚至桃李反花之類亦是四熱論篇曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗出勿止溫者暑之漸也先夏至春候也春氣溫陽氣發越隂精不足以承之故為病溫後夏至溫盛為熱熱盛則濕動熱與濕搏而為暑也勿者禁止之詞勿止暑之汗即治暑之法也五刺志論曰氣盛身寒得之傷寒氣虛身熱得之傷暑此傷寒暑之辨也經語分明如此奈何世人悉以治寒法治溫暑哉六生氣通天論曰因於暑汗煩則喘喝靜則多言暑中有火性急而疏泄故令人自汗火與心同氣相求故善煩煩從火從頁謂心氣不寧而面若火爍也煩則喘喝者火剋金故喘郁遏胸中清廓之氣故欲喝而呻之其或邪不外張而內藏於心則靜心主言暑邪在心雖靜亦欲自言不休也七論疾診尺篇曰尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也此節以下診溫病之法經之辨溫病分明如是何世人悉謂傷寒而悉以傷寒足三隂經溫法治之哉張景嶽作類經割裂經文矇混成章由未細心紬繹也尺膚熱脈火爍精也脈盛躁精被火煎沸也脈盛而滑邪機向外也八熱病篇曰熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其隂以補其不足者身熱甚隂陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也熱病七日八日動喘而弦者急刺之汗且自出淺刺手大指間熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之熱病不知所痛耳聾不能自收口乾陽熱甚隂頗有寒者熱在骨髓死不可治熱病已得汗而脈尚躁盛此隂脈之極也死其得汗而脈靜者生熱病者脈尚躁盛而不得汗者此陽脈之極也死陽脈之極雖云死徵較前隂陽俱靜有差此證猶可大劑急急救隂亦有活者蓋已得汗而陽脈躁甚邪強正弱正尚能與邪爭若留得一分正氣便有一分生理只在留之得法耳至隂陽俱靜邪氣深入下焦隂分正無捍邪之意直聽邪之所為不死何待脈盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗大出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也太陽之脈色榮顴骨熱病也與厥隂脈爭見者死期不過三日少陽之脈色榮頰前熱病也與少隂脈爭見者死期不過三日此節歷敘熱病之死徵以禁人之刺蓋刺則必死也然刺固不可亦間有可藥而愈者蓋刺法能泄能通開熱邪之閉結最速至於益隂以留陽實刺法之所短而湯藥之所長也熱病三日而氣口靜人迎躁者邪機尚淺在上焦故取之諸陽以泄其陽邪陽氣通則汗隨之實其隂以補其不足者陽盛則隂衰瀉陽則隂得安其位故曰實其隂瀉陽之有餘即所以補隂之不足故曰補其不足也實其隂以補其不足此一句實治溫熱之吃緊大綱蓋熱病未有不耗隂者其耗之未盡則生盡則陽無留戀必脫而死也真能體味此理思過半矣此論中治法實從此處入手身熱甚而脈之隂陽皆靜脈證不應陽證隂脈故曰勿刺熱病七八日動喘而弦喘為肺氣實弦為風火鼓蕩故淺刺手大指間以泄肺氣肺之熱痺開則汗出大指間肺之少商穴也熱證七八日脈微小者邪氣深入下焦血分逼血從小便出故溲血腎精告竭隂液不得上潮故口中乾脈至微小不惟隂精竭陽氣亦從而竭矣死象自明倘脈實者可治法詳於後熱病已得汗脈尚躁而喘故知其復熱也熱不為汗衰火熱剋金故喘金受火克肺之化源欲絶故死間有可治法詳於後熱病不知所痛正衰不與邪爭也耳聾隂傷精欲脫也不能自收真氣憊也口乾熱甚陽邪獨盛也隂頗有寒此寒字作虛字講謂下焦隂分頗有虛寒之證以隂精虧損之人真氣敗散之象已見而邪熱不退未有不乘其空虛而入者故曰熱在骨髓死不治也其有隂衰陽盛而真氣未至潰敗者猶有治法詳見於後熱病已得汗而脈尚躁盛此隂虛之極故曰死然雖不可刺猶可以藥沃之得法亦有生者法詳於後脈躁盛不得汗此陽盛之極也陽盛而至於極隂無容留之地故亦曰死然用藥開之得法猶可生法詳於後汗不出而顴赤邪盛不得解也噦脾隂病也隂陽齊病治陽礙隂治隂礙陽故曰死也泄而腹滿甚脾隂病重也亦系隂陽皆病目不明精散而氣脫也經曰精散視岐又曰氣脫者目不明熱猶未已仍鑠其精而傷其氣不死得乎老人嬰兒一則孤陽已衰一則稚陽未足既得溫熱之陽病又加腹滿之隂病不必至於滿甚而已有死道焉汗不出為邪陽盛嘔為正陽衰下血者熱邪深入不得外出必逼迫隂絡之血下注亦為隂陽兩傷也舌本爛腎脈膽脈心脈皆循喉嚨系舌本陽邪深入則一隂一陽之火結於血分腎水不得上濟熱退猶可生熱仍不止故曰死也咳而衄邪閉肺絡上行清道汗出邪泄可生不然則化源絶矣髓熱者邪入至深至於腎部也熱而痙邪入至深至於肝部也以上九條雖皆不可刺後文亦間立治法亦有可生者太陽之脈色榮顴骨為熱病者按手太陽之脈由目內眥斜絡於顴而與足太陽交是顴者兩太陽交處也太陽屬水水受火沸故色榮赤為熱病也與厥隂脈爭見厥隂木也水受火之反克金不來生木反生火水無容足之地故死速也少陽之脈色榮頰前為熱病者按手少陽之脈出耳前過客主人前足少陽穴交頰至目鋭眥而交足少陽是頰前兩少陽交處也少陽屬相火火色現於二經交會之處故為熱病也與少隂脈爭見少隂屬君火二火相熾水難為受故亦不出三日而死也九評熱病論帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名隂陽交交者死也人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪𨚫而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者邪氣勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也此節語意自明經謂必死之證誰敢謂生然藥之得法有可生之理前所謂針藥各異用也詳見後十刺熱篇曰肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛日死刺足厥隂少陽其逆則頭痛員員脈引沖頭也肝病小便先黃者肝脈絡隂器又肝主疏泄肝病則失其疏泄之職故小便先黃也腹痛多臥木病克脾土也熱爭邪熱甚而與正氣相爭也狂言及驚手厥隂心包病也兩厥隂同氣熱爭則手厥隂亦病也脅滿痛肝脈行身之兩旁脅其要路也手足躁不得安臥肝主風風淫四末又木病剋土脾主四肢木病熱必吸少隂腎中真隂隂傷故騷擾不得安臥也庚辛金日剋木故甚甲乙肝木旺時故汗出而愈氣逆謂病重而不順其可愈之理故逢其不勝之日而死也刺足厥隂少陽厥隂系本臟少陽厥隂之腑也並刺之者病在臟瀉其腑也逆則頭痛以下肝主升病極而上升之故自庚辛日甚以下之理餘臟仿此十一心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少隂太陽心病先不樂者心包名膻中居心下代君用事經謂膻中為臣使之官喜樂出焉心病故不樂也卒心痛凡實痛皆邪正相爭熱爭故卒然心痛也煩悶心主火故煩膻中氣不舒故悶嘔肝病也兩厥隂同氣膻中代心受病故熱甚而爭之後肝病亦見也且邪居膈上多善嘔也頭痛火升也面赤火色也無汗汗為心液心病故汗不得通也十二脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太隂陽明脾病頭先重者脾屬濕土性重經謂濕之中人也首如裹故脾病頭先重也頰少陽部也土之與木此負則彼勝土病而木病亦見也煩心脾脈注心也顏青欲嘔亦木病也腰痛不可用俯仰腰為腎之府脾主制水腎為司水之神脾病不能制水故腰痛再脾病胃不能獨治陽明主約束而利機關故痛而至於不可用俯仰也腹滿泄脾經本病也頷痛亦木病也十三肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太隂陽明出血如大豆立已肺病先惡風寒者肺主氣又主皮毛肺病則氣賁郁不得捍衛皮毛也舌上黃者肺氣不化則濕熱聚而為黃苔也按苔字方書悉作胎胎乃胎包之胎特以苔生舌上故從肉旁不知古人借用之字甚多蓋濕熱蒸而生苔或黃或白或青或黑皆因病之深淺或寒或熱或燥或濕而然如春夏間石上土阪之隂面生苔者然故本論苔字悉從草不從肉喘氣鬱極也咳火剋金也胸膺背之府也皆天氣主之肺主天氣肺氣鬱極故痛走胸膺背也走者不定之詞不得太息氣鬱之極也頭痛不堪亦天氣賁郁之極也汗出而寒毛竅開故汗出汗出衛虛故惡寒又肺本惡寒也十四腎熱病者先腰痛胻酸苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少隂太陽腎病腰先痛者腰為腎之府又腎脈貫脊會於督之長強穴胻腎脈入跟中以上腨內太陽之脈亦下貫腨內即腨也酸熱爍液也苦渴數飲腎主五液而惡燥病熱則液傷而燥故苦渴而飲水求救也項太陽之脈從巔入絡腦還出別下項腎病至於熱爭臟病甚而移之腑故項痛而強也胻寒且酸胻義見上寒熱極為寒也酸熱爍液也足下熱腎脈從小指之下斜趨足心湧泉穴病甚而熱也不欲言心主言腎病則水剋火也員員淡淡狀其痛之甚而無奈也十五肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病此節言五臟欲病之先必各現端緒於其部分示人早治以免熱爭則病重也十六熱論篇帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰治遺奈何岐伯曰視其虛實調其逆從可使必已也帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也此節言熱病之禁也語意自明大抵邪之著人也每借有質以為依附熱時斷不可食熱退必須少食如兵家堅壁清野之計必俟熱邪盡退而後可大食也十七刺法論帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者岐伯曰不相染者正氣存內邪不可干此言避疫之道按此下尚有避其毒氣若干言以其想青氣想白氣等近於祝由家言恐後人附會之詞故節之要亦不能外正氣存內邪不可干二句之理語意已盡不必滋後學之惑也十八玉板論要曰病溫虛甚死病溫之人精血虛甚則無隂以勝溫熱故死十九平人氣象論曰人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痺呼吸俱三動是六七至脈矣而氣象又急躁若尺部肌肉熱則為病溫蓋溫病必傷金水二臟之津液尺之脈屬腎尺之穴屬肺也此處肌肉熱故知為病溫其不熱而脈兼滑者則為病風風之傷人也陽光受之尺為隂故不熱也如脈動躁而兼澀是氣有餘而血不足病則為痺矣
