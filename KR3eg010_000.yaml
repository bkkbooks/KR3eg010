front:
  text: 問心堂溫病條辨原序夫立德立功立言聖賢事也瑭何人斯敢以自任緣瑭十九歲時父病年餘至於不起瑭愧恨難名哀痛欲絶以為父病不知醫尚復何顏立天地間遂購方書伏讀於苫塊之餘至張長沙外逐榮勢內忘身命之論因慨然棄舉子業專事方術越四載猶子巧官病溫初起喉痺外科吹以冰硼散喉遂閉又遍延諸時醫治之大抵不越雙解散人參敗毒散之外其於溫病治法茫乎未之聞也後至發黃而死瑭以初學未敢𡚶贊一詞然於是證亦未得其要領蓋張長沙悲宗族之死作玉函經為後世醫學之祖奈玉函中之卒病論亡於兵火後世學者無從倣效遂至各起異說得不償失又越三載來遊京師檢校四庫全書得明季吳又可溫疫論觀其議論宏闊實有發前人所未發遂專心學步焉細察其法亦不免支離駁雜大抵功過兩不相掩蓋用心良苦而學術未精也又遍考晉唐以來諸賢議論非不珠璧琳琅求一美備者蓋不可得其何以傳信於來兹瑭進與病謀退與心謀十閲春秋然後有得然未敢輕治一人癸丑歲都下溫疫大行諸友強起瑭治之大抵已成壞病幸存活數十人其死於世俗之手者不可勝數嗚呼生民何辜不死於病而死於醫是有醫不若無醫也學醫不精不若不學醫也因有志採輯歷代名賢著述去其駁雜取其精微間附己意以及考驗合成一書名曰溫病條辨然未敢輕易落筆又歷六年至於戊午吾鄉汪瑟庵先生促瑭曰來歲己未濕土正化二氣中溫厲大行子盍速成是書或者有益於民生乎瑭愧不敏未敢自信恐以救人之心獲欺人之罪轉相倣效至於無窮罪何自贖哉然是書不出其得失終未可見因不揣固陋黽勉成章就正海內名賢指其疵謬歷為駁正將萬世賴之無窮期也淮隂吳瑭自序
