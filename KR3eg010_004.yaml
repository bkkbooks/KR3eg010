body:
  text: 卷四雜說汗論汗也者合陽氣隂精蒸化而出者也內經云人之汗以天地之雨名之葢汗之為物以陽氣為運用以隂精為材料隂精有餘陽氣不足則汗不能自出不出則死陽氣有餘隂精不足多能自出再發則痙痙亦死或熏灼而不出不出亦死也其有隂精有餘陽氣不足又為寒邪肅殺之氣所摶不能自出者必用辛温味薄急走之藥以運用其陽氣仲景之治傷寒是也傷寒一書始終以救陽氣為主其有陽氣有餘隂精不足又為温熱升發之氣所鑠而汗自出或不出者必用辛涼以止其自出之汗用甘涼甘潤培養其隂精為材料以為正汗之地本論之治温熱是也本論始終以救隂精為主此傷寒所以不可不發汗温熱病斷不可發汗之大較也唐宋以來多昧於此是以人各著一傷寒書而病温熱者之禍及矣嗚呼天道歟抑人事歟方中行先生或問六氣論原文云或問天有六氣風寒暑濕燥火風寒暑濕經皆揭病出條例以立論而不揭燥火燥火無病可論乎曰素問言春傷於風夏傷於暑秋傷於濕冬傷於寒者葢以四氣之在四時各有專令故皆專病也燥火無專令故不專病而寄病於百病之中猶土無正位而寄王於四時辰戌丑未之末不揭者無病無燥火也愚按此論牽強臆斷不足取信葢信經太過則鑿之病也春風夏火長夏濕土秋燥冬寒此所謂播五行於四時也經言先夏至為病温即火之謂夏傷於暑指長夏中央土而言也秋傷於濕指初秋而言乃上令濕土之氣流行未盡葢天之行令每微於令之初而盛於令之末至正秋傷燥想代遠年湮脫簡故耳喻氏補之誠是但不當硬改經文已詳論於下焦寒濕第四十七條中今乃以土寄王四時比燥火則謬甚矣夫寄王者濕土也豈燥火哉以先生之高明而於六氣乃昧昧焉亦千慮之失矣傷寒注論仲祖傷寒論誠為金科玉律奈註解甚難葢代遠年湮中間不無脫簡又為後人妄增斷不能起仲景於九原而問之何條在先何條在後何處尚有若干文字何處系後人偽增惟有闕疑闕殆擇其可信者而從之不可信者而考之已爾創斯注者則有林氏成氏大抵隨文順解不能透發精義然創始實難不為無功有明中行方先生實能苦心力索暢所欲言溯本探微闡幽發秘雖未能處處合拍而大端已具喻氏起而作尚論補其闕略發其所未發以誠仲景之功臣也然除𨚫心解數處其大端亦從方論中來不應力詆方氏北海林先生刻方氏前條辨附刻尚論篇歷數喻氏僭竊之罪條分而暢評之喻氏之後又有高氏注尚論發明亦有心得可取處其大端暗竊方氏明尊喻氏而又力詆喻氏如喻氏之於方氏也北平劉覺庵先生起而證之亦如林北海之證尚論者然公道自在人心也其他如鄭氏程氏之後條辨無足取者明眼人自識之舒馳遠之集註一以喻氏為主兼引程郊倩之後條辨雜以及門之論斷若不知有方氏之前條辨者遂以喻氏竊方氏之論直謂為喻氏書矣此外有沈目南注張隱菴集註程云來集註皆可閱至慈溪柯韻伯注傷寒論著來蘇集聰明才辨不無發明可供採擇然其自序中謂大青龍一證方喻之注大錯目之曰鄭聲曰楊墨及取三注對勘虛中切理而細繹之柯注謂風有隂陽汗出脈緩之桂枝證是中鼓動之陽風汗不出脈緊煩躁之大青龍證是中凜冽之隂風試問中鼓動之陽風者而主以桂枝辛甘温法置內經風淫於內治以辛涼佐以苦甘之正法於何地仲景自序云撰用素問九卷反背素問而立法耶且以中鼓動之陽風者主以甘温之桂枝中凜冽之隂風者反主以寒涼之石膏有是理乎其注煩躁又曰熱淫於內則心神煩擾風淫於內故手足躁亂方先生原注風為煩寒則躁既曰凜冽隂風又曰熱淫於內有是理乎種種矛盾不可枚舉方氏立風傷衛寒傷營風寒兩傷營衛吾不敢謂即仲景之本來面目然欲使後學眉目清楚不為無見如柯氏之所序亦未必即仲景之心法而高於方氏也其刪改原文處多逞臆說不若方氏之純正矣且方氏創通大義其功不可沒也喻氏高氏柯氏三子之於方氏補偏救弊其卓識妙悟不無可取而獨惡其自高己見各立門戶務掩前人之善耳後之學者其各以明道濟世為急毋以爭名競勝為心民生幸甚風論內經曰風為百病之長又曰風者善行而數變夫風何以為百病之長乎大易曰元者善之長也葢冬至四十五日以後夜半少陽起而立春於立春前十五日交大寒節而厥隂風木行令所以疏泄一年之陽氣以布德行仁生養萬物者也故王者功德既成以後制禮作樂舞八俏而宣八風所謂四時和八風理而民不夭折風非害人者也人之腠理密而精氣足者豈以是而病哉而不然者則病斯起矣以天地生生之具反為人受害之物恩極大而害亦廣矣葢風之體不一而風之用有殊春風自下而上夏風橫行空中秋風自上而下冬風刮地而行其方位也則有四正四隅此方位之合於四時八節也立春起艮方從東北隅而來名之曰條風八節各隨其方而起常理也如立春起坤方謂之衝風又謂之虛邪賊風為其乘月建之虛則其變也春初之風則夾寒水之母氣春末之風則帶火熱之子氣夏初之風則木氣未盡而炎火漸生長夏之風則挾暑氣濕氣木氣未為木庫大雨而後暴涼則挾寒水之氣久晴不雨以其近秋也而先行燥氣是長夏之風無所不兼而人則無所不病矣初秋則挾濕氣季秋則兼寒水之氣所以報冬氣也初冬猶兼燥金之氣正冬則寒水本令而季冬又報來春風木之氣紙鳶起矣再由五運六氣而推大運如甲己之歲其風多兼濕氣一年六氣中客氣所加何氣則風亦兼其氣而行令焉然則五運六氣非風不行風也者六氣之帥也諸病之領袖也故曰百病之長也其數變也奈何如夏日早南風少移時則由西而北而東方南風之時則晴而熱由北而東則雨而寒矣四時皆有早暮之變不若夏日之數而易見耳夫夏日曰長曰化以盛萬物也而病亦因之而盛隂符所謂害生於恩也無論四時之風皆帶涼氣者木以水為母也轉化轉熱者木生火也且其體無微不入其用無處不有學者誠能體察風之體用而於六淫之病思過半矣前人多守定一桂枝以為治風之祖方下此則以羌防柴葛為治風之要藥皆未體風之情與內經之精義者也桂枝湯在傷寒書內所治之風風兼寒者也治風之變法也若風之不兼寒者則從內經風淫於內治以辛涼佐以苦甘治風之正法也以辛涼為正而甘温為變者何風者木也辛涼者金氣金能制木故也風轉化轉熱辛涼苦甘則化涼氣也醫書亦有經子史集論儒書有經子史集醫書亦有經子史集靈樞素問神農本經難經傷寒論金匱玉函經為醫門之經而諸家注論治驗類案本草方書等則醫之子史集也經細而子史集粗經純而子史集雜理固然也學者必不可不尊經不尊經則學無根柢或流於異端然尊經太過死於句下則為賢者過之孟子所謂盡信書則不如無書也不肖者不知有經仲景先師所謂各承家技終始順舊省疾問病務在口給相對斯須便處湯藥自漢時而已然矣遑問後世此道之所以常不明而常不行也本論起銀翹散論本論第一方用桂枝湯者以初春余寒之氣未消雖曰風温系少陽之氣少陽緊承厥隂厥隂根乎寒水初起惡寒之證尚多故仍以桂枝為首猶時文之領上文來脈也本論方法之始實始於銀翹散吳按六氣播於四時常理也診病者要知夏日亦有寒病冬日亦為温病次年春夏尚有上年伏暑錯綜變化不可枚舉全在測證的確本論凡例內云除傷寒宗仲景法外俾四時雜感朗若列眉後世學者察證之時若眞知確見其為傷寒無論何時自當仍宗仲景若眞知六氣中為何氣非傷寒者則於本論中求之上焦篇辨傷寒温暑疑似之間最詳本論粗具規模論本論以前人信經太過經謂熱病者傷寒之類也又以傷寒論為方法之祖故前人遂於傷寒法中求温熱中行且犯此病混六氣於一傷寒論中治法悉用辛温其明者亦自覺不合而未能自立模範瑭哀道之不明人之不得其死不自揣度而作是書非與人爭名亦毫無求勝前賢之私心也至其序論採錄處粗陳大略未能細詳如暑證中之大順散冷香飲子漿水散之類俱未收錄一以前人已有不必屋上架屋一以卷帙紛繁作者既苦日力無多觀者反畏繁而不覽是以本論不過粗具三焦六淫之大槪規模而已惟望後之賢者進而求之引而伸之斯遇者之大幸耳寒疫論世多言寒疫者究其病狀則憎寒壯熱頭痛骨節煩疼雖發熱而不甚渴時行則里巷之中病俱相類若役使者然非若温病之不甚頭痛骨痛而渴甚故名曰寒疫耳葢六氣寒水司天在泉或五運寒水太過之歲或六氣中加臨之客氣為寒水不論四時或有是證其未化熱而惡寒之時則用辛温解肌既化熱之後如風温證者則用辛涼清熱無二理也偽病名論病有一定之名近有古無今有之偽名葢因俗人不識本病之名而偽造者因而亂治以致誤人性命如滯下腸澼便下膿血古有之矣今則反名曰痢疾葢利者滑利之義古稱自利者皆泄瀉通利太過之證也滯者淤澀不通之象二義正相反矣然治法尚無大疵謬也至婦人隂挺隂蝕隂癢隂菌等證古有明文大抵多因於肝經鬱結濕熱下注浸淫而成近日北人名之曰𤺏歷考古文並無是字焉有是病而治法則用一種惡劣婦人以針刺之或用細勾勾之利刀割之十割九死哀哉其或間有一二刀傷不重去血不多病本輕微者得愈則恣索重謝試思前隂乃腎之部肝經蟠結之地衝任督三脈由此而分走前後豈可肆用刀勾之所甚則肝鬱脅痛經閉寒熱等證而亦名之曰𤺏無形可割則以大針針之在婦人猶可藉口曰婦人隱疾以婦人治之甚至數歲之男孩痔瘡疝瘕疳疾外感之遺邪總而名之曰𤺏而針之割之更屬可惡在庸俗鄉愚信而用之猶可說也竟有讀書明理之文人而亦為之蠱惑不亦怪哉又如暑月中惡腹痛若霍亂而不得吐瀉煩悶欲死隂凝之痞證也治以苦辛芳熱則愈成霍亂則輕論在中焦寒濕門中乃今世相傳謂之痧證又有絞腸瘀烏痧之名遂至方書中亦有此等名目矣俗治以錢刮關節使血氣一分一合數分數合而陽氣行行則通通則痞開痛減而愈但愈後周十二時不可飲水飲水得隂氣之凝則留邪在絡遇寒或怒動厥隂則不時舉發發則必刮痧也是則痧固偽名刮痧乃通陽之法雖流俗之治頗能救急猶可也但禁水甚難最易留邪無奈近日以刮痧之法刮温病夫温病陽邪也亂則通陽太急隂液立見消亡雖後來醫治得法百無一生吾新見有痙而死者有癢不可忍而死者庸俗之習牢不可破豈不哀哉此外偽名妄治頗多茲特舉其尤者耳若時醫隨口捏造偽名南北皆有不勝指屈矣嗚呼名不正必害於事學者可不察乎温病起手太隂論四時温病多似傷寒傷寒起足太陽今謂温病起手太隂何以手太隂亦主外感乎手太隂之見證何以大略似足太陽乎手足有上下之分隂陽有反正之義庸可混乎素問平人氣象論曰臟眞高於肺以行營衛隂陽也傷寒論中分營分衛言隂言陽以外感初起必由衛而營由陽而隂足太陽如人家大門由外以統內主營衛隂陽手太隂為華葢三才之天由上以統下亦由外以包內亦主營衛隂陽故大略相同也大雖同而細終異異者何如太陽之竅主出太隂之竅兼主出入太陽之竅開於下太隂之竅開於上之類學者須於同中求異異中驗同同異互參眞詮自見燥氣論前三焦篇所序之燥氣皆言化熱傷津之證治以辛甘微涼金必剋木木受克則子為母復仇火來勝復矣未及寒化葢燥氣寒化乃燥氣之正素問謂陽明所至為清勁是也素問又謂燥急而澤土為金母水為金子也本論多類及於寒濕伏暑門中如腹痛嘔吐之類經謂燥淫所勝民病善嘔心脅痛不能轉側者是也治以苦温內經治燥之正法也前人有六氣之中惟燥不為病之說葢以燥統於寒吳氏素問注云寒統燥濕暑統風火故云寒暑六入也而近於寒凡是燥病只以為寒而不知其為燥也合六氣而觀之余俱主生獨燥主殺豈不為病者乎細讀素問自知再前三篇原為温病而設而類及於暑温濕温其於伏暑濕温門中尤必三致意者葢以秋日濕踞於內新涼燥氣加於外燥濕兼至最難界限清楚稍不確當其敗壞不可勝言經謂粗工治病濕證未已燥證復起葢謂此也濕有兼熱兼寒暑有兼風兼燥燥有寒化熱化先將暑濕燥分開再將寒熱辨明自有準的外感總數論天以六氣生萬物其錯綜變化無形之妙用愚者未易窺測而人之受病即從此而來近人止知六氣太過曰六淫之邪內經亦未窮極其變夫六氣傷人豈界限清楚毫無兼氣也哉以六乘六葢三十六病也夫天地大道之數無不始於一而成於三如一三為三三三如九九九八十一而黃鐘始備六氣為病必再以三十六數乘三十六得一千二百九十六條而外感之數始窮此中猶不兼內傷若兼內傷則靡可紀極矣嗚呼近人凡見外感主以一柴葛解肌湯豈不謬哉治病法論治外感如將兵貴神速機圓法活去邪務盡善後務細葢早平一日則人少受一日之害治內傷如相坐鎮從容神機默運無功可言無德可見而人登壽域治上焦如羽非輕不舉治中焦如衡非平不安治下焦如權非重不沉吳又可温病禁黃連論唐宋以來治温熱病者初用辛温發表見病不為藥衰則恣用苦寒大隊芩連知柏愈服愈燥河間且犯此弊葢苦先入心其化以燥燥氣化火反見齒板黑舌短黑唇裂黑之象火極而似水也吳又可非之誠是但又不識苦寒化燥之理以為黃連守而不走大黃走而不守夫黃連不可輕用大黃與黃連同一苦寒藥迅利於黃連百倍反可輕用哉余用普濟消毒飲於温病初起必去芩連畏其入里而犯中下焦也於應用芩連方內必大隊甘寒以監之但令清熱化隂不令化燥如陽亢不寐火腑不通等證於酒客便溏頻數者則重用之濕温門則不惟不忌芩連仍重賴之葢欲其化燥也語云藥用當而通神醫者之於藥何好何惡惟當之是求風温温熱氣復論仲景謂腰以上腫當發汗腰以下腫當利小便葢指濕家風水皮水之腫而言又謂無水虛腫當發其汗葢指陽氣閉結而隂不虛者言也若温熱大傷隂氣之後由隂精損及陽氣愈後陽氣暴復隂尚虧歉之至豈可發汗利小便哉吳又可於氣復條下謂血乃氣之依歸氣先血而生無所依歸故暫浮腫但靜養節飲食自愈余見世人每遇浮腫便於淡滲利小便方法豈不畏津液消亡而成三消證快利津液為肺癰肺痿證與隂虛咳嗽身熱之勞損證哉余治是證悉用復脈湯重加甘草只補其未足之隂以配其已復之陽而腫自消千治千得無少差謬敢以告後之治温熱氣復者暑温濕温不在此例治血論人之血即天地之水也在卦為坎坎為血卦治水者不求之水之所以治而但曰治水吾未見其能治也葢善治水者不治水而治氣坎之上下兩隂爻水也坎之中陽氣也其原分自乾之中陽乾之上下兩陽臣與民也乾之中陽在上為君在下為師天下有君師各行其道於天下而彝倫不敘者乎天下有彝倫攸敘而水不治者乎此洪範所以歸本皇極而與禹貢相為表裡者也故善治血者不求之有形之血而求之無形之氣葢陽能統隂隂不能統陽氣能生血血不能生氣至於治之之法上焦之血責之肺氣或心氣中焦之血責之胃氣或脾氣下焦之血責之肝氣腎氣八脈之氣治水與血之法間亦有用通者開支河也有用塞者崇堤防也然皆已病之後不得不與治其末而非未病之先專治其本之道也九竅論人身九竅上竅七下竅二上竅為陽下竅為隂盡人而知之也其中隂陽奇偶生成之妙諦內經未言茲特補而論之陽竅反用偶隂竅反用奇上竅統為陽耳目視聽其氣清為陽鼻嗅口食其氣濁則隂也耳聽無形之聲為上竅陽中之至陽中虛而形縱兩開相離甚遠目視有形之色為上竅陽中之隂中實而橫兩開相離較近鼻嗅無形之氣為上竅隂中之陽虛而形縱雖亦兩竅外則仍統於一口食有形之五味為上竅隂中之隂中又虛又實有出有納而形橫外雖一竅而中仍二合上竅觀之陽者偏隂者正土居中位也陽者縱隂者橫縱走氣而橫走血血隂而氣陽也雖曰七竅實則八也陽竅外陽七數而內隂八數外奇而內偶陽生於七成於八也生數陽也成數隂也陽竅用成數七八成數也下竅能生化之前隂隂中之陽也外雖一竅而內實二陽竅用偶也後隂但主出濁為隂中之至隂內外皆一而已隂竅用奇也合下竅觀之雖曰二竅暗則三也隂竅外隂二數而內陽三數外偶而內奇隂竅用生數二三生數也上竅明七陽也暗八隂也下竅明二隂也暗三陽也合上下竅而論之明九暗十一十一者一也九為老一為少老成而少生也九為陽數之終一為陽數之始始終上下一陽氣之循環也開竅者運陽氣也妙諦無窮一互字而已但互中之互最為難識余嘗嘆曰修身者是字難格致者互字難形體論內經之論形體頭足腹背經絡臟腑詳矣而獨未總論夫形體之大綱不揣鄙陋補之人之形體頂天立地端直以長不偏不倚木之象也在天為元在五常為仁是天以仁付之人也故使其體直而麟鳳龜龍之屬莫與焉孔子曰人之生也直罔之生也幸而免蘧筱戚施直之對也程子謂生理本直味本字之義葢言天以本直之理生此端直之形人自當行公直之行也人之形體無鱗介毛羽謂之倮蟲倮者土也土主信是地以信付之人也人之受天之仁受地之信備健順五常之德而有精神魂魄心意志思智慮以行孝悌忠信以期不負天地付畀之重自別麟鳳龜龍之屬故孟子曰萬物皆備於我矣又曰惟聖人然後可以踐形孝經曰天地之道人為貴人可不識人之形體以為生哉醫可不識人之形體以為治哉
