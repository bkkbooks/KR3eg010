body:
  text: 卷三下焦篇風温温熱温疫温毒冬温一風温温熱温疫温毒冬温邪在陽明久羈或已下或未下身熱面赤口乾舌燥甚則齒黑唇裂脈沉實者仍可下之脈虛大手足心熱甚於手足背者加減復脈湯主之温邪久羈中焦陽明陽土未有不克少隂癸水者或已下而隂傷或未下而隂竭若實證居多正氣未至潰敗脈來沉實有力尚可假手於一下即傷寒論中急下以存津液之謂若中無結糞邪熱少而虛熱多其人脈必虛手足心主裡其熱必甚於手足背之主表也若再下其熱是竭其津而速之死也故以復脈湯復其津液隂復則陽留庶可不至於死也去參桂薑棗之補陽加白芍收三隂之隂故云加減復脈湯在仲景當日治傷於寒者之結代自有取於參桂薑棗復脈中之陽今治傷於温者之陽亢隂竭不得再補其陽也用古法而不拘用古方醫者之化裁也二温病誤表津液被劫心中震震舌強神昏宜復脈法復其津液舌上津回則生汗自出中無所主者救逆湯主之誤表動陽心氣傷則心震心液傷則舌蹇故宜復脈其津液也若傷之太甚隂陽有脫離之象復脈亦不勝任則非救逆不可三温病耳聾病系少隂與柴胡湯者必死六七日以後宜復脈輩復其精温病無三陽經證𨚫有陽明腑證中焦篇已申明腑證之由矣三隂臟證葢臟者藏也藏精者也温病最善傷精三隂實當其衝如陽明結則脾隂傷而不行脾胃臟腑切近相連夫累及妻理固然也有急下以存津液一法土實則水虛浸假而累及少隂矣耳聾不臥等證是也水虛則木強浸假而累及厥隂矣目閉痙厥等證是也此由上及下由陽入隂之道路學者不可不知按温病耳聾靈素稱其必死豈少陽耳聾競至於死耶經謂腎開竅於耳脫精者耳聾葢初則陽火上閉隂精不得上承清竅不通繼則陽亢隂竭若再以小柴胡湯直升少陽其勢必至下竭上厥不死何待何時醫悉以陶氏六書統治四時一切疾病而不究心於靈素難經也哉瑭於温病六七日以外壯火少減隂火內熾耳聾者悉以復隂得效曰宜復脈輩者不過立法如此臨時對證加減盡善是所望於當其任者四勞倦內傷復感温病六七日以外不解者宜復脈法此兩感治法也甘能益氣凡甘皆補故宜復脈服二三帖後身不熱而倦甚仍加人參五温病已汗而不得汗已下而熱不退六七日以外脈尚躁盛者重與復脈湯已與發汗而不得汗已與通里而熱不除其為汗下不當可知脈尚躁盛邪固不為藥衰正氣亦尚能與邪氣分爭故須重與復脈扶正以敵邪正勝則生矣六温病誤用升散脈結代甚則脈兩至者重與復脈雖有他證後治之此留人治病法也即仲景裡急急當救里之義七汗下後口燥咽乾神倦欲眠舌赤苔老與復脈湯在中焦下後與益胃湯復胃中津液以邪氣未曾深入下焦若口燥咽乾乃少隂之液無以上供神昏欲眠有少隂但欲寐之象故與復脈八熱邪深入或在少隂或在厥隂均宜復脈此言復脈為熱邪劫隂之總司也葢少隂藏精厥隂必待少隂精足而後能生二經均可主以復脈者乙癸同源也加減復脈湯方甘潤存津法炙甘草六錢乾地黃六錢按地黃三種用法生地者鮮地黃未曬乾者也可入藥煮用可取汁用其性甘涼上中焦用以退熱存津乾地黃者乃生地曬乾已為丙火煉過去其寒涼之性本草稱其甘平熟地制以酒與砂仁九蒸九曬而成是又以丙火丁火合煉之也故其性甘温奈何今人悉以乾地黃為生地北人並不知世有生地僉謂乾地黃為生地而曰寒涼指鹿為馬不可不辨生白芍六錢麥冬不去心五錢阿膠三錢麻仁三錢按柯韻伯謂舊傳麻仁者誤當系棗仁彼從心悸動三字中看出傳寫之誤不為無見今治温熱有取於麻仁甘益氣潤去燥故仍從麻仁水八杯煮取八分三杯分三次服劇者加甘草至一兩地黃白芍八錢麥冬七錢日三夜一服救逆湯方鎮攝法即於加減復脈湯內去麻仁加生龍骨四錢生牡蠣八錢煎如復脈法脈虛大欲散者加人參二錢九下後大便溏甚周十二時三四行脈仍數者未可與復脈湯一甲煎主之服一二日大便不溏者可與一甲復脈湯下後法當數日不大便今反溏而頻數非其人眞陽素虛即下之不得其道有亡隂之慮若以復脈滑潤是以存隂之品反為瀉隂之用故以牡蠣一味單用則力大即能存隂又澀大便且清在裡之餘熱一物而三用之一甲煎鹹寒兼澀法生牡蠣二兩碾細水八杯煮取三杯分温三服一甲復脈湯方即於加減復脈湯內去麻仁加牡蠣一兩十下焦温病但大便溏者即與一甲復脈湯温病深入下焦劫隂必以救隂為急務然救隂之藥多滑潤但見大便溏不必待日三四行即以一甲復脈法復隂之中預防泄隂之弊十一少隂温病眞隂欲竭壯火復熾心中煩不得臥者黃連阿膠湯主之按前復脈法為邪少虛多之治其有隂既虧而實邪正盛甘草即不合拍心中煩隂邪挾心陽獨亢於上心體之隂無容留之地故煩雜無奈不得臥陽亢不入於隂隂虛不受陽納雖欲臥得乎此證隂陽各自為道不相交互去死不遠故以黃芩從黃連外瀉壯火而內堅眞隂以芍藥從阿膠內護眞隂而外捍亢陽名黃連阿膠湯者取一剛以御外侮一柔以護內主之義也其交關變化神明不測之妙全在一雞子黃前人訓雞子黃僉謂雞為巽木得心之母氣色赤入心虛則補母而已理雖至當殆未盡其妙葢雞子黃有地球之象為血肉有情生生不已乃奠安中焦之聖品有甘草之功能而靈於甘草其正中有孔故能上通心氣下達腎氣居中以達兩頭有蓮子之妙用其性和平能使亢者不爭弱者得振其氣焦臭故上補心其味甘鹹故下補腎再釋家有地水風火之喻此證大風一起蕩然無餘雞子黃鎮定中焦通徹上下合阿膠能預熄內風之震動也然不知人身隂陽相抱之義必未能識仲景用雞子黃之妙謹將人身隂陽生死寤寐圖形開列於後以便學者入道有階也黃連阿膠湯方苦甘鹹寒法黃連四錢黃芩一錢阿膠三錢白芍一錢雞子黃二枚水八杯先煮三物取三杯去滓納膠烊盡再納雞子黃攪令相得日三服十二夜熱早涼熱退無汗熱自隂來者青蒿鱉甲湯主之夜行隂分而熱日行陽分而涼邪氣深伏隂分可知熱退無汗邪不出表而仍歸隂分更可知矣故曰熱自隂分而來非上中焦之陽熱也邪氣深伏隂分混處氣血之中不能純用養隂又非壯火更不得任用苦燥故以鱉甲蠕動之物入肝經至隂之分既能養隂又能入絡搜邪以青蒿芳香透絡從少陽領邪外出細生地清隂絡之熱丹皮瀉血中之伏火知母者知病之母也佐鱉甲青蒿而成搜剔之功焉再此方有先入後出之妙青蒿不能直入隂分有鱉甲領之入也鱉甲不能獨出陽分有青蒿領之出也青蒿鱉甲湯方辛涼合甘寒法青蒿二錢鱉甲五錢細生地四錢知母二錢丹皮三錢水五杯煮取二杯日再服十三熱邪深入下焦脈沉數舌乾齒黑手指但覺蠕動急防痙厥二甲復脈湯主之此示人痙厥之漸也温病七八日以後熱深不解口中津液乾涸但覺手指掣動即當防其痙厥不必俟其已厥而後治也故以復脈育隂加入介屬潛陽使隂陽交紐庶厥不可作也二甲復脈湯方鹹寒甘潤法即於加減復脈湯內加生牡蠣五錢生鱉甲八錢十四下焦温病熱深厥甚脈細促心中憺憺大動甚則心中痛者三甲復脈湯主之前二甲復脈防痙厥之漸即痙厥已作亦可以二甲復脈止厥茲又加龜板名三甲者以心中大動甚則痛而然也心中動者火以水為體肝風鴟張立刻有吸盡西江之勢腎水本虛不能濟肝而後發痙既痙而水難猝補心之本體欲失故憺憺然而大動也甚則痛者隂維為病主心痛此證熱久傷隂八脈麗於肝腎肝腎虛而累及隂維故心痛非如寒氣客於心胸之心痛可用温通故以鎮腎氣補任脈通隂維之龜板止心痛合入肝搜邪之二甲相濟成功也三甲復脈湯方同二甲湯法即於二甲復脈湯內加生龜板一兩十五既厥且噦俗名呃忒脈細而勁小定風珠主之温邪久踞下焦爍肝液為厥擾衝脈為噦脈隂陽俱減則細肝木橫強則勁故以雞子黃實土而定內風龜板補任謂任脈而鎮衝脈阿膠沉降補液而熄肝風淡菜生一鹹水之中而能淡外偶內奇有坎卦之象能補隂中之眞陽其形翁闔故又能潛眞陽之上動童便以濁液仍歸濁道用以為使也名定風珠者以雞子黃宛如珠形得巽木之精而能熄肝風肝為巽木巽為風也龜亦有珠具眞武之德而鎮震木震為雷在人為膽雷動未有無風者雷靜而風亦靜矣亢陽直上巔頂龍上於天也制龍者龜也古者豢龍御龍之法失傳已久其大要不出乎此小定風珠方甘寒咸法雞子黃生用一枚眞阿膠二錢生龜板六錢童便一杯淡菜三錢水五杯先煮龜板淡菜得二杯去滓入阿膠上火烊化納雞子黃攪令相得再衝童便頓服之十六熱邪久羈吸爍眞隂或因誤表或因妄攻神倦瘛瘲脈氣虛弱舌絳苔少時時欲脫者大定風珠主之此邪氣已去八九眞隂僅存一二之治也觀脈虛苔少可知故以大隊濃濁填隂塞隙介屬潛陽鎮定以雞子黃一味從足太隂下安足三隂上濟手三隂使上下交合隂得安其位斯陽可立根基俾隂陽有眷屬一家之義庶可不致絕脫歟大定風珠方酸甘鹹法生白芍六錢阿膠三錢生龜板四錢乾地黃六錢麻仁二錢五味子二錢生牡蠣四錢麥冬連心六錢炙甘草四錢雞子黃生二枚鱉甲生四錢水八杯煮取三杯去滓再入雞子黃攪令相得分三次服喘加人參自汗者加龍骨人參小麥悸者加茯神人參小麥十七壯火尚盛者不得用定風珠復脈邪少虛多者不得用黃連阿膠湯隂虛欲痙者不得用青蒿鱉甲湯此諸方之禁也前數方雖皆為存隂退熱而設其中有以補隂之品為退熱之用者有一面補隂一面搜邪者有一面填隂一面護陽者各宜心領神會不可混也十八痙厥神昏舌短煩躁手少隂證未罷者先與牛黃紫雪輩開竅搜邪再與復脈湯存隂三甲潛陽臨證細參勿致倒亂痙厥神昏舌蹇煩躁統而言之為厥隂證然有手經足經之分在上焦以清邪為主清邪之後必繼以存隂在下焦以存隂為主存隂之先若邪尚有餘必先以搜邪手少隂證未罷如寸脈大口氣重顴赤白睛赤熱壯之類十九邪氣久羈肌膚甲錯或因下後邪欲潰或因存隂得液蒸汗正氣已虛不能即出隂陽互爭而戰者欲作戰汗也復脈湯熱飲之虛盛者加人參肌肉尚盛者但令靜勿妄動也按傷寒汗解必在下前温病多在下後縛解而後得汗誠有如吳又可所云者凡欲汗者必當先煩乃有汗而解若正虛邪重或邪已深入下焦得下后里通或因津液枯燥服存隂藥液增欲汗邪正努力紛爭則作戰汗戰之得汗則生汗不得出則死此係生死關頭在頃刻之間戰者陽極而似隂也肌膚業已甲錯其津液之枯燥固不待言故以復脈加人參助其一臂之力送汗出表若其人肌膚尚厚未至火虛者無取復脈之助正但當聽其自然勿事騷擾可耳次日再議補隂未遲二十時欲漱口不欲咽大便黑而易者有瘀血也犀角地黃湯主之邪在血分不欲飲水熱邪燥液口乾又欲求救於水故但欲漱口不欲咽也瘀血溢於腸間血色久瘀則黑血性柔潤故大便黑而易也犀角味鹹入下焦血分以清熱地黃去積聚而補隂白芍去惡血生新血丹皮瀉血中伏火此蓄血自得下行故用此輕劑以調之也犀角地黃湯方甘鹹微苦法乾地黃一兩生白芍三錢丹皮三錢犀角三錢水五杯煮取二杯分二次服渣再煮一杯服二十一少腹堅滿小便自利夜熱晝涼大便閉脈沉實者蓄血也桃仁承氣湯主之甚則抵當湯少腹堅滿法當小便不利今反自利則非膀胱氣閉可知夜熱者隂熱也晝涼者邪氣隱伏隂分也大便閉者血分結也故以桃仁承氣通血分之閉結也若閉結太甚桃仁承氣不得行則非抵當不可然不可輕用不得不備一法耳桃仁承氣湯方苦辛鹹寒法大黃五錢芒硝二錢桃仁三錢當歸三錢芍藥三錢丹皮三錢水八杯煮取三杯先服一杯得下止後服不知再服抵當湯方飛走攻絡苦鹹法大黃五錢虻蟲炙乾為末二十枚桃仁五錢水蛭炙乾為末五分水八杯煮取三杯先服一杯得下止後服不知再服二十二温病脈法當數今反不數而濡小者熱撤裡虛也裡虛下利稀水或便膿血者桃花湯主之温病之脈本數因用清熱藥撤其熱熱撤裡虛脈見濡小下焦空虛則寒即不下利亦當温補況又下利稀水膿血乎故用少隂自利關閘不藏堵截陽明法桃花湯方甘温兼澀法赤石脂一兩半整用煎半為細末調炮姜五錢白粳米二合水八杯煮取三杯去渣入石脂末一錢五分分三次服若一服愈余勿服虛甚者加人參二十三温病七八日以後脈虛數舌絳苔少下利日數十行完穀不化身雖熱者桃花粥主之上條以脈不數而濡小下利稀水定其為虛寒而用温澀此條脈雖數而日下數十行至於完穀不化其里邪已為泄瀉下行殆盡完穀不化脾陽下陷火滅之象脈雖數而虛苔化而少身雖餘熱未退亦虛熱也純系關閘不藏見證補之稍緩則脫故改桃花湯為粥取其逗留中焦之意此條認定完穀不化四字要緊桃花粥方甘温兼澀法人參三錢炙甘草三錢赤石脂六錢細末白粳米二合水十杯先煮參草得六杯去渣再入粳米煮得三杯納石脂末三錢頓服之利不止再服第二杯如上法利止停後服或先因過用寒涼脈不數身不熱者加乾薑三錢邪熱不殺穀亦有完穀一證不可不慎當於脈之虛實併兼現之證辨之二十四温病少隂下利咽痛胸滿心煩者豬膚湯主之此傷寒論原文按温病熱入少隂逼液下走自利咽痛亦復不少故採錄於此柯氏云少隂下利下焦虛矣少隂脈循喉嚨其支者出絡心注胸中咽痛胸滿心煩者腎火不藏循經而上走於陽分也陽並於上隂並於下火不下交於腎水不上承於心此未濟之象豬為水畜而津液在膚用其膚以除上浮之虛火佐白蜜白粉之甘瀉心潤肺而和脾滋化源培母氣水升火降上熱自除而下利自止矣豬膚湯方甘潤法豬膚一斤用白皮從內刮去肥令如紙薄上一味以水一斗煮取五升去渣加白蜜一升白米粉五合熬香和令相得二十五温病少隂咽痛者可與甘草湯不瘥者與桔梗湯柯氏云但咽痛而無下利胸滿心煩等證但甘以緩之足矣不瘥者配以桔梗辛以散之也其熱微故用此輕劑耳甘草湯方甘緩法甘草二兩上一味以水三升煮取一升半去渣分温再服桔梗湯方苦辛甘升提法甘草二兩桔梗二兩法同前二十六温病入少隂嘔而咽中傷生瘡不能語聲不出者苦酒湯主之王氏晉三云苦酒湯治少隂水虧不能上濟君火而咽生瘡聲不出者瘡者疳也半夏之辛滑佐以雞子清之甘潤有利竅通聲之功無燥津涸液之慮然半夏之功能全賴苦酒攝入隂分劫涎斂瘡即隂火沸騰亦可因苦酒而降矣故以為名苦酒湯方酸甘微辛法半夏制二錢雞子一枚去黃納上苦酒雞子殼中上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去渣少少含咽之不瘥更作三劑二十七婦女温病經水適來脈數耳聾乾嘔煩渴辛涼退熱兼清血分甚至十數日不解邪陷發痙者竹葉玉女煎主之此與兩感證同法辛涼解肌兼清血分者所以補上中焦之未備甚至十數日不解邪陷發痙外熱未除裡熱又急故以玉女煎加竹葉兩清表裡之熱竹葉玉女煎方辛涼合甘寒微苦法生石膏六錢乾地黃四錢麥冬四錢知母二錢牛膝二錢竹葉三錢水八杯先煮石膏地黃得五杯再入餘四味煮成二杯先服一杯候六時復之病解停後服不解再服上焦用玉女煎去牛膝者以牛膝為下焦藥不得引邪深入也茲在下焦故仍用之二十八熱入血室醫與兩清氣血邪去其半脈數餘邪不解者護陽和隂湯主之此係承上條而言之也大凡體質素虛之人驅邪及半必兼護養元氣仍佐清邪故以參甘護元陽而以白芍麥冬生地和隂清邪也護陽和隂湯方甘涼甘温復法偏於甘涼即復脈湯法也白芍五錢炙甘草二錢人參二錢麥冬連心炒二錢乾地黃炒三錢水五杯煮取二杯分二次温服二十九熱入血室邪去八九右脈虛數暮微寒熱者加減復脈湯仍用參主之此熱入血室之邪少虛多亦以復脈為主法脈右虛數是邪不獨在血分故仍用參以補氣暮微寒熱不可認作邪實乃氣血俱虛營衛不和之故加減復脈湯仍用參方即於前復脈湯內加人參三錢三十熱病經水適至十餘日不解舌萎飲冷心煩熱神氣忽清忽亂脈右長左沉瘀熱在裡也加減桃仁承氣湯主之前條十數日不解用玉女煎者以氣分之邪尚多故用氣血兩解此條以脈左沉不與右之長同而神氣忽亂定其為蓄血故以逐血分瘀熱為急務也加減桃仁承氣湯方苦辛走絡法大黃制三錢桃仁炒三錢細生地六錢丹皮四錢澤蘭二錢人中白二錢水八杯煮取三杯先服一杯候六時得下黑血下後神清渴減止後服不知漸進按邵新甫云考熱入血室金匱有五法第一條主小柴胡因寒熱而用雖經水適斷急提少陽之邪勿令下陷為最第二條傷寒發熱經水適來已現晝明夜劇譫語見鬼恐人認陽明實證故有無犯胃氣及上二焦之戒第三條中風寒熱經水適來七八日脈遲身涼胸脅滿如結胸狀譫語者顯無表證全露熱入血室之候自當急刺期門使人知針力比藥力尤捷第四條陽明病下血譫語但頭汗出亦為熱入血室亦刺期門汗出而愈第五條明其一證而有別因為害如痰潮上脘昏冒不知當先化其痰後除其熱仲景教人當知變通故不厭推廣其義乃今人一遇是證不辨熱入之輕重血室之盈虧遽與小柴胡湯貽害必多要之熱甚而血瘀者與桃仁承氣及山甲歸尾之屬血舍空而熱者用犀角地黃湯加丹參木通之屬表邪未盡而表證仍兼者不妨借温通為使血結胸有桂枝紅花湯參入海蛤桃仁之治昏狂甚進牛黃膏調入清氣化結之煎再觀葉案中有兩解氣血燔蒸之玉女煎法熱甚隂傷有育隂養氣之復脈法又有護隂滌熱之緩攻法先聖後賢其治條分縷析學者審證定方慎毋拘乎柴胡一法也三十一温病愈後嗽稀痰而不咳徹夜不寐者半夏湯主之此中焦陽氣素虛之人偶感温病醫以辛涼甘寒或苦寒清温熱不知十衰七八之戒用藥過劑以致中焦反停寒飲令胃不和故不寐也素問云胃不和則臥不安飲以半夏湯覆杯則寐葢陽氣下交於隂則寐胃居中焦為陽氣下交之道路中寒飲聚致命陽氣欲下交而無路可循故不寐也半夏逐痰飲而和胃秫米秉燥金之氣而成故能補陽明燥氣之不及而滲其飲飲退則胃和寐可立至故曰覆杯則寐也半夏湯辛甘淡法半夏制八錢秫米二兩即俗所謂高糧是也古人謂之稷今或名為蘆稷如南方難得則以薏仁代之水八杯煮取三杯分三次温服三十二飲退則寐舌滑食不進者半夏桂枝湯主之此以胃腑雖和營衛不和陽未卒復故以前半夏湯合桂枝湯調其營衛和其中陽自能食也半夏桂枝湯方辛温甘淡法半夏六錢秫米一兩白芍六錢桂枝四錢雖云桂枝湯𨚫用小建中湯法桂枝少於白芍者表裡異治也炙甘草一錢生薑三錢大棗去核二枚水八杯煮取三杯分温三服三十三温病解後脈遲身涼如水冷汗自出者桂枝湯主之此亦陽氣素虛之體質熱邪甫退即露陽虛故以桂枝湯復其陽也桂枝湯方見上焦篇但此處用桂枝分量與芍藥等不必多於芍藥也亦不必啜粥再令汗出即仲景以桂枝湯小和之法是也三十四温病愈後面色萎黃舌淡不欲飲水脈遲而弦不食者小建中湯主之此亦陽虛之質也故以小建中小小建其中焦之陽氣中陽復則能食能食則諸陽皆可復也小建中湯方甘温法白芍酒炒六錢桂枝四錢甘草炙三錢生薑三錢大棗去核二枚膠飴五錢水八杯煮取三杯去渣入膠飴上火烊化分温三服三十五温病愈後或一月至一年面微赤脈數暮熱常思飲不欲食者五汁飲主之牛乳飲亦主之病後肌膚枯燥小便溺管痛或微燥咳或不思食皆胃隂虛也與益胃五汁輩前復脈等湯復下焦之隂此由中焦胃用之隂不降胃體之陽獨亢故以甘潤法救胃用配胃體則自然欲食斷不可與俗套開胃健食之辛燥藥致令燥咳成癆也五汁飲牛乳飲方並見前秋燥門益胃湯見中焦篇按吳又可云病後與其調理不善莫若靜以待動是不知要領之言也夫病後調理較易於治病豈有能治病反不能調理之理乎但病後調理不輕於治病若其治病之初未曾犯逆處處得法輕者三五日而解重者七八日而解解後無餘邪病者未受大傷原可不必以藥調理但以飲食調理足矣經所謂食養盡之是也若病之始受既重醫者又有誤表誤攻誤燥誤涼之弊遺殃於病者之氣血將見外感變而為內傷矣全賴醫者善補其過謂未犯他醫之逆或其人陽素虛隂素虧或前因邪氣太盛故劑不得不重或本虛邪不能張須隨清隨補之類而補人之過謂已犯前醫之治逆退殺氣謂餘邪或藥傷迎生氣或養胃隂或護胃陽或填腎隂或兼固腎陽以迎其先後天之生氣活人於萬全豈得聽之而已哉萬一變生不測推委於病者之家能不愧於心乎至調理大要温病後一以養隂為主飲食之堅硬濃厚者不可驟進間有陽氣素虛之體質熱病一退即露舊虧又不可固執養隂之說而滅其陽火故本論中焦篇列益胃增液清燥等湯下焦篇列復脈三甲五汁等復隂之法乃熱病調理之常理也下焦篇又列建中半夏桂枝數法以為陽氣素虛或誤傷涼藥之用乃其變也經所謂有者求之無者求之微者責之盛者責之全賴司其任者心誠求之也暑温伏暑三十六暑邪深入少隂消渴者連梅湯主之入厥隂麻痺者連梅湯主之心熱煩躁神迷甚者先與紫雪丹再與連梅湯腎主五液而惡燥暑先入心助心火獨亢於上腎液不供故消渴也再心與腎均為少隂主火暑為火邪以火從火二火相搏水難為濟不消渴得乎以黃連瀉壯火使不爍津以烏梅之酸以生津合黃連酸苦為隂以色黑沉降之阿膠救腎水麥冬生地合烏梅酸甘化隂庶消渴可止也肝主筋而受液於腎熱邪傷隂筋經無所秉受故麻痺也再包絡與肝均為厥隂主風木暑先入心包絡代受風火相搏不麻痺得乎以黃連瀉剋水之火以烏梅得木氣之先補肝之正阿膠增液而熄肝風冬地補水以柔木庶麻痺可止也心熱煩躁神迷甚先與紫雪丹者開暑邪之出路俾梅連有入路也連梅湯方酸甘化隂酸苦泄熱法云連二錢烏梅去核三錢麥冬連心三錢生地三錢阿膠二錢水五杯煮取二杯分二次服脈虛大而芤者加人參三十七暑邪深入厥隂舌灰消渴心下板實嘔惡吐蛔寒熱下利血水甚至聲音不出上下格拒者椒梅湯主之此土敗木乘正虛邪熾最危之候故以酸苦泄熱輔正驅邪立法據理制方冀其轉關耳椒梅湯方酸苦復辛甘法即仲景烏梅丸法也方義已見中焦篇黃連二錢黃芩二錢乾薑二錢白芍生三錢川椒炒黑三錢烏梅去核三錢人參二錢枳實一錢五分半夏二錢水八杯煮取三杯分三次服三十八暑邪誤治胃口傷殘延及中下氣塞填胸燥亂口渴邪結內踞清濁交混者來復丹主之此正氣誤傷於藥邪氣得以竊據於中固結而不可解攻補難施之危證勉立旋轉清濁一法耳來復丹方酸温法太隂元精石一兩舶上硫黃一兩硝石一兩同硫黃為末微火炒結砂子大桔紅二錢青皮去白二錢五靈脂二錢澄去砂炒令煙盡方論晉三王氏云易言一陽來復於下在人則為少陽生氣所出之臟病上盛下虛則陽氣去生氣竭此丹能復陽於下故曰來復元精石乃鹽滷至隂之精硫黃乃純陽石火之精寒熱相配隂陽互濟有扶危拯逆之功硝石化硫為水亦可佐元硫以降逆靈脂引經入肝最速能引石性內走厥隂外達少陽以交隂陽之樞紐使以桔紅青皮者納氣必先利氣用以為肝膽之嚮導也三十九暑邪久熱寢不安食不甘神識不清隂液元氣兩傷者三才湯主之凡熱病久入下焦消爍眞隂必以復隂為主其或元氣亦傷又必兼護其陽三才湯兩復隂陽而偏於復隂為多者也温熱温疫未傳邪退八九之際亦有用處暑温未傳亦有用復脈三甲黃連阿膠等湯之處彼此互參勿得偏執葢暑温不列於諸温之內而另立一門者以後夏至為病暑濕氣大動不兼濕不得名暑温仍歸温熱門矣既兼濕則受病之初自不得與諸温同法若病至未傳濕邪已化惟餘熱傷之際其大略多與諸温同法其不同者前後數條已另立法矣三才湯方甘涼法人參三錢天冬二錢乾地黃五錢水五杯濃煎兩杯分二次温服欲復隂者加麥冬五味子欲復陽者加茯苓炙甘草四十蓄血熱入血室與温熱同法四十一伏暑濕温脅痛或咳或不咳無寒但潮熱或竟寒熱如瘧狀不可誤認柴胡證香附旋覆花湯主之久不解者間用控涎丹按伏暑濕温積留支飲懸於脅下而成脅痛之證甚多即金匱水在肝而用十棗之證彼因里水久積非峻敗不可此因時令之邪與里水新搏其根不固不必用十棗之太峻只以香附旋覆善通肝絡而逐脅下之飲蘇子杏仁降肺氣而化飲所謂建金以平木廣皮半夏消痰飲之正茯苓薏仁開太陽而闔陽明所謂治水者必實土中流漲者開支河之法也用之得當不過三五日自愈其或前醫不識病因不合治法致使水無出路久居脅下恐成懸飲內痛之證為患非輕雖不必用十棗之峻然不能出其範圍故改用陳無擇之控涎丹緩攻其飲香附旋覆花湯方苦辛淡合芳香開絡法生香附三錢旋覆花絹包三錢蘇子霜三錢廣皮二錢半夏五錢茯苓塊三錢薏仁五錢水八杯煮取三杯分三次温服腹滿者加厚朴痛甚者加降香末控涎丹方苦寒從治法痰飲隂病也以苦寒治隂病所謂求其屬以衰之是也按腎經以臟而言屬水其味鹹其氣寒以經而言屬少隂主火其味苦其氣化燥熱腎主水故苦寒為水之屬不獨鹹寒為水之屬也葢眞陽藏之於腎故腎與心並稱少隂而並主火也知此理則知用苦寒鹹寒之法矣瀉火之有餘用苦寒寒能制火苦從火化正治之中亦有從治瀉水之太過亦用苦寒寒從水氣苦從火味從治之中亦有正治所謂水火各造其偏之極皆相似也苦鹹寒治火之有餘水之不足為正治亦有治水之有餘火之不足者如介屬芒硝並能行水水行則火復乃從治也甘遂去心制大戟去皮製白芥子上等分為細末神麯糊為丸梧子大每服九丸薑湯下壯者加之羸者減之以知為度寒濕四十二濕之為物也在天之陽時為雨露隂時為霜雪在山為泉在川為水包含於土中者為濕其在人身也上焦與肺合中焦與脾合其流於下焦也與少隂癸水合此統舉濕在天地人身之大綱異出同源以明土為雜氣水為天一所生無處不合者也上焦與肺合者肺主太隂濕土之氣肺病濕則氣不得化有霜霧之象向之火制金者今反水剋火矣故肺病而心亦病也觀素問寒水司天之年則曰陽氣不令濕土司天之年則曰陽光不治自知故上焦一以開肺氣救心陽為治中焦與脾合者脾主濕土之質為受濕之區故中焦濕證最多肺與胃為夫妻脾病而胃不能獨治再胃之臟象為土土惡濕也故開溝渠運中陽崇剛土作堤防之治悉載中焦上中不治其勢必流於下焦易曰水流濕素問曰濕傷於下下焦乃少隂癸水濕之質即水也焉得不與腎水相合吾見濕流下焦邪水旺一分正水反虧一分正愈虧而邪愈旺不可為矣夫腎之眞水生於一陽坎中滿也故治少隂之濕一以護腎陽使火能生土為主腎與膀胱為夫妻泄膀胱之積水從下治亦所以安腎中眞陽也脾為腎之上游升脾陽從上治亦所以使水不沒腎中眞陽也其病厥隂也奈何葢水能生木水太過木反不生木無生氣自失其疏泄之任經有風濕交爭風不勝濕之文可知濕土太過則風木亦有不勝之時故治厥隂之濕以復其風木之本性使能疏泄為主也本論原以温熱為主而類及於四時雜感以宋元以來不明仲景傷寒一書專為傷寒而設乃以傷寒一書應四時無窮之變殊不合拍遂至人著一書而悉以傷寒名書陶氏則以一人而屢著傷寒書且多立妄誕不經名色使後世學者如行昏霧之中渺不自覺其身之墜於淵也今臚列四時雜感春温夏熱長夏暑濕秋燥冬寒得其要領效如反掌夫春温夏熱秋燥所傷皆隂液也學者苟能時時預護處處堤防豈復有精竭人亡之慮傷寒所傷者陽氣也學者誠能保護得法自無寒化熱而傷隂水負火而難救之虞即使有受傷處臨證者知何者當護陽何者當救隂何者當先護陽何者當先救隂因端竟委可備知終始而超道妙之神瑭所以三致意者乃在濕温一證葢土為雜氣寄旺四時藏垢納汙無所不受其間錯綜變化不可枚舉其在上焦也如傷寒其在下焦也如內傷其在中焦也或如外感或如內傷至人之受病也亦有外感亦有內傷使學者心搖目眩無從捉摸其變證也則有濕痺水氣咳嗽痰飲黃汗黃癉腫脹瘧疾痢疾淋症帶症便血疝氣痔瘡癰膿等證較之風火燥寒四門之中倍而又倍苟非條分縷析體貼入微未有不張冠李戴者四十三濕久不治伏足少隂舌白身痛足跗浮腫鹿附湯主之濕伏少隂故以鹿茸補督脈之陽督脈根於少隂所謂八脈麗於肝腎也督脈總督諸陽此陽一升則諸陽聽令附子補腎中眞陽通行十二經佐之以菟絲憑空行氣而升發少隂則身痛可休獨以一味草果温太隂獨勝之寒以醒脾陽則地氣上蒸天氣之白苔可除且草果子也凡子皆達下焦以茯苓淡滲佐附子開膀胱小便得利而跗腫可愈矣鹿附湯方苦辛鹹法鹿茸五錢附子三錢草果一錢菟絲子三錢茯苓五錢水五杯煮取二杯日再服渣再煮一杯服四十四濕久脾陽消乏腎陽亦憊者安腎湯主之凡腎陽憊者必補督脈故以鹿茸為君附子韭子等補腎中眞陽但以苓術二味滲濕而補脾陽釜底增薪法也其曰安腎者腎以陽為體體立而用安矣安腎湯方辛甘温法鹿茸三錢胡蘆巴三錢補骨脂三錢韭子一錢大茴香二錢附子二錢茅朮二錢茯苓三錢菟絲子三錢水八杯煮取三杯分三次服大便溏者加赤石脂久病惡湯者可用貳拾分作丸四十五濕久傷陽痿弱不振肢體麻痺痔瘡下血朮附姜苓湯主之按痔瘡有寒濕熱濕之分下血亦有寒濕熱濕之分本論不及備載但載寒濕痔瘡下者以世醫但知有熱濕痔瘡下血悉以槐花地榆從事並不知有寒濕之因畏薑附如虎故因下焦寒濕而類及之方則兩補脾腎兩陽也朮附姜苓湯方辛温苦淡法生白朮五錢附子三錢乾薑三錢茯苓五錢水五杯煮取二杯日再服四十六先便後血小腸寒濕黃土湯主之此因上條而類及以補偏救弊也義見前條注下前方純用剛者此方則以剛藥健脾而滲濕柔藥保肝腎之隂而補喪失之血剛柔相濟又立一法以開學者門徑後世黑地黃丸法葢仿諸此黃土湯方甘苦合用剛柔互濟法甘草三兩乾地黃三兩白朮三兩附子炮三兩阿膠三兩黃芩三兩灶中黃土半斤水八升煮取二升分温二服分量服法悉錄古方未敢增減用者自行斟酌可也四十七秋濕內伏冬寒外加脈緊無汗惡寒身病喘咳稀痰胸滿舌白滑惡水不欲飲甚則倚息不得臥腹中微脹小青龍湯主之脈數有汗小青龍去麻辛主之大汗出者倍桂枝減乾薑加麻黃根此條以經有秋傷於濕冬生咳嗽之明文故補三焦飲症數則略示門徑按經謂秋傷於濕者以長夏濕土之氣介在夏秋之間七月大火西流月建申申者陽氣畢伸也濕無陽氣不發陽伸之極濕發亦重人感此而至冬日寒水司令濕水同體相搏而病矣喻氏擅改經文謂濕曰燥者不明六氣運行之道如大寒冬令也厥隂氣至而紙鳶起矣四月夏令也古謂首夏猶清和俗謂四月為麥秀寒均謂時雖夏令風木之氣猶未盡滅也他令仿此至於濕土寄旺四時雖在冬令朱子謂將大雨雪必先微温葢微温則陽氣通陽通則濕行濕行而雪勢成矣況秋日竟無濕氣乎此其間有說焉經所言之秋指中秋以前而言秋之前半截也喻氏所指之秋指秋分以後而言秋之後半截也古脫燥論葢世遠年湮殘缺脫簡耳喻氏補論誠是但不應擅改經文竟崇己說而不體之日月運行寒暑倚伏之理與氣也喻氏學問誠高特霸氣未消其温病論亦犯此病學者遇咳嗽之證兼合脈色以詳察其何因為濕為燥為風為火為隂虛為陽弱為前候伏氣為現行時令為外感而發動內傷為內傷而招引外感歷歷分明或當用温用涼用補用瀉或寓補於瀉或寓瀉於補擇用先師何法何方妙手空空毫無成見因物付物自無差忒矣即如此症以喘咳痰稀不欲飲水胸滿腹脹舌白定其為伏濕痰飲所致以脈緊無汗為遇寒而發故用仲景先師辛温甘酸之小青龍外發寒而內蠲飲龍行而火隨故寒可去龍動而水行故飲可蠲以自汗脈數此因飲邪上衝肺氣之數不可認為火數為遇風而發不可再行誤汗傷陽使飲無畏忌故去湯中之麻黃細辛發太陽少隂之表者倍桂枝以安其表汗甚則以麻黃根收表疏之汗夫根有歸束之義麻黃能行太陽之表即以其根歸束太陽之氣也大汗出減乾薑者畏其辛而致汗也有汗去麻辛不去乾薑者乾薑根而中實色黃而園土象也土性緩不比麻黃干而中空色青而直木象也木性急乾薑豈性緩藥哉較之麻黃為緩耳且乾薑得丙火煅煉而成能守中陽麻黃則純行衛陽故其剽急之性遠甚於乾薑也細辛細而辛竄走絡最急也且少隂經之報使誤發少隂汗者必伐血小青龍湯方辛甘復酸法麻黃去節三錢甘草炙三錢桂枝去皮五錢芍藥三錢五味二錢乾薑三錢半夏五錢細辛二錢水八碗先煮麻黃減一碗許去上沫納諸藥煮取三碗去滓温服一碗得效緩後服不知再服四十八喘咳息促吐稀涎脈洪數右大於左喉啞是為熱飲麻杏石甘湯主之金匱謂病痰飲者當以温藥和之葢飲屬隂邪非温不化故飲病當温者十有八九然當清者亦有一二如此證息促知在上焦涎稀知非勞傷之咳亦非火邪之但咳無痰而喉啞者可比右大於左純然肺病此乃飲邪隔拒心氣壅遏肺氣不能下達音出於肺金實不鳴故以麻黃中空而達外杏仁中實而降里石膏辛淡性寒質重而氣清輕合麻杏而宣氣分之鬱熱甘草之甘以緩急補土以生金也按此方即大青龍之去桂枝薑棗者也麻杏石甘湯方辛涼甘淡法麻黃去節三錢杏仁去皮尖碾細三錢石膏碾三錢甘草炙二錢水八杯先煮麻黃減二杯去沫納諸藥煮取三杯先服一杯以喉亮為度四十九支飲不得息葶藶大棗瀉肺湯主之支飲上壅胸膈直阻肺氣不令下降呼息難通非用急法不可故以稟金火之氣破癥瘕積聚通用水道性急之葶藶急瀉肺中之壅塞然其性剽悍藥必入胃過脾恐傷脾胃中和之氣故以守中緩中之大棗護脾胃而監製之使不旁傷他臟一急一緩一苦一甘相須成功也葶藶大棗瀉肺湯苦辛甘法苦葶藶炒香碾細三錢大棗去核五枚水五杯煮成二杯分二次服得效減其制不效再作服衰其大半而止五十飲家反渴必重用辛上焦加乾薑桂枝中焦加枳實桔皮下焦加附子生薑金匱謂乾薑桂枝為熱藥也服之當遂渴今反不渴者飲也是以不渴定其為飲人所易知也又云水在肺其人渴是飲家亦有渴症人所不知今人見渴投涼輕則用花粉冬地重則用石膏知母全然不識病情葢火咳無痰勞咳膠痰飲咳稀痰兼風寒則難出不兼風寒則易出深則難出淺則易出其在上焦也郁遏肺氣不能清肅下降反挾心火上升爍咽渴欲飲水愈飲愈渴飲後水不得行則愈飲愈咳愈咳愈渴明知其為飲而渴也用辛何妨內經所謂辛能潤是也以乾薑峻散肺中寒水之氣而補肺金之體使肺氣得宣而渴止咳定矣其在中焦也水停心下郁遏心氣不得下降反來上爍咽喉又格拒腎中眞液不得上潮於喉故嗌乾而渴也重用枳實急通幽門使水得下行而臟氣各安其位各司其事不渴不咳矣其在下焦也水鬱膀胱格拒眞水不得外滋上潮且邪水旺一分眞水反虧一分藏眞水者腎也腎惡燥又腎脈入心由心入肺從肺繫上循喉嚨平人之不渴者全賴此脈之通調開竅於舌下玉英廉泉今下焦水積而腎脈不得通調故亦渴也附子合生姜為眞武法補北方司水之神使邪水暢流而眞水滋生矣大抵飲家當惡水不渴者其病猶輕渴者其病必重如温熱應渴渴者猶輕不渴者甚重反象也所謂加者於應用方中重加之也五十一飲家隂吹脈弦而遲不得固執金匱法當反用之桔半桂苓枳薑湯主之金匱謂隂吹正喧豬膏發煎主之葢以胃中津液不足大腸津液枯槁氣不後行逼走前隂故重用潤法俾津液充足流行濁氣仍歸舊路矣若飲家之隂吹則大不然葢痰飲蟠踞中焦必有不寐不食不飢不便惡水等證脈不數而遲弦其為非津液之枯槁乃津液之積聚胃口可知故用九竅不和皆屬胃病例峻通胃液下行使大腸得胃中津液滋潤而病如失矣此證系余治驗故附錄於此以開一條門徑桔半桂苓枳薑湯苦辛淡法半夏二兩小枳實一兩桔皮六錢桂枝一兩茯苓塊六錢生薑六錢甘瀾水十碗煮成四碗分四次日三夜一服以愈為度愈後以温中補脾使飲不聚為要其下焦虛寒者温下焦肥人用温燥法瘦人用温平法按痰飲有四除久留之伏飲非因暑濕暴得者不議外懸飲已見於伏暑例中暑飲相搏見上焦篇第二十九條茲特補支飲溢飲之由及暑濕暴得者望醫者及時去病以免留伏之患並補金匱所未及者二條以開後學讀書之法金匱溢飲條下謂大青龍湯主之小青龍湯亦主之注傢俱不甚晰何以同一溢飲而用寒用熱兩不相伴哉按大青龍有石膏杏仁生薑大棗而無干薑細辛五味半夏白芍葢大青龍主脈洪數面赤喉啞之熱飲小青龍主脈弦緊不渴之寒飲也由此類推胸中有微飲苓桂朮甘湯主之腎氣丸亦主之苓桂術甘外飲治脾也腎氣丸內飲治腎也再胸痺門中胸痺心中痞留氣結在胸胸滿脅下逆搶心枳實薤白湯主之人參湯亦主之又何以一通一補而主一胸痺乎葢胸痺因寒濕痰飲之實證則宜通陽補之不惟不愈人參增氣且致喘滿若無風寒痰飲之外因不內外因但系胸中清陽之氣不足而痺痛者如苦讀書而妄想好歌曲而無度重傷胸中陽氣者老人清陽日薄者若再以薤白栝蔞枳實滑之瀉之通之是速之成勞也斷非人參湯不可學者能從此類推方不死於句下方可與言讀書也五十二暴感寒濕成疝寒熱往來脈弦反數舌白滑或無苔不渴當臍痛或脅下痛椒桂湯主之此小邪中里證也疝氣結如山也此肝臟本虛或素有肝鬱或因暴怒又猝感寒濕秋月多得之既有寒熱之表證又有臍痛之裡證表裡俱急不得不用兩解方以川椒吳萸小茴香直入肝臟之裡又芳香化濁流氣以柴胡從少陽領邪出表病在肝治膽也又以桂枝協濟柴胡者病在少隂治在太陽也經所謂病在臟治其腑之義也況又有寒熱之表證乎佐以青皮廣皮從中達外峻伐肝邪也使以良薑温下焦之裡也水用急流驅濁隂使無留滯也椒桂湯方苦辛通法川椒炒黑六錢桂枝六錢良薑三錢柴胡六錢小茴香四錢廣皮三錢吳茱萸泡淡四錢青皮三錢急流水八碗煮成三碗温服一碗覆被令微汗佳不汗服第二碗接飲生薑湯促之得汗次早服第三碗不必覆被再令汗五十三寒疝脈弦緊脅下偏痛發熱大黃附子湯主之此邪居厥隂表裡俱急故用温下法以兩解之也脈弦為肝鬱緊裡寒也脅下偏痛肝膽經絡為寒濕所搏鬱於血分而為痛也發熱者膽因肝而鬱也故用附子温里通陽細辛暖水臟而散寒濕之邪肝膽無出路故用大黃借胃腑以為出路也大黃之苦合附子細辛之辛苦與辛合能降能通通則不痛也大黃附子湯方苦辛温下法大黃五錢熟附子五錢細辛三錢水五杯煮取兩杯分温二服原方分量甚重此則從時改輕臨時對證斟酌五十四寒疝少腹或臍旁下引睪丸或掣脅下掣腰痛不可忍者天台烏藥散主之此寒濕客於肝腎小腸而為病故方用温通足厥隂手太陽之藥也烏藥去膀胱冷氣能消腫止痛木香透絡定痛青皮行氣伐肝良薑温臟劫寒茴香温關元暖腰腎又能透絡定痛檳榔至堅直達肛門散結氣使堅者潰聚者散引諸藥逐濁氣由肛門而出川楝導小腸濕熱由小便下行炒以斬關奪門之巴豆用氣味而不用形質使巴豆帥氣藥散無形之寒隨檳榔下出肛門川楝得巴豆迅烈之氣逐有形之濕從小便而去俾有形無形之結邪一齊解散而病根拔矣按疝瘕之證尚多以其因於寒濕故因下焦寒濕而類及三條略示門徑直接中焦篇腹滿腹痛等證古人良法甚夥而張子和專主於下本之金匱病至其年月日時復發者當下之例而方則從大黃附子湯悟入並將淋帶痔瘡癃閉等證悉收入疝門葢皆下焦寒濕濕熱居多而葉氏於婦科久病疝瘕則以通補奇經温養肝腎為主葢本之內經任脈為病男子七疝女子帶下瘕聚也此外良法甚多學者當於各家求之茲不備載天台烏藥散方苦辛熱急通法烏藥五錢木香五錢小茴香炒黑五錢良薑炒五錢青皮五錢川楝子十枚巴豆七十二粒檳榔五錢先以巴豆微打破加麩數合炒川楝子以巴豆黑透為度去巴豆麩子不用但以川楝同前藥為極細末黃酒和服一錢不能飲者薑湯代之重者日再服痛不可忍者日三服濕温五十五濕温久羈三焦瀰漫神昏竅阻少腹硬滿大便不下宣清導濁湯主之此濕久鬱結於下焦氣分閉塞不通之象故用能升能降苦泄滯淡滲濕之豬苓合甘少淡多之茯苓以滲濕利氣寒水石色白性寒由肺直達肛門宣濕清熱葢膀胱主氣化肺開氣化之源肺藏魄肛門曰魄門肺與大腸相表裡之義也晚蠶砂化濁中清氣大凡肉體未有死而不腐者蠶則僵而不腐得清氣之純粹者也故其糞不臭不變色得蠶之純清雖走濁道而清氣獨全既能下走少腹之濁部又能化濁濕而使之歸清以己之正正人之不正也用晚者本年再生之蠶取其生化最速也皂莢辛鹹性燥入肺與大腸金能退暑燥能除濕辛能通上下關竅子更直達下焦通大便之虛閉合之前藥俾鬱結之濕邪由大便而一齊解散矣二苓寒石化無形之氣蠶砂皂子逐有形之濕也宣清導濁湯苦辛淡法豬苓五錢茯苓六錢寒水石六錢晚蠶砂四錢皂莢子去皮三錢水五杯煮成兩杯分二次服以大便通快為度五十六濕凝氣阻三焦俱閉二便不通半硫丸主之熱傷氣濕亦傷氣者何熱傷氣者肺主氣而屬金火剋金則肺所主之氣傷矣濕傷氣者肺主天氣脾主地氣俱屬太隂濕土濕氣太過反傷本臟化氣濕久濁凝至於下焦氣不惟傷而且阻矣氣為濕阻故二便不通今人之通大便悉用大黃不知大黃性寒主熱結有形之燥糞若濕阻無形之氣氣既傷而且阻非温補眞陽不可硫黃熱而不燥能疏利大腸半夏能入隂燥勝濕辛下氣温開鬱三焦通而二便利矣按上條之便閉偏於濕重故以行濕為主此條之便閉偏於氣虛故以補氣為主葢腎司二便腎中眞陽為濕所困久而彌虛失其本然之職故助之以硫黃肝主疏泄風濕相為勝負風勝則濕行濕凝則風息而失其疏泄之能故通之以半夏若濕盡熱結實有燥糞不下則又不能不用大黃矣學者詳審其證可也半硫丸酸辛温法石硫黃硫黃有三種土黃水黃石黃也入藥必須用產於石者土黃土紋水黃直絲色皆滯暗而臭惟石硫黃方稜石紋而有寶光不臭仙家謂之黃礬其形大勢如礬按硫黃感日之精聚土之液相結而成生於艮土者佳艮土者少土也其色晶瑩其氣清而毒小生於坤土者惡坤土者老土也穢濁之所歸也其色板滯其氣濁而毒重不堪入藥只可作火藥用石黃產於外洋來自舶上所謂倭黃是也入萊菔內煮六時則毒去半夏制上二味各等分為細末蒸餅為丸梧子大每服一二錢白開水送下按半硫丸通虛閉若久久便溏服半硫丸亦能成條皆其補腎燥濕之功也五十七濁濕久留下注於肛氣閉肛門墜痛胃不喜食舌苔腐白朮附湯主之此濁濕久留腸胃至腎陽亦困而肛門墜痛也肛門之脈曰尻腎虛則痛氣結亦痛但氣結之痛有二寒濕熱濕也熱濕氣實之墜痛如滯下門中用黃連檳榔之證是也此則氣虛而為寒濕所閉故以參附峻補腎中元陽之氣薑術補脾中健運之氣樸桔行濁濕之滯氣俾虛者充閉者通濁者行而墜痛自止胃開進食矣按肛痛有得之大恐或房勞者治以參鹿之屬證屬虛勞與此對勘故並及之再此條應入寒濕門以與上三條有互相發明之妙故列於此以便學者之觸悟也朮附湯方苦辛温法生茅朮五錢人參二錢厚朴三錢生附子三錢炮姜三錢廣皮三錢水五杯煮成兩杯先服一杯約三時再服一杯以肛痛愈為度五十八瘧邪久羈因瘧成勞謂之勞瘧絡虛而痛陽虛而脹脅有瘧母邪留正傷加味異功湯主之此證氣血兩傷經云勞者温之故以異功温補中焦之氣歸桂合異功温養下焦之血以薑棗調和營衛使氣血相生而勞瘧自愈此方補氣人所易見補血人所不知經謂中焦受氣取汁變化而赤是謂血凡隂陽兩傷者必於氣中補血定例也加味異功湯方辛甘温陽法人參三錢當歸一錢五分肉桂一錢五分炙甘草二錢茯苓三錢於朮炒焦三錢生薑三錢大棗去核二枚廣皮二錢水五杯煮成兩杯渣再煮一杯分三次服五十九瘧久不解脅下成塊謂之瘧母鱉甲煎丸主之瘧邪久擾正氣必虛清陽失轉運之機濁隂生竊踞之漸氣閉則痰凝血滯而塊勢成矣脅下乃少陽厥隂所過之地按少陽厥隂為樞瘧不離乎肝膽久擾則臟腑皆困轉樞失職故結成積塊居於所部之分謂之瘧母者以其由瘧而成且無已時也按金匱原文病瘧以一月一日發當以十五日愈設不瘥當月盡解如其不瘥當云何此結為癥瘕名曰瘧母急治之宜鱉甲煎丸葢人身之氣血與天地相應故瘧邪之著於人身也其盈縮進退亦必與天地相應如月一日發者發於黑晝月廓空時氣之虛也當俟十五日愈五者生數之終十者成數之極生成之盈數相會五日一元十五日三元一周一氣來復白晝月廓滿之時天氣實而人氣復邪氣退而病當愈設不瘥必俟天氣再轉當於月盡解如其不瘥又當云何然月自虧而滿隂已盈而陽已縮自滿而虧陽已長而隂已消天地隂陽之盈縮消長已周病尚不愈是本身之氣血不能與天地之化機相為流轉日久根深牢不可破故宜急治也鱉甲煎丸方鱉甲炙十二分烏扇燒三分黃芩三分柴胡六分鼠婦熬三分乾薑三分大黃三分芍藥五分桂枝三分葶藶熬一分石葦去毛三分厚朴三分牡丹皮五分瞿麥二分紫葳三分半夏一分人參一分䗪蟲熬五分阿膠炒三分蜂窩炙四分赤硝十二分蜣螂熬六分桃仁二分上二十三味為細末取煅灶下灰一斗清酒一斤五斗浸灰俟酒盡一半煮鱉甲於中煮令泛爛如膠膝絞取汁納諸藥煎為丸如梧子大空心服七丸日三服方論此辛苦通降咸走絡法鱉甲煎丸者君鱉甲而以煎成丸也與他丸法迥異故曰煎丸方以鱉甲為君者以鱉甲守神入里專入肝經血分能消癥瘕領帶四蟲深入臟絡飛者升走者降飛者兼走絡中氣分走者純走絡中血分助以桃仁丹皮紫葳之破滿行血副以葶藶石葦瞿麥之行氣滲濕臣以小柴胡桂枝二湯總去三陽經未結之邪大承氣急驅入腑已結之渣滓佐以人參乾薑阿膠護養鼓盪氣血之正俾邪無容留之地而深入臟絡之病根拔矣按小柴胡湯中有甘草大承氣湯中有枳實仲景之所以去甘草畏其太緩凡走絡藥不須守法去枳實畏其太急而直走腸胃亦非絡藥所宜也六十太隂三瘧腹脹不渴嘔水温脾湯主之三瘧本系深入臟眞之痼疾往往經年不愈現脾胃症猶屬稍輕腹脹不渴脾寒也故以草果温太隂獨勝之寒輔以厚朴消脹嘔水者胃寒也故以生薑降逆輔以茯苓滲濕而養正蜀漆乃常山苗其性急走瘧邪導以桂枝外達太陽也温脾湯方苦辛温里法草果二錢桂枝三錢生薑五錢茯苓五錢蜀漆炒三錢厚朴三錢水五杯煮取兩杯分二次温服六十一少隂三瘧久而不愈形寒嗜臥舌淡脈微發時不渴氣血兩虛扶陽湯主之瘧論篇黃帝問曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣客於六腑而有時與衛氣相失不能相得故休數日乃作也瘧者隂陽更勝也或甚或不甚故或渴或不渴刺瘧篇曰足少隂之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已夫少隂瘧邪入至深本難速已三瘧又系積重難反與衛氣相失之證久不愈其常也既已久不愈矣氣也血也有不隨時日耗散也哉形寒嗜臥少隂本證舌淡脈微不渴陽微之象故以鹿茸為君峻補督脈一者八脈麗於肝腎少隂虛則八脈亦虛一者督脈總督諸陽為衛氣之根本人參附子桂枝隨鹿茸而峻補太陽以實衛氣當歸隨鹿茸以補血中之氣通隂中之陽單以蜀漆一味急提難出之瘧邪隨諸陽藥努力奮爭由衛而出隂臟隂證故湯以扶陽為名扶陽湯辛甘温陽法鹿茸生銼末先用黃酒煎得五錢熟附子三錢人參二錢粗桂枝三錢當歸二錢蜀漆炒黑三錢水八杯加入鹿茸酒煎成三小杯日三服六十二厥隂三瘧日久不已勞則發熱或有痞結氣逆欲嘔減味烏梅丸法主之凡厥隂病甚未有不犯陽明者邪不深不成三瘧三瘧本有難已之勢既久不已隂陽兩傷勞則內發熱者隂氣傷也痞結者隂邪也氣逆欲嘔者厥隂犯陽明而陽明之陽將憊也故以烏梅丸法之剛柔並用柔以救隂而順厥隂剛臟之體剛以救陽而充陽明陽腑之體也減味烏梅丸法酸苦為隂辛甘為陽復法以下方中多無分量以分量本難預定用者臨時斟酌可也半夏黃連乾薑吳萸茯苓桂枝白芍川椒炒黑烏梅按瘧痢兩門日久不治暑濕之邪與下焦氣血混處者或偏隂偏陽偏剛偏柔或宜補宜瀉宜通宜澀或從太隂或從少隂或從厥隂或護陽明其證至雜至多不及備載本論原為温暑而設附錄數條於濕温門中者以見瘧痢之原起於暑濕俾學者識得原頭使雜症有所統屬粗具規模而已欲求美備勤繹各家六十三酒客久痢飲食不減茵陳白芷湯主之久痢無他證而且能飲食如故知其病之未傷臟眞胃土而在腸中也痢久不止者酒客濕熱下注故以風藥之辛佐以苦味入腸芳香涼淡也葢辛能勝濕而升脾陽苦能滲濕清熱芳香悅脾而燥濕涼能清熱淡能滲濕也俾濕熱去而脾陽升痢自止矣茵陳白芷湯方苦辛淡法綿茵陳白芷北秦皮茯苓皮黃柏藿香六十四老年久痢脾陽受傷食滑便溏腎陽亦衰雙補湯主之老年下虛久痢傷脾而及腎食滑便溏亦系脾腎兩傷無腹痛肛墜氣脹等證邪少虛多矣故以人參山藥茯苓蓮子芡實甘温而淡者補脾滲濕再蓮子芡實水中之谷補土而不剋水者也以補骨蓯蓉巴戟菟絲覆盆萸肉五味酸甘微辛者升補腎臟隂中之陽而兼能益精氣安五臟者也此條與上條當對看上條以酒客久痢臟眞未傷而濕熱尚重故雖日久仍以清熱滲濕為主此條以老年久痢濕熱無多而臟眞已歉故雖滯下不淨一以補臟固正立法於此亦可以悟治病之必先識證也雙補湯方複方也法見注中人參山藥茯苓蓮子芡實補骨脂蓯蓉萸肉五味子巴戟天菟絲子覆盆子六十五久痢小便不通厭食欲嘔加減理隂煎主之此由陽而傷及隂也小便不通隂液涸矣厭食欲嘔脾胃兩陽敗矣故以熟地白芍五味收三隂之隂附子通腎陽炮姜理脾陽茯苓理胃陽也按原方通守兼施剛柔互用而名理隂煎者意在偏護隂也熟地守下焦血分甘草守中焦氣分當歸通下焦血分炮姜通中焦氣分葢氣能統血由氣分之通及血分之守此其所以為理也此方去甘草當歸加白芍五味附子茯苓者為其厭食欲嘔也若久痢陽不見傷無食少欲嘔之象但隂傷甚者又可以去剛增柔矣用成方總以活潑流動對症審藥為要加減理隂煎方辛淡為陽酸甘化隂復法凡復法皆久病未可以一法了事者熟地白芍附子五味炮姜茯苓六十六久痢帶瘀血肛中氣墜腹中不痛斷下滲濕湯主之此澀血分之法也腹不痛無積滯可知無積滯故用澀也然腹中雖無積滯而肛門下墜痢帶瘀血是氣分之濕熱久而入於血分故重用樗根皮之苦燥濕寒勝熱澀以斷下專入血分而澀血為君地榆得先春之氣木火之精去瘀生新茅朮黃柏赤苓豬苓開膀胱使氣分之濕熱由前隂而去不致遺留於血分也楂肉亦為化瘀而設銀花為敗毒而然斷下滲濕湯方苦辛淡法樗根皮炒黑一兩生茅朮一錢生黃柏一錢地榆炒黑一錢五分楂肉炒黑三錢銀花炒黑一錢五分赤苓三錢豬苓一錢五分水八杯煮成三杯分三次服六十七下痢無度脈微細肢厥不進食桃花湯主之此澀陽明陽分法也下痢無度關閘不藏脈微細肢厥陽欲脫也故以赤石脂急澀下焦粳米合石脂堵截陽明乾薑温里而回陽俾痢止則隂留隂留則陽斯變矣桃花方方法見温熱下焦篇六十八久痢隂傷氣陷肛墜尻酸地黃餘糧湯主之此澀少隂隂分法也肛門墜而尻脈酸腎虛而津液消亡之象故以熟地五味補腎而酸甘化隂餘糧固澀下焦而酸可除墜可止痢可愈也按石脂餘糧皆系石藥而性澀桃花湯用石脂不用餘糧此則用餘糧而不用石脂葢石脂甘温桃花温劑也餘糧甘平此方救隂劑也無取乎温而有取乎平也地黃餘糧湯方酸甘兼澀法熟地黃禹餘糧五味子六十九久痢傷腎下焦不固腸膩滑下納穀運遲三神丸主之此澀少隂隂中之陽法也腸膩滑下知下焦之不固納運谷遲在久痢之後不惟脾陽不運而腎中眞陽亦衰矣故用三神丸温補腎陽五味兼收其隂肉果澀自滑之脫也三神丸方酸甘辛温兼澀法亦複方也五味子補骨脂肉果去淨油七十久痢傷隂口渴舌乾微熱微咳人參烏梅湯主之口渴微咳於久痢之後無濕熱客邪款證故知其隂液太傷熱病液涸急以救隂為務人參烏梅湯酸甘化隂法人參蓮子炒炙甘草烏梅木瓜山藥按此方於救隂之中仍然兼護脾胃若液虧甚而土無他病者則去山藥蓮子加生地麥冬又一法也七十一痢久隂陽兩傷少腹肛墜腰胯脊髀痠痛由臟腑傷及奇經參茸湯主之少腹墜衝脈虛也肛墜下焦之隂虛也腰腎之府也胯膽之穴也謂環跳脊太陽夾督脈之部也髀陽明部也俱痠痛者由隂絡而傷及奇經也參補陽明鹿補督脈歸茴補衝脈菟絲附子升少隂杜仲主腰痛俾八脈有權肝腎有養而痛可止墜可升提也按環跳本穴屬膽太陽少隂之絡實會於此參茸湯辛甘温法人參鹿茸附子當歸炒茴香炒菟絲子杜仲按此方雖曰隂陽兩補而偏於陽若其人但墜而不腰脊痛偏於隂傷多者可於本方去附子加補骨脂又一法也七十二久痢傷及厥隂上犯陽明氣上撞心飢不欲食乾嘔腹痛烏梅丸主之肝為剛臟內寄相火非純剛所能折陽明腑非剛藥不復其體仲景厥隂篇中列烏梅丸治木犯陽明之吐蛔自注曰又主久痢方然久痢之症不一亦非可一槪用之者也葉氏於木犯陽明之瘧痢必用其法而化裁之大抵柔則加白芍木瓜之類剛則加吳萸香附之類多不用桂枝細辛黃柏其與久痢純然厥隂見證而無犯陽明之嘔而不食撞心者則又純乎用柔是治厥隂久痢之又一法也按瀉心寒熱並用而烏梅丸則又寒熱剛柔並用矣葢瀉心治胸膈間病猶非純在厥隂也不過肝脈絡胸耳若烏梅丸則治厥隂防少陽護陽明之全劑烏梅丸方酸甘辛苦復法酸甘化隂辛苦通降又辛甘為陽酸苦為隂烏梅細辛乾薑黃連當歸附子蜀椒炒焦去汗桂枝人參黃柏此烏梅丸本方也獨無論者以前賢名注林立茲不再贅分量製法悉載傷寒論中七十三休息痢經年不愈下焦隂陽皆短不能收攝少腹氣結有似癥瘕參芍湯主之休息痢者或作或止止而復作故名休息古稱難治所以然者正氣尚旺之人即受暑濕水谷血食之邪太重必日數十行而為脹為痛為裡急後重等證必不或作或輟也其成休息證者大抵有二皆以正虛之故一則正虛留邪在絡至其年月日時復發而見積滯腹痛之實證者可遵仲景凡病至其年月日時復發者當下之例而用少少温下法兼通絡脈以去其隱伏之邪或丸藥緩攻俟積盡而即補之或攻補兼施中下並治此虛中之實證也一則純然虛證以痢久滑泄太過下焦隂陽兩傷氣結似乎癥瘕而實非癥瘕舍温補其何從故以參苓炙草守補中焦參附固下焦之陽白芍五味收三隂之隂而以少隂為主葢腎司二便也湯名參芍者取隂陽兼固之義也參芍湯方辛甘為陽酸甘化隂復法人參白芍附子茯苓炙甘草五味子七十四噤口痢熱氣上衝腸中逆阻似閉腹痛在下尤甚者白頭翁湯主之此噤口痢之實證而偏於熱重之方也白頭翁湯方注見前七十五噤口痢左脈細數右手脈弦乾嘔腹痛裡急後重積下不爽加減瀉心湯主之此亦噤口痢之實證而偏於濕熱太重者也脈細數温熱著里之象右手弦者木入土中之象也故以瀉心去守中之品而補以運之辛以開之苦以降之加銀花之敗熱毒楂炭之克血積木香之通氣積白芍以收隂氣更能於土中拔木也加減瀉心湯方苦辛寒法川連黃芩乾薑銀花楂炭白芍木香汁七十六噤口痢嘔惡不飢積少痛緩形衰脈弦舌白不渴加味參苓白朮散主之此噤口痢邪少虛多治中焦之法也積少痛緩則知邪少舌白者無熱形衰不渴不飢不食則知胃關欲閉矣脈弦者金匱謂弦則為減葢謂隂精陽氣俱不足也靈樞謂諸小脈者隂陽形氣俱不足勿取以針調以甘藥也仲景實本於此而作建中湯治諸虛不足為一切虛勞之祖方李東垣又從此化出補中益氣升陽益氣清暑益氣等湯皆甘温除大熱法究不若建中之純葢建中以德勝而補中以才勝者也調以甘藥者十二經皆秉氣於胃胃復則十二經之諸虛不足皆可復也葉氏治虛多脈弦之噤口痢仿古之參苓白朮散而加之者亦同諸虛不足調以甘藥之義又從仲景東垣兩法化出而以急復胃氣為要者也加味參苓白朮散方本方甘淡微苦法加則辛甘化陽芳香悅脾微辛以通微苦以降也人參二錢白朮炒焦一錢五分茯苓一錢五分扁豆炒二錢薏仁一錢五分桔梗一錢砂仁炒七分炮姜一錢肉豆蔻一錢炙甘草五分共為極細末每服一錢五分香粳米湯調服日二次方論參苓白朮散原方兼治脾胃而以胃為主者也其功但止土虛無邪之泄瀉而已此方則通宣三焦提上焦澀下焦而以醒中焦為要者也參苓白朮加炙草則成四君矣按四君以參苓為胃中通藥胃者腑也腑以通為補也白朮炙草為脾經守藥脾者臟也臟以守為補也茯苓淡滲下達膀胱為通中之通人參甘苦益肺胃之氣為通中之守白朮苦能滲濕為守中之通甘草純甘不兼他味又為守中之守也合四君為脾胃為兩補之方加扁豆薏仁以補肺胃之體炮姜以補脾腎之用桔梗從上焦開提清氣砂仁肉蔻從下焦固澀濁氣二物皆芳香能澀滑脫而又能通下焦之鬱滯兼醒脾陽也為末取其留中也引以香粳米亦以其芳香悅土以胃所喜為補也上下斡旋無非冀胃氣漸醒可以轉危為安也七十七噤口痢胃關不開由於腎關不開者肉蓯蓉湯主之此噤口痢邪少虛多治下焦之法也葢噤口日久有責在胃者上條是也亦有由於腎關不開而胃關愈閉者則當以下焦為主方之重用蓯蓉者以蓯蓉感馬精而生精血所生之草而有肉者也馬為火畜精為水隂稟少隂水火之氣而歸於太隂坤土之藥其性温潤平和有從容之意故得從容之名補下焦陽中之隂有殊功本經稱其強隂益精消癥瘕強隂者火氣也益精者水氣也癥瘕乃氣血積聚有形之邪水火既濟中土氣盛而積聚自消茲以噤口痢隂陽俱損水土兩傷而又滯下之積聚未清蓯蓉乃確當之品也佐以附子補隂中之陽人參乾薑補土當歸白芍補肝腎芍用桂制者恐其呆滯且束入少隂血分也肉蓯蓉湯辛甘法肉蓯蓉泡淡一兩附子二錢人參二錢乾薑炭二錢當歸二錢白芍肉桂湯浸炒三錢水八杯煮取三杯分三次緩緩服胃稍開再作服秋燥七十八燥久傷及肝腎之隂上盛下虛晝涼夜熱或乾咳或不咳甚則痙厥者三甲復脈湯主之定風珠亦主之專翕大生膏亦主之腎主五液而惡燥或由外感邪氣久羈而傷及腎隂或不由外感而內傷致燥均以培養津液為主肝木全賴腎水滋養腎水枯竭肝斷不能獨治所謂乙癸同源故肝腎並稱也三方由淺入深定風濃於復脈皆用湯從急治專翕取乾坤之靜多用血肉之品熬膏為丸從緩治葢下焦深遠草木無情故用有情緩治再暴虛易復者則用二湯久虛難復者則用專翕專翕之妙以下焦喪失皆腥臭脂膏即以腥臭脂膏補之較之丹溪之知柏地黃云治雷龍之火而安腎燥明眼自能辨之葢凡甘能補凡苦能瀉獨不知苦先入心其化以燥乎再雷龍不能以剛藥直折也腎水足則靜自能安其專翕之性腎水虧則動而燥因燥而燥也善安雷龍者莫如專翕觀者察之三甲復脈湯定風珠並見前專翕大生膏酸甘鹹法人參二斤無力者以制洋參代之茯苓二斤龜板另熬膠一斤烏骨雞一對鱉甲一斤另熬膠牡蠣一斤鮑魚二斤海參二斤白芍二斤五味子半斤麥冬二斤不去心羊腰子八對豬脊髓一斤雞子黃二十丸阿膠二斤蓮子二斤芡實三斤熟地黃三斤沙苑蒺藜一斤白蜜一斤枸杞子炒黑一斤上藥分四銅鍋忌鐵器攪用銅勺以有情歸有情者二無情歸無情者二文火細鍊三晝夜去渣再熬六晝夜陸續合為一鍋煎煉成膏末下三膠合蜜和勻以方中有粉無汁之茯苓白芍蓮子芡實為細末合膏為丸每服二錢漸加至三錢日三服約一日一兩期年為度每殞胎必三月肝虛而熱者加天冬一斤桑寄生一斤同熬膏再加鹿茸二十四兩為末本方以隂生於八成於七故用三七二十一之奇方守隂也加方用陽生於七成於八三八二十四之偶方以生胎之陽也古法通方多用偶守法多用奇隂陽互也
