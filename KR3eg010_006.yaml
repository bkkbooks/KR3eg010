body:
  text: 卷六解兒難解兒難題詞兒曷為乎有難曰天時人事為之也難於天者一難於人者二天之大德曰生曷為乎難兒也曰天不能不以隂陽五行化生萬物五行之運不能不少有所偏在天原所以相制在兒任其氣則生不任其氣則難雖天亦莫可如何也此兒之難於天者也其難於人者奈何曰一難於兒之父母一難於庸陋之醫天下之兒皆天下父母所生天下父母有不欲其兒之生者乎曷為乎難於父母耶曰即難於父母欲其兒之生也父母曰人生於溫死於寒故父母惟恐其兒之寒也父母曰人以食為天飢則死故父母惟恐其兒之飢也天下之兒得全其生者此也天下之兒或受其難者亦此也諺有之曰小兒無凍餓之患有飽暖之災此發乎情不能止乎義禮止知以慈為慈不知以不慈為慈此兒之難於父母者也天下之醫操生人之術未有不欲天下之兒之生未有不利天下之兒之生天下之兒之難未有不賴天下之醫之有以生之也然則醫也者所以補天與父母之不逮以生兒者也曷為乎天下之兒難於天下之醫也曰天下若無醫則天下之兒難猶少且難於天與父母無怨也人受生於天與父母即難於天與父母又何怨乎自天下之醫愈多斯天下之兒難愈廣以受生於天於父母之兒而難於天下之醫能無怨乎曷為乎醫愈多而兒之難愈廣也曰醫也者順天之時測氣之偏適人之情體物之理名也物也象也數也無所不通而受之以謙而後可以言醫尤必上與天地呼吸相通下與小兒呼吸相通而守之以誠而後可以為醫奈何挾生人之名為利己之術不求歲氣不畏天和統舉四時率投三法毫無知識囿於見聞並不知察色之謂何聞聲之謂何朝微夕甚之謂之何或輕或重之謂何甚至一方之中外自太陽內至厥隂既與發表又與攻裡且堅執小兒純陽之説無論何氣使然一以寒涼為準無論何邪為病一以攻伐為先謬造驚風之説惑世誣民妄為疳疾之丸戕生伐性天下之兒之難寧有終窮乎前代賢醫歷有辨難而未成書瑭雖不才願解兒難兒科總論古稱難治者莫如小兒名之曰啞科以其疾痛煩苦不能自達且其臟腑薄藩籬疏易於傳變肌膚嫩神氣怯易於感觸其用藥也稍呆則滯稍重則傷稍不對證則莫知其鄉捉風捕影轉救轉劇轉去轉遠惟較之成人無七情六欲之傷外不過六淫內不過飲食胎毒而已然不精於方脈婦科透徹生化之源者斷不能作兒科也俗傳兒科為純陽辨古稱小兒純陽此丹灶家言謂其未曾破身耳非盛陽之謂小兒稚陽未充稚隂未長者也男子生於七成於八故八月生乳牙少有知識八歲換食牙漸開智慧十六而精通可以有子三八二十四歲真牙生俗謂盡根牙而精足筋骨堅強可以任事蓋隂氣長而陽亦充矣女子生於八成於七故七月生乳牙知提攜七歲換食牙知識開不令與男子同席二七十四而天癸至三七二十一歲而真牙生隂始足隂足而陽充也命之嫁小兒豈盛陽者哉俗謂女子知識恆早於男子者陽進隂退故也兒科用藥論世人以小兒為純陽也故重用苦寒夫苦寒藥兒科之大禁也丹溪謂産婦用白芍伐生生之氣不知兒科用苦寒最伐生生之氣也小兒春令也東方也木德也其味酸甘酸味人或知之甘則人多不識蓋弦脈者木脈也經謂弦無胃氣者死胃氣者甘味也木離土則死再驗之木實則更知其所以然矣木實惟初春之梅子酸多甘少其他皆甘少酸少者也故調小兒之味宜甘多酸少如錢仲陽之六味丸是也苦寒之所以不可輕用者何炎上作苦萬物見火而化苦能滲濕人倮蟲也體屬濕土濕淫固為人害人無濕則死故濕重者肥濕少者瘦小兒之濕可盡滲哉在用藥者以為瀉火不知愈瀉愈瘦愈化愈燥苦先入心其化以燥也而且重伐胃汁直致痙厥而死者有之小兒之火惟壯火可減若少火則所賴以生者何可恣用苦寒以清之哉故存隂退熱為第一妙法存隂退熱莫過六味之酸甘化隂也惟濕溫門中與辛淡合用燥火則不可也余前序溫熱雖在大人凡用苦寒必多用甘寒監之惟酒客不禁兒科風藥禁近日行方脈者無論四時所感為何氣一概羌防柴葛不知仲景先師有風家禁汗亡血家禁汗濕家禁汗瘡家禁汗四條皆為其血虛致痙也然則小兒痙病多半為醫所造皆不識六氣之故痙因質疑痙病之因素問曰諸痙項強皆屬於濕此濕字大有可疑蓋風字誤傳為濕字也余少讀方中行先生痙書一生治病留心痙證覺六氣皆能致痙風為百病之長六氣莫不由風而傷人所有痙病現證皆風木剛強屈拗之象濕性下行而柔木性上行而剛單一濕字似難包得諸痙且濕字與項強字即不對中行痙書一十八條除引素問千金二條餘十六條內脈二條證十四條俱無濕字證據如脈二條一曰痙夫脈按之緊如弦直上下行二曰脈經云痙家其脈伏堅直上下皆風木之象濕之反面也餘十四條風痙致痙居其十風家禁下一條瘡家禁汗一條新産亡血二條皆無所謂濕也者即千金一條曰太陽中風重感於寒濕則變痙也上下文義不續亦不可以為據中行注云痙自素問以來其見於傷寒論者乃叔和所述金匱之略也千金雖有此言未見其精悉可見中行亦疑之且千金一書雜亂無章多有後人羼雜難以為據靈樞素問二書非神聖不能道然多述於戰國漢人之筆可信者十之八九其不可信者一二如其中多有後世官名地名豈軒岐逆料後世之語而先言之哉且代遠年湮不無脫簡錯誤之處瑭學術淺陋不敢信此濕字亦不敢直斷其非闕疑以俟來者濕痙或問或問子疑素問痙因於濕而又謂六淫之邪皆能致痙亦復有濕痙一條豈不自相矛盾乎曰吾所疑者諸字皆字似濕之一字不能包括諸痙惟風可以該括一也再者濕性柔不能致強初起之濕痙必兼風而後成也且俗名痙為驚風原有急慢二條所謂急者一感即痙先痙而後病所謂慢者病久而致痙者也一感即痙者只要認證真用藥確一二帖即愈易治也病久而痙者非傷脾陽肝木來乘即傷胃汁肝隂肝風鴟張一虛寒一虛熱為難治也吾見濕因致痙先病後痙者多如夏月小兒暑濕泄瀉暴注一晝夜百數十行下多亡隂肝乘致痙之類霍亂最能致痙皆先病後痙者也當合之雜説中風論一條參看以卒得痙病而論風為百病之長六淫之邪皆因風而入以久病致痙而論其強直背反瘛瘲之狀皆肝風內動為之也似風之一字可以包得諸痙要知痙者筋病也知痙之為筋病思過半矣痙有寒熱虛實四大綱論六淫致痙實證也産婦亡血病久致痙風家誤下溫病誤汗瘡家發汗者虛痙也風寒風濕致痙者寒證也風溫風熱風暑燥火致痙者熱痙也按此皆瘛證屬火後世統謂之痙矣後另有論俗稱慢脾風者虛寒痙也本論後述本臟自病者虛熱痙也亦系瘛證小兒痙病瘛病共有九大綱論寒痙仲景先師所述方法具在但須對證細加尋繹如所云太陽證體強𠘧𠘧然脈沉遲之類有汗為柔痙為風多寒少而用桂枝湯加法無汗為剛痙為寒痙而用葛根湯湯內有麻黃乃不以桂枝立名亦不以麻黃立名者以其病已至陽明也諸如此類須平時熟讀其書臨時再加謹慎手下自有準的矣風寒咳嗽致痙者用杏蘇散辛溫例自當附入寒門風溫痙按此即瘛證少陽之氣為之也下溫熱暑溫秋燥皆同此例乃風之正令陽氣發泄之候君火主氣之時宜用辛涼正法輕者用辛涼輕劑重者用辛涼重劑如本論上焦篇銀翹散白虎湯之類傷津液者加甘涼如銀翹加生地麥冬玉女煎以白虎合冬地之類神昏譫語兼用芳香以開膻中如清宮湯牛黃丸紫雪丹之類愈後用六味三才復脈輩以復其喪失之津液風溫咳嗽致痙者用桑菊飲方見上焦篇銀翹散辛涼例與風寒咳嗽迥別斷不可一概用杏蘇辛溫也溫熱痙即六淫之火氣消爍真隂者也內經謂先夏至為病溫者是也即同上風溫論治但風溫之病痙者輕而少溫熱之致痙者多而重也約之輕重淺深視病之輕重淺深而已暑痙暑兼濕熱後有濕痙一條此則偏於熱多濕少之病去溫熱不遠經謂後夏至為病暑者是也按俗名小兒急驚風者惟暑月最多而兼證最雜非心如澄潭目如智珠筆如分水犀者未易辨此蓋小兒膚薄神怯經絡臟腑嫩小不奈三氣發泄邪之來也勢如奔馬其傳變也急如掣電豈粗疏者所能當此任哉如夏月小兒身熱頭痛項強無汗此暑兼風寒者也宜新加香薷飲有汗則仍用銀翹散重加桑葉咳嗽則用桑菊飲汗多則用白虎脈芤而喘則用人參白虎身重汗少則用蒼朮白虎脈芤面赤多言喘喝欲脫者即用生脈散神識不清者即用清營湯加鉤藤丹皮羚羊角神昏者兼用紫雪丹牛黃丸等病熱輕微者用清絡飲之類方法悉載上焦篇學者當與前三焦篇暑門中細心求之但分量或用四之一或用四之二量兒之壯弱大小加減之痙因於暑只治致痙之因而痙自止不必沾沾但於痙中求之若執痙以求痙吾不知痙為何物夫痙病名也頭痛亦病名也善治頭痛者必問致頭痛之因蓋頭痛有傷寒頭痛傷風頭痛暑頭痛熱頭痛濕頭痛燥頭痛痰厥頭痛陽虛頭痛隂虛頭痛跌撲頭痛心火欲作癰膿之頭痛肝風內動上竄少陽膽絡之偏頭痛朝發暮死之真頭痛若不問其致病之因如時人但見頭痛一以羌活藁本從事何頭痛之能愈哉況痙病之難治者乎濕痙按此一條瘛痙兼有其因於寒濕者則兼太陽寒水氣其泄瀉太甚下多亡隂者木氣來乘則瘛矣按中濕即痙者少蓋濕性柔而下行不似風剛而上升也其間有兼風之痙名醫類案中有一條云小兒吐哯欲作癇者五苓散最妙本論濕溫上焦篇有三仁湯一法邪入心包用清宮湯去蓮心麥冬加銀花赤小豆皮一法用紫雪丹一法銀翹馬勃散一法千金葦莖湯加滑石杏仁一法而寒濕例中有形似傷寒舌白不渴經絡拘急桂枝薑附湯一法凡此非必皆現痙病而後治蓋既感外邪久則致痙於其未痙之先知系感受何邪以法治之而痙病之源絶矣豈不愈於見痙治痙哉若兒科能於六淫之邪見幾於早吾知小兒之痙病必少濕久致痙者多蓋濕為濁邪最善瀰漫三焦上蔽清竅內蒙膻中學者當於前中焦下焦篇中求之由瘧痢而致痙者見其所傷之偏隂偏陽而補救之於瘧痢門中求之燥痙燥氣化火消爍津液亦能致痙其治略似風溫學者當於本論前三焦篇秋燥門中求之但正秋之時有伏暑內發新涼外加之證燥者宜辛涼甘潤有伏暑則兼濕矣兼濕則宜苦辛淡甚則苦辛寒矣不可不細加察焉燥氣化寒脅痛嘔吐法用苦溫佐以甘辛內傷飲食痙俗所謂慢脾風者是也按此證必先由於吐瀉有脾胃兩傷者有專傷脾陽者有專傷胃陽者有傷及腎陽者參苓白朮散四君六君異功補中益氣理中等湯皆可選用虛寒甚者理中加丁香肉桂肉果訶子之類因他病傷寒涼藥者亦同此例葉案中有隂風入脾絡一條方在小兒癇痙厥門中其小兒吐瀉門中言此證最為詳細案後華岫云駁俗論最妙學者不可不靜心體察焉再參之錢仲陽薛立齋李東垣張景嶽諸家可無餘蘊矣再按此證最險最為難治世之訛傳妄治已久四海同風歷有年所方中行駁之於前諸君子暢論於後至今日而其偽風不息是所望於後之強有力者悉取其偽書而焚耳細觀葉案治法之妙全在見吐瀉時先防其痙非於既痙而後設法也故余前治六淫之痙亦同此法所謂上工不治已病治未病聖人不治已亂治未亂也客忤痙俗稱謂驚嚇是也按小兒神怯氣弱或見非常之物聽非常之響或失足落空跌撲之類百證中或有一二非小兒所有痙病皆因於驚嚇也證現發熱或有汗或無汗面時青時赤夢中囈語手足蠕動宜復脈湯去參桂薑棗加丹參丹皮犀角補心之體以配心之用大便結者加元參溏者加牡蠣汗多神不寧有恐懼之象者加龍骨整琥珀整硃砂塊取其氣而不用其質自無流弊必細詢病家確有所見者方用此例若語涉支離猜疑不定者靜心再診必得確情而後用藥愚兒三歲六月初九日辰時倚門落空少時發熱隨熱隨痙昏不知人手足如冰無脈至戌時而痙止身熱神昏無汗次日早余方與復脈湯去參桂薑棗每日一帖服三四杯不飲不食至十四日巳時得戰汗而愈若當痙厥神昏之際妄動亂治豈有生理乎蓋痙厥則隂陽逆亂少不合拍則不可救病家情急因亂投藥餌胡針亂灸而死者不可勝紀病家中無主宰醫者又無主宰兒病其何堪哉如包絡熱重唇舌燥目白睛有赤縷者牛黃清心丸本論牛黃安宮丸紫雪丹輩亦可酌而用之本臟自病痙此證則瘛病也按此證由於平日兒之父母恐兒之受寒覆被過多著衣過厚或冬日房屋熱炕過暖以致小兒每日出汗汗多亡血亦如産婦亡血致痙一理肝主血肝以血為自養血足則柔血虛則強故曰本臟自病然此一痙也又實為六淫致痙之根蓋汗多亡血者本臟自病汗多亡衛外之陽則易感六淫之邪也全賴明醫參透此理於平日預先告諭小兒之父母勿令過暖汗多亡血暗中少𨚫無窮之病矣所謂治未病也治本臟自病法一以育隂柔肝為主即同産後血亡致痙一例所謂血足風自滅也六味丸復脈湯三甲復脈三方大小定風珠二方專翕膏皆可選用專翕膏為痙止後每日服四五錢分二次為填隂善後計也六淫誤汗致痙者亦同此例救風溫溫熱誤汗者先與存隂不比傷寒誤汗者急與護陽也蓋寒病不足在陽溫病不足在隂也小兒易痙總論按小兒易痙之故一由於肌膚薄弱臟腑嫩小傳變最速一由於近世不明六氣感人之理一見外感無論何邪即與發表既痙之後重用苦寒雖在壯男壯女二三十歲誤汗致痙而死者何可勝數小兒薄弱則更多矣余於醫學不敢自信然留心此證幾三十年自覺洞徹此理嘗謂六氣明而痙必少敢以質之明賢共商救世之術也痙病瘛病總論素問謂太陽所至為痙少陽所至為瘛蓋痙者水也瘛者火也又有寒厥熱厥之論最詳後人不分痙瘛厥為三病統言曰驚風痰熱曰角弓反張曰搐搦曰抽掣曰癇痙厥方中行作痙書其或問中所論亦混瘛而為痙籠統議論葉案中治癇痙厥最詳而統稱痙厥無瘛之名目亦混瘛為痙考之他書更無分別前痙病論因之從時人所易知也謹按痙者強直之謂後人所謂角弓反張古人所謂痙也瘛者蠕動引縮之謂後人所謂抽掣搐搦古人所謂瘛也抽掣搐搦不止者瘛也時作時止止後或數日或數月復發發亦不待治而自止者癇也四肢冷如冰者厥也四肢熱如火者厥也有時而冷如冰有時而熱如火者亦厥也大抵痙瘛癇厥四門當以寒熱虛實辨之自無差錯仲景剛痙柔痙之論為傷寒而設未嘗議及瘛病故總在寒水一門兼風則有有汗之柔痙蓋寒而實者也除寒痙外皆瘛病之實而熱者也濕門則有寒痙有熱瘛有實有虛熱病久耗其液則成虛熱之瘛矣前列小兒本臟自病一條則虛熱也産後驚風之痙有寒痙仲景所云是也有熱瘛本論所補是也總之痙病宜用剛而溫瘛病宜用柔而涼又有痙而兼瘛瘛而兼痙所謂水極而似火火極而似水也至於癇證亦有虛有實有留邪在絡之客邪有五不可發汗即不發汗之辛甘亦在所當禁也且傷志過極之臟氣葉案中辨之最詳分別治之可也瑭因前輩混瘛與痙為一證故分晰而詳論之以備裁採六氣當汗不當汗論六氣六門止有寒水一門斷不可不發汗者傷寒脈緊無汗用麻黃湯正條風寒挾痰飲用大小青龍一條飲者寒水也水氣無汗用麻黃甘草附子麻黃等湯水者寒水也有汗者即與護陽濕門亦有發汗之條兼寒者也其不兼寒而汗自出者則多護陽之方其他風溫禁汗暑門禁汗亡血禁汗瘡家禁汗禁汗之條頗多前已言之矣蓋傷於寒者必入太陽寒邪與寒水一家同類相從也其不可不發者何太陽本寒標熱寒邪內合寒水之氣止有寒水之本而無標熱之陽不成其為太陽矣水來剋火如一陽陷於二隂之中故急用辛溫發汗提陽外出欲提陽者烏得不用辛溫哉若溫暑傷手太隂火剋金也太隂本燥標濕若再用辛溫外助溫暑之火內助臟氣之燥兩燥相合而土之氣化無從不成其為太隂矣津液消亡不痙何待故初用辛涼以救本臟之燥而外退溫暑之熱繼用甘潤內救本臟之濕外敵溫暑之火而臟象化氣本來面目可不失矣此溫暑之斷寒門中兼風而自汗者即禁汗所謂有汗不得用麻黃無奈近世以羌活代麻黃不知羌活之更烈於麻黃也蓋麻黃之發汗中空而通色青而疏泄生於內地去節方發汗不去節尚能通能留其氣味亦薄若羌活乃羌地所生之獨活氣味雄烈不可當試以麻黃一兩煮於一室之內兩三人坐於其側無所苦也以羌活一兩煮於一室內兩三人坐於其側則其氣味之發泄弱者即不能受矣溫暑門之用羌防柴葛産後亡血家之用當歸川芎澤蘭炮薑同一殺人利劍有心者共籌之疳疾論疳者干也人所共知不知干生於濕濕生於土虛土虛生於飲食不節飲食不節生於兒之父母愛其子惟恐其兒之飢渴也蓋小兒之臟腑薄弱能化一合者與一合有半即不能化而脾氣鬱矣再小兒初能飲食見食即愛不擇精粗不知滿足及脾氣已鬱而不舒有拘急之象兒之父母猶認為飢渴而強與之日復一日脾因鬱而水穀之氣不化水穀之氣不化而脾愈郁不為胃行津液濕斯停矣土惡濕濕停而脾胃俱病矣中焦受氣取汁變化而赤是謂血中焦不受水穀之氣無以生血而血乾矣再水穀之精氣內入五臟為五臟之汁水穀之悍氣循太陽外出捍衛外侮之邪而為衛氣中焦受傷無以散精氣則五臟之汁亦干無以行悍氣而衛氣亦餒衛氣餒故多汗汗多而營血愈虛血虛故肢體日瘦中焦濕聚不化而腹滿腹日滿而肢愈瘦故曰干生於濕也醫者誠能識得干生於濕濕生於土虛且扶土之不暇猶敢恣用苦寒峻傷其胃氣重泄其脾氣哉治法允推東垣錢氏陳氏薛氏葉氏誠得仲景之心法者也疏補中焦第一妙法升降胃氣第二妙法升陷下之脾陽第三妙法甘淡養胃第四妙法調和營衛第五妙法食後擊鼓以鼓動脾陽第六妙法即古者以樂侑食之義鼓蕩陽氣使之運用也難經謂傷其脾胃者調其飲食第七妙法如果生有疳蟲再少用苦寒酸辛如蘆薈胡黃連烏梅使君川椒之類此第八妙法若見疳即與苦寒殺蟲便誤矣考潔古東垣每用丸藥緩運脾陽緩宣胃氣蓋有取乎渣質有形與湯藥異岐亦第九妙法也近日都下相傳一方以全蠍三錢烘乾為末每用精牛肉四兩作肉團數枚加蠍末少許蒸熟令兒逐日食之以全蠍末完為度治疳疾有殊功愚思蠍色青屬木肝經之蟲善竄而疏土其性隂兼通隂絡疏脾郁之久病在絡者最良然其性剽悍有毒牛肉甘溫得坤土之精最善補土稟牡馬之貞其性健順既能補脾之體又能運脾之用牛肉得全蠍而愈健全蠍得牛肉而不悍一通一補相需成功亦可備用一味金雞散亦妙用雞內金不經水洗者不拘多少烘乾為末不拘何食物皆加之性能殺蟲磨積即雞之脾能復脾之本性小兒疳疾有愛食生米黃土石灰紙布之類者皆因小兒無知初飲食時不拘何物即食之脾不能運久而生蟲愈愛食之矣全在提攜之者有以謹之於先若既病治法亦惟有暫運脾陽有蟲者兼與殺蟲斷勿令再食以新推陳換其臟腑之性復其本來之真方妙痘證總論素問曰治病必求其本蓋不知其本舉手便誤後雖有錦繡心思皆鞭長莫及矣治痘明家古來不下數十可稱盡善不比溫病毫無把握尚俟愚陋之鄙論也但古人治法良多而議病究未透徹來路皆由不明六氣為病與溫病之源故論痘發之源者只及其半謂痘證為先天胎毒由肝腎而脾胃而心肺是矣總未議及發於子午卯酉之年而他年罕發者何故蓋子午者君火司天卯酉者君火在泉人身之司君火者少隂也少隂有兩臟心與腎也先天之毒藏於腎臟腎者坎也有二隂以戀一陽又以太陽寒水為腑故不發也必待君火之年與人身君火之氣相搏激而後發也故北口外寒水凝結之所永不發痘蓋人生之胎毒如火藥歲氣之君火如火線非此引之不發以是知痘證與溫病之發同一類也試觀六元正紀所載溫厲大行民病溫厲之處皆君相兩火加臨之候未有寒水濕土加臨而病溫者亦可知愚之非臆説矣痘證禁表藥論表藥者為寒水之氣鬱於人之皮膚經絡與人身寒水之氣相結不能自出而設者也痘證由君火溫氣而發要表藥何用以寒水應用之藥而用之君火之證是猶緣木而求魚也緣木求魚無後災以表藥治痘瘡後必有大災蓋痘以筋骨為根本以肌肉為戰場以皮膚結痂為成功之地用表藥虛表先壞其立功之地故八九朝灰白塌陷咬牙寒戰例靨黑陷之證蜂起矣古方精妙不可勝數惟用表藥之方吾不敢信今人且恣用羌防柴葛升麻紫蘇矣更有愚之愚者用表藥以發悶證是也痘發內由肝腎外由血絡悶證有紫白之分紫悶者梟毒把持太過法宜清涼敗毒古用棗變百祥丸從肝腎之隂內透用紫雪芳涼從心包之陽外透白悶則本身虛寒氣血不支之證峻用溫補氣血托之外出按理立方以盡人力病在裡而責之表不亦愚哉痘證初起用藥論痘證初起用藥甚難難者何預護之為難也蓋痘之放肥灌漿結痂總從見點之初立根基非深思遠慮者不能也且其形勢未曾顯張大約辛涼解肌芳香透絡化濁解毒者十之七八本身氣血虛寒用溫煦保元者十之二三尤必審定藝之壯弱肥瘦黑白青黃所偏者何在所不足者何在審視體質明白再看已未見點所出何苗參之春夏秋冬天氣寒熱燥濕所病何時而後定方務於七日前先清其所感之外邪七日後只有胎毒便不夾雜矣治痘明家論治痘之明家甚多皆不可偏廢者也若專主於寒熱溫涼一家之論希圖省事禍斯亟矣痘科首推錢仲陽陳文中二家錢主寒涼陳主溫熱在二家不無偏勝在後學實不可偏廢蓋二家猶水火也似乎極不同性宗此則害彼宗彼則害此然萬物莫不成於水火使天時有暑而無寒萬物焦矣有寒而無暑萬物冰矣一隂一陽之謂道二家之學似乎相背其實相需實為萬世治痘立宗旨宗之若何大約七日以前外感用事痘發由溫氣之行用錢之涼者十之八九用陳之溫者一二七日以後本身氣血用事純賴臟真之火煉毒成漿此火不外鼓必致內陷用陳之溫者多而用錢之涼者少也若始終實熱者則始終用錢始終虛寒者則始終用陳痘科無一定之證故無一定之方也丹溪立解毒和中安表之説亦最為扼要痘本有毒可解但須解之於七日之前有毒鬱而不放肥不上漿者烏得不解毒哉如天之亢陽不雨萬物不生矣痘證必須和中蓋脾胃最為吃緊前所謂以中焦作戰場也安表之論更為妙諦表不安雖至將成猶敗也前所謂以皮膚結痂為成功之地而可不安之也哉安之不暇而可混發以傷之也哉至其宗錢而非陳則其偏也萬氏以脾胃為主魏氏以保元為主亦確有見識雖皆從二家脫化而稍偏於陳費建中救偏瑣言蓋救世人不明痘之全體大用偏用陳文中之辛熱者也書名救偏其意可知若專主其法悉以大黃石膏從事則救偏而反偏矣胡氏輒投汗下下法猶有用處汗法則不可也翁仲仁金鏡録一書誠為痘科寶筏其妙處全在於看認證真確治之自效初學必須先熟讀其書而後歷求諸家方不誤事後此翟氏聶氏深以氣血盈虧解毒化毒分晰闡揚錢氏陳氏底蘊超出諸家之上然分別太多恐讀者目眩愚謂看法必宗翁氏葉氏有補翁仲仁不及之條治法兼用錢陳以翟氏聶氏為錢陳之注參考諸家可也近日都下盛行正宗一書大抵用費氏胡氏之法而推廣之恣用大汗大下名歸宗湯石膏大黃始終重用此在梟毒太過者則可豈可以概治天下之小兒哉南方江西江南等省全恃種痘一遇自出之痘全無治法醫者無論何痘概禁寒涼以致有毒火者輕者重重者死此皆偏之為害也痘瘡稀少不可恃論相傳痘瘡稀少不過數十粒或百餘粒根顆圓綻者以為狀元痘可不服藥遇則以為三四日間亦須用辛涼解毒藥一帖無庸多服七八日間亦宜用甘溫托漿藥一帖多不過二帖務令漿行滿足所以然者何愚嘗見稀少之痘竟有漿行不足結痂後患目毒流心肝二經或數月或半年後煩躁而死不可救藥者痘證限期論痘證限期近日時醫以為十二日結痂之後便云收功古傳百日內皆痘科事也愚有表侄女於三四月間出痘漿行不足百日內患目目珠高出眼外延至次年二月方死死時面現五色忽而青而赤而黃而白而黑蓋毒氣遍歷五臟三晝夜而後氣絶至今思之猶覺慘甚醫者可不慎哉十二日者結痂之限也況結痂之限亦無定期兒生三歲以後者方以十二日為準若初周以後只九日限耳未周一歲之孩不過七日限行漿務令滿足論近時人心不古競尚粉飾草草了事痘頂初渾便云漿足病家不知惟醫是聽漿不足者發痘毒猶可醫治若發於關節隱處亦致喪命或成廢人患目煩躁者百無一生即不死而雙目失明矣愚經歷不少漿色大約以黃豆色為準痘多者腿腳稍清猶可愚一生所治之痘痘後毫無遺患無他謬巧行漿足也近時之弊大約有三一由於七日前過用寒涼七日後又不知補托畏溫藥如虎甚至一以大黃從事此用藥之不精也二由於不識漿色此目力之不精也三由於存心粉飾心地之不慈也餘存心不敢粉飾不忍粉飾口過直而心過慈以致與世不合目擊兒之顛連疾苦而莫能救不亦大可哀哉今作此論力矯時弊實從數十年經歷中得來見痘後之證百難於痘前蓋痘前有漿可上痘後無漿可行痘前自內而外出外出者順痘後自外而內陷內陷者逆也毒陷於絡猶可以法救之毒陷於臟而臟真傷考古竟無良法可救由逆痘而死者醫可以對兒由治法不精而遺毒死者其何以對小兒哉閲是論者其思慎之於始乎疹論若明六氣為病疹不難治但疹之限期最迫只有三日一以辛涼為主如俗所用防風廣皮升麻柴胡之類皆在所禁俗見疹必表外道也大約先用辛涼清解後用甘涼收功赤疹誤用麻黃三春柳等辛溫傷肺以致喘咳欲厥者初用辛涼加苦梗旋覆花上提下降甚則用白虎加旋覆杏仁繼用甘涼加旋覆草以救之咳大減者去之凡小兒連咳數十聲不能回轉半日方回如雞聲者千金葦莖湯合葶藶大棗瀉肺湯主之近世用大黃者殺之也蓋葶藶走肺經氣分雖兼走大腸然從上下降而又有大棗以載之緩之使不急於趨下大黃則純走腸胃血分下有形之滯並不走肺徒傷其無過之地故也若固執病在臟瀉其腑之法則誤矣瀉白散不可妄用論錢氏制瀉白散方用桑白皮地骨皮甘草粳米治肺火皮膚蒸熱日晡尤甚喘咳氣急面腫熱鬱肺逆等證歷來注此方者只言其功不知其弊如李時珍以為瀉肺諸方之準繩雖明如王晉三葉天士猶率意用之愚按此方治熱病後與小兒痘後外感已盡真氣不得歸元咳嗽上氣身虛熱者甚良若兼一毫外感即不可用如風寒風溫正盛之時而用桑皮地骨或於別方中加桑皮或加地骨如油入面錮結而不可解矣考金匱金瘡門中王不留行散取用桑東南根白皮以引生氣燒灰存性以止血仲景方後自注云小瘡即粉之大瘡但服之産後亦可服如風寒桑根勿取之沈目南注云風寒表邪在經絡桑根下降故勿取之愚按桑白皮雖色白入肺然桑得箕星之精箕好風風氣通於肝實肝經之本藥也且桑葉橫紋最多而主絡故蠶食桑葉而成絲絲絡象也桑皮純絲結成象筋亦主絡肝主筋主血絡亦主血象筋與絡者必走肝同類相從也肝經下絡隂器如樹根之蟠結於土中桑根最為堅結詩稱徹彼桑土易言繫於苞桑是也再按腎脈之直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中肺與腎為子母金下生水桑根之性下達而堅結由肺下走肝腎者也內傷不妨用之外感則引邪入肝腎之隂而咳嗽永不愈矣吾從妹八九歲時春日患傷風咳嗽醫用杏蘇散加桑白皮至今將五十歲咳嗽永無愈期年重一年試思如不可治之嗽當早死矣如可治之嗽何以至四十年不愈哉亦可以知其故矣遇見小兒久嗽不愈者多因桑皮地骨凡服過桑皮地骨而嗽不愈者即不可治伏陷之邪無法使之上出也至於地骨皮之不可用者余因仲景先師風寒禁桑皮而悟入者也蓋凡樹木之根皆生地中而獨枸杞之根名地骨者何蓋拘杞之根深入黃泉無所終極古又名之曰仙人杖蓋言凡人莫得而知其所終也木本之入下最深者未有如地骨者故獨異衆根而獨得地骨之名凡藥有獨異之形獨異之性得獨異之名者必有獨異之功能亦必有獨異之偏勝也地骨入下最深稟少隂水隂之氣主骨蒸之勞熱力能至骨有風寒外感者而可用之哉或曰桑皮地骨良藥也子何畏之若是余曰人參甘草非良藥耶實證用人參中滿用甘草外感用桑皮地骨同一弊也萬物各有偏勝論無不偏之藥則無統治之方如方書內所云某方統治四時不正之氣甚至有兼治內傷産婦者皆不通之論也近日方書盛行者莫過汪訒庵醫方集解一書其中此類甚多以其書文理頗通世多讀之而不知其非也天下有一方而可以統治四時者乎宜春者即不宜夏宜春夏者更不宜秋冬餘一生體認物情只有五穀作飯可以統治四時餓病其他未之聞也在五穀中尚有偏勝最中和者莫過飲食且有冬日飲湯夏日飲水之別況於藥乎得天地五運六氣之全者莫如人人之本源雖一而人之氣質其偏勝為何如者人之中最中和者莫如聖人而聖人之中且有偏於任偏於清偏於和之異千古以來不偏者數人而已常人則各有其偏如靈樞所載隂陽五等可知也降人一等禽與獸也降禽獸一等木也降木一等草也降草一等金與石也用藥治病者用偏以矯其偏以藥之偏勝太過故有宜用有宜避者合病情者用之不合者避之而已無好尚無畏忌惟病是從醫者性情中正和平然後可以用藥自不犯偏於寒熱溫涼一家之固執而亦無籠統治病之弊矣草木各得一太極論古來著本草者皆逐論其氣味性情未嘗總論夫形體之大綱生長化收藏之運用茲特補之蓋蘆主生干與枝葉主長花主化子主收根主藏木也草則收藏皆在子凡干皆升蘆勝於干凡葉皆散花勝於葉凡枝皆走絡須勝於枝凡根皆降子勝於根由蘆之升而長而化而收子則復降而升而化而收矣此草木各得一太極之理也愚之學實不足以著書是編之作補苴罅漏而已末附二卷解兒難解産難簡之又簡只摘其吃緊大端與近時流弊約略言之耳覽者諒之
