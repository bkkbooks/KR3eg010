body:
  text: 卷一上焦篇風溫溫熱溫疫溫毒冬溫一溫病者有風溫有溫熱有溫疫有溫毒有暑溫有濕溫有秋燥有冬溫有溫瘧此九條見於王叔和傷寒例中居多叔和又牽引難經之文以神其說按時推病實有是證叔和治病時亦實遇是證但叔和不能別立治法而敘於傷寒例中實屬矇混以傷寒論為治外感之妙法遂將一切外感悉收入傷寒例中而悉以治傷寒之法治之後人亦不能打破此關因仍苟簡千餘年來貽患無窮皆叔和之作俑無怪見駁於方有執喻嘉言諸公也然諸公雖駁叔和亦未曾另立方法喻氏雖立治法仍不能脫𨚫傷寒圈子弊與叔和無二以致後人無所遵依本論詳加考核准古酌今細立治法除傷寒宗仲景法外俾四時雜感朗若列眉未始非叔和有以肇其端東垣河間安道又可嘉言天士宏其議而瑭得以善其後也風溫者初春陽氣始開厥隂行令風夾溫也溫熱者春末夏初陽氣弛張溫盛為熱也溫疫者厲氣流行多兼穢濁家家如是若役使然也溫毒者諸溫夾毒穢濁太甚也暑溫者正夏之時暑病之偏於熱者也濕溫者長夏初秋濕中生熱即暑病之偏於濕者也秋燥者秋金燥烈之氣也冬溫者冬應寒而反溫陽不潛藏民病溫也溫瘧者隂氣先傷又因於暑陽氣獨發也按諸家論溫有顧此失彼之病故是編首揭諸溫之大綱而名其書曰溫病條辨二凡病溫者始於上焦在手太隂傷寒由毛竅而入自下而上始足太陽足太陽膀胱屬水寒即水之氣同類相從故病始於此古來但言膀胱主表殆未盡其義肺者皮毛之合也獨不主表乎按人身一臟一腑主表之理人皆習焉不察以三才大道言之天為萬物之大表天屬金人之肺亦屬金肺主皮毛經曰皮應天天一生水地支始於子而亥為天門乃貞元之會人之膀胱為寒水之腑故俱同天氣而俱主表也治法必以仲景六經次傳為祖法溫病由口鼻而入自上而下鼻通於肺始手太隂太隂金也溫者火之氣風者火之母火未有不剋金者故病始於此必從河間三焦定論再寒為隂邪雖傷寒論中亦言中風此風從西北方來乃觱發之寒風也最善收引隂盛必傷陽故首郁遇太陽經中之陽氣而為頭痛身熱等證太陽陽腑也傷寒隂邪也隂盛傷人之陽也溫為陽邪此論中亦言傷風此風從東方來乃解凍之溫風也最善發泄陽盛必傷隂故首郁遏太隂經中之隂氣而為咳嗽自汗口渴頭痛身熱尺熱等證太隂隂臟也溫熱陽邪也陽盛傷人之隂也隂陽兩大法門之辨可瞭然於心目間矣夫大明生於東月生於西舉凡萬物莫不由此少陽少隂之氣以為生成故萬物皆可名之曰東西人乃萬物之統領也得東西之氣最全乃與天地東西之氣相應其病也亦不能不與天地東西之氣相應東西者隂陽之道路也由東而往為木為風為濕為火為熱濕土居中與火交而成暑火也者南也由西而往為金為燥為水為寒水也者北也水火者隂陽之徵兆也南北者隂陽之極致也天地運行此隂陽以化生萬物故曰天之無恩而大恩生天地運行之隂陽和平人生之隂陽亦和平安有所謂病也矣天地與人之隂陽一有所偏即為病也偏之淺者病淺偏之深者病深偏於火者病溫病熱偏於水者病清病寒此水火兩大法門之辨醫者不可不知燭其為水之病也而溫之熱之燭其為火之病也而涼之寒之各救其偏以抵於平和而已非如鑑之空一塵不染如衡之平毫無倚著不能暗合道妙豈可各立門戶專主於寒熱溫涼一家之論而已哉瑭因辨寒病之原於水溫病之原於火也而並及之三太隂之為病脈不緩不緊而動數或兩寸獨大尺膚熱頭痛微惡風寒身熱自汗口渴或不渴而咳午後熱甚者名曰溫病不緩則非太陽中風矣不緊則非太陽傷寒矣動數者風火相煽之象經謂之燥兩寸獨大火剋金也尺膚熱尺部肌膚熱甚火反剋水也頭痛惡風寒身熱自汗與太陽中風無異此處最足以相混於何辨之於脈動數不緩不緊證有或渴或咳尺熱午後熱甚辨之太陽頭痛風寒之邪循太陽經上至頭與項而項強頭痛也太隂之頭痛肺生天氣天氣鬱則頭亦痛也且春氣在頭又火炎上也吳又可謂浮泛太陽經者臆說也傷寒之惡寒太陽屬寒水而主表故惡風寒溫病之惡寒肺合皮毛而亦主表故亦惡風寒也太陽病則周身之陽氣鬱故身熱肺主化氣肺病不能化氣氣鬱則身亦熱也太陽自汗風疏衛也太隂自汗皮毛開也肺亦主衛渴火剋金也咳肺氣鬱也午後熱甚濁邪歸下又火旺時也又隂受火克之象也四太隂風溫溫熱溫疫冬溫初起惡風寒者桂枝湯主之但熱不惡寒而渴者辛涼平劑銀翹散主之溫毒暑溫濕溫溫瘧不在此例按仲景傷寒論原文太陽病謂如太陽證即上文頭痛身熱惡風自汗也但惡熱不惡寒而渴者名曰溫病桂枝湯主之蓋溫病忌汗最喜解肌桂枝本為解肌且桂枝芳香化濁芍藥收隂斂液甘草敗毒和中薑棗調和營衛溫病初起原可用之此處𨚫變易前法惡風寒者主以桂枝不惡風寒主以辛涼者非敢擅違古訓也仲景所云不惡風寒者非全不惡風寒也其先亦惡風寒逮既熱之後乃不惡風寒耳古文簡質且對太陽中風熱時亦惡風寒言之故不暇詳耳蓋寒水之病冬氣也非辛溫春夏之氣不足以解之雖曰溫病既惡風寒明是溫自內發風寒從外搏成內熱外寒之證故仍舊用桂枝辛溫解肌法俾得微汗而寒熱之邪皆解矣溫熱之邪春夏氣也不惡風寒則不兼寒風可知此非辛涼秋金之氣不足以解之桂枝辛溫以之治溫是以火濟火也故改從內經風淫於內治以辛涼佐以苦甘法桂枝湯方桂枝六錢芍藥炒三錢炙甘草二錢生薑三片大棗去核二枚煎法服法必如傷寒論原文而後可不然不惟失桂枝湯之妙反生他變病必不除辛涼平劑銀翹散方連翹一兩銀花一兩苦桔梗六錢薄荷六錢竹葉四錢生甘草五錢芥穗四錢淡豆豉五錢牛蒡子六錢上杵為散每服六錢鮮葦根湯煎香氣大出即取服勿過煎肺藥取輕清過煎則味厚而入中焦矣病重者約二時一服日三服夜一服輕者三時一服日二服夜一服病不解者作再服蓋肺位最高藥過重則過病所少用又有病重藥輕之患故從普濟消毒飲時時清揚法今人亦間有用辛涼法者多不見效蓋病大藥輕之故一不見效隨改弦易轍轉去轉遠即不更張緩緩延至數日後必成中下焦證矣胸膈悶者加藿香三錢鬱金三錢護膻中渴甚者加花粉項腫咽痛者加馬勃元參衄者去芥穗豆豉加白茅根三錢側柏炭三錢梔子炭三錢咳者加杏仁利肺氣二三日病猶在肺熱漸入里加細生地麥冬保津液再不解或小便短者加知母黃芩梔子之苦寒與麥地之甘寒合化隂氣而治熱淫所勝方論按溫病忌汗汗之不惟不解反生他患蓋病在手經徒傷足太陽無益病自口鼻吸受而生徒發其表亦無益也且汗為心液心陽受傷必有神明內亂譫語癲狂內閉外脫之變再誤汗雖曰傷陽汗乃五液之一未始不傷隂也傷寒論曰尺脈微者為裡虛禁汗其義可見其曰傷陽者特舉其傷之重者而言之耳溫病最善傷隂用藥又復傷隂豈非為賊立幟乎此古來用傷寒法治溫病之大錯也至若吳又可開首立一達原飲其意以為直透膜原使邪速潰其方施於藜藿壯實人之溫疫病容有愈者芳香闢穢之功也若施於膏粱紈褲及不甚壯實人未有不敗者蓋其方中首用檳榔草果厚朴為君夫檳榔子之堅者也諸子皆降檳榔苦辛而溫體重而堅由中走下直達肛門中下焦藥也草果亦子也其氣臭烈大熱其味苦太隂脾經之劫藥也厚朴苦溫亦中焦藥也豈有上焦溫病首用中下焦苦溫雄烈劫奪之品先劫少隂津液之理知母黃芩亦皆中焦苦燥里藥豈可用乎況又有溫邪遊溢三陽之說而有三陽經之羌活葛根柴胡加法是仍以傷寒之法雜之全不知溫病治法後人止謂其不分三焦猶淺說也其三消飲加入大黃芒硝惟邪入陽明氣體稍壯者幸得以下而解或戰汗而解然往往成弱證虛甚者則死矣況邪有在衛者在胸中者在營者入血者妄用下法其害可勝言耶豈視人與鐵石一般並非氣血生成者哉究其始意原以矯世醫以傷寒法治病溫之弊頗能正陶氏之失奈學未精純未足為法至喻氏張氏多以傷寒三隂經法治溫病其說亦非以世醫從之者少而宗又可者多故不深辨耳本方謹遵內經風淫於內治以辛涼佐以苦甘熱淫於內治以鹹寒佐以甘苦之訓王安道溯洄集亦有溫暑當用辛涼不當用辛溫之論謂仲景之書為即病之傷寒而設並未嘗為不即病之溫暑而設張鳳逵集治暑方亦有暑病首用辛涼繼用甘寒再用酸泄酸斂不必用下之論皆先得我心者又宗喻嘉言芳香逐穢之說用東垣清心涼膈散辛涼苦甘病初起且去入里之黃芩勿犯中焦加銀花辛涼芥穗芳香散熱解毒牛蒡子辛平潤肺解熱散結除風利咽皆手太隂藥也合而論之經謂冬不藏精春必溫病又謂藏於精者春不病溫又謂病溫虛甚死可見病溫者精氣先虛此方之妙預護其虛純然清肅上焦不犯中下無開門揖盜之弊有輕以去實之能用之得法自然奏效此葉氏立法所以迥出諸家也五太隂溫病惡風寒服桂枝湯已惡寒解余病不解者銀翹散主之餘證悉減者減其制太隂溫病總上條所舉而言也惡寒已解是全無風寒止餘溫病即禁辛溫法改從辛涼減其制者減銀翹散之制也六太隂風溫但咳身不甚熱微渴者辛涼輕劑桑菊飲主之咳熱傷肺絡也身不甚熱病不重也渴而微熱不甚也恐病輕藥重故另立輕劑方辛涼輕劑桑菊飲方杏仁二錢連翹一錢五分薄荷八分桑葉二錢五分菊花一錢苦梗二錢甘草八分葦根二錢水二杯煮取一杯日二服二三日不解氣粗似喘燥在氣分者加石膏知母舌絳暮熱甚燥邪初入營加元參二錢犀角一錢在血分者去薄荷葦根加麥冬細生地玉竹丹皮各二錢肺熱甚加黃芩渴者加花粉方論此辛甘化風辛涼微苦之方也蓋肺為清虛之臟微苦則降辛涼則平立此方所以避辛溫也今世僉用杏蘇散通治四時咳嗽不知杏蘇散辛溫只宜風寒不宜風溫且有不分表裡之弊此方獨取桑葉菊花者桑得箕星之精箕好風風氣通於肝故桑葉善平肝風春乃肝令而主風木旺金衰之候故抑其有餘桑葉芳香有細毛橫紋最多故亦走肺絡而宣肺氣菊花晚成芳香味甘能補金水二臟故用之以補其不足風溫咳嗽雖系小病常見誤用辛溫重劑銷鑠肺液致久嗽成勞者不一而足聖人不忽於細必謹於微醫者於此等處尤當加意也七太隂溫病脈浮洪舌黃渴甚大汗面赤惡熱者辛涼重劑白虎湯主之脈浮洪邪在肺經氣分也舌黃熱已深渴甚津已傷也大汗熱逼津液也面赤火炎上也惡熱邪欲出而未遂也辛涼平劑焉能勝任非虎嘯風生金飈退熱而又能保津液不可前賢多用之辛涼重劑白虎湯方生石膏研一兩知母五錢生甘草三錢白粳米一合水八杯煮取三杯分溫三服病退減後服不知再作服方論義見法下不再立論下仿此八太隂溫病脈浮大而芤汗大出微喘甚至鼻孔扇者白虎加人參湯主之脈若散大者急用之倍人參浮大而芤幾於散矣隂虛而陽不固也補隂藥有鞭長莫及之虞惟白虎退邪陽人參固正陽使陽能生隂乃救化源欲絶之妙法也汗湧鼻扇脈散皆化源欲絶之徵兆也白虎加人參湯方即於前方內加人參三錢九白虎本為達熱出表若其人脈浮弦而細者不可與也脈沉者不可與也不渴者不可與也汗不出者不可與也常須識此勿令誤也此白虎之禁也按白虎剽悍邪重非其力不舉用之得當原有立竿見影之妙若用之不當禍不旋踵懦者多不敢用未免坐誤事機孟浪者不問其脈證之若何一概用之甚至石膏用至斤余之多應手而效者固多應手而斃者亦復不少皆未真知確見其所以然之故故手下無準的也十太隂溫病氣血兩燔者玉女煎去牛膝加元參主之氣血兩燔不可專治一邊故選用張景嶽氣血兩治之玉女煎去牛膝者牛膝趨下不合太明證之用改熟地為細生地者亦取其輕而不重涼而不溫之義且細生地能發血中之表也加元參者取其壯水制火預防咽痛失血等證也玉女煎去牛膝熟地加細生地元參方辛涼合甘寒法生石膏一兩知母四錢元參四錢細生地六錢麥冬六錢水八杯煮取三杯分二次服渣再煮一鍾服十一太隂溫病血從上溢者犀角地黃湯合銀翹散主之其中焦病者以中焦法治之若吐粉紅血水者死不治血從上溢脈七八至以上面反黑者死不治可用清絡育隂法血從上溢溫邪逼迫血液上走清道循清竅而出故以銀翹散敗溫毒以犀角地黃清血分之伏熱而救水即所以救金也至粉紅水非血非液實血與液交迫而出有燎原之勢化源速絶血從上溢而脈至七八至面反黑火極而似水反兼勝己之化也亦燎原之勢莫制下焦津液虧極不能上濟君火君火反與溫熱之邪合德肺金其何以堪故皆主死化源絶乃溫病第一死法也仲子曰敢問死孔子曰未知生焉知死瑭以為醫者不知死焉能救生細按溫病死狀百端大綱不越五條在上焦有二一曰肺之化源絶者死二曰心神內閉內閉外脫者死在中焦亦有二一曰陽明太實土剋水者死二曰脾郁發黃黃極則諸竅為閉穢濁塞竅者死在下焦則無非熱邪深入消鑠津液涸盡而死也犀角地黃湯方見下焦篇銀翹散方見前已用過表藥者去豆豉芥穗薄荷十二太隂溫病口渴甚者雪梨漿沃之吐白沫黏滯不快者五汁飲沃之此皆甘寒救液法也雪梨漿方甘冷法以甜水梨大者一枚薄切新汲涼水內浸半日時時頻飲五汁飲方甘寒法梨汁荸薺汁鮮葦根汁麥冬汁藕汁或用蔗漿臨時斟酌多少和勻涼服不甚喜涼者重湯燉溫服十三太隂病得之二三日舌微黃寸脈盛心煩懊憹起臥不安欲嘔不得嘔無中焦證梔子豉湯主之溫病二三日或已汗或未汗舌微黃邪已不全在肺中矣寸脈盛心煩懊憹起臥不安欲嘔不得邪在上焦膈中也在上者因而越之故湧之以梔子開之以香豉梔子豉湯方酸苦法梔子搗碎五枚香豆豉六錢水四杯先煮梔子數沸後納香豉煮取二杯先溫服一杯得吐止後服十四太隂病得之二三日心煩不安痰涎壅盛胸中痞塞欲嘔者無中焦證瓜蒂散主之虛者加參蘆此與上條有輕重之分有有痰無痰之別重劑不可輕用病重藥輕又不能了事故上條止用梔子豉湯快湧膈中之熱此以痰涎壅盛必用瓜蒂散急吐之恐邪入包宮而成痙厥也瓜蒂梔子之苦寒合赤小豆之甘酸所謂酸苦湧泄為隂善吐熱痰亦在上者因而越之方也瓜蒂散方酸苦法甜瓜蒂一錢赤小豆研二錢山梔子二錢水二杯煮取一杯先服半杯得吐止後服不吐再服虛者加人參蘆一錢五分十五太隂溫病寸脈大舌絳而干法當渴今反不渴者熱在營中也清營湯去黃連主之渴乃溫之本病今反不渴滋人疑惑而舌絳且干兩寸脈大的系溫病蓋邪熱入營蒸騰營氣上升故不渴不可疑不渴非溫病也故以清營湯清營分之熱去黃連者不欲其深入也清營湯見暑溫門中十六太隂溫病不可發汗發汗而汗不出者必發斑疹汗出過多者必神昏譫語發斑者化斑湯主之發疹者銀翹散去豆豉加細生地丹皮大青葉倍元參主之禁升麻柴胡當歸防風羌活白芷葛根三春柳神昏譫語者清宮湯主之牛黃丸紫雪丹局方至寶丹亦主之溫病忌汗者病由口鼻而入邪不在足太陽之表故不得傷太陽經也時醫不知而誤發之若其人熱甚血燥不能蒸汗溫邪鬱於肌表血分故必發斑疹也若其表疏一發而汗出不止汗為心液誤汗亡陽心陽傷而神明亂中無所主故神昏心液傷而心血虛心以隂為體心隂不能濟陽則心陽獨亢心主言故譫語不休也且手經逆傳世罕知之手太隂病不解本有必傳手厥隂心包之理況又傷其氣血乎化斑湯方石膏一兩知母四錢生甘草三錢元參三錢犀角二錢白粳米一合水八杯煮取三杯日三服渣再煮一鍾夜一服方論此熱淫於內治以鹹寒佐以苦甘法也前人悉用白虎湯作化斑湯者以其為陽明證也陽明主肌肉斑家遍體皆赤自內而外故以石膏清肺胃之熱知母清金保肺而治陽明獨勝之熱甘草清熱解毒和中粳米清胃熱而保胃液白粳米陽明燥金之歲谷也本論獨加元參犀角者以斑色正赤木火太過其變最速但用白虎燥金之品清肅上焦恐不勝任故加元參啓腎經之氣上交於肺庶水天一氣上下循環不致泉源暴絶也犀角鹹寒稟水木火相生之氣為靈異之獸具陽剛之體主治百毒蠱疰邪鬼瘴氣取其鹹寒救腎水以濟心火托斑外出而又敗毒闢瘟也再病至發斑不獨在氣分矣故加二味涼血之品銀翹散去豆豉加細生地丹皮大青葉倍元參方即於前銀翹散內去豆豉加細生地四錢大青葉三錢丹皮三錢元參加至一兩方論銀翹散義見前加四物取其清血熱去豆豉畏其溫也按吳又可有托裡舉斑湯不言疹者混斑疹為一氣也考溫病中發疹者十之七八發斑者十之二三蓋斑乃純赤或大片為肌肉之病故主以化斑湯專治肌肉疹系紅點高起麻瘄痧皆一類系血絡中病故主以芳香透絡辛涼解肌甘寒清血也其托裡舉斑湯方中用歸升柴芷穿山甲皆溫燥之品豈不畏其灼津液乎且前人有痘宜溫疹宜涼之論實屬確見況溫疹更甚於小兒之風熱疹乎其用升柴取其升發之義不知溫病多見於春夏發生之候天地之氣有升無降豈用再以升藥升之乎且經謂冬藏精者春不病溫是溫病之人下焦精氣久已不固安庸再升其少陽之氣使下竭上厥乎經謂無實實無虛虛必先歲氣無伐天和可不知耶後人皆尤而效之實不讀經文之過也再按時人發溫熱之表二三日汗不出者即云斑疹蔽伏不惟用升柴羌葛且重以山川柳發之不知山川柳一歲三花故得三春之名俗轉音三春為山川此柳古稱柳木詩所謂其柳其椐者是也其性大辛大溫生髮最速橫枝極細善能入絡專發虛寒白疹若溫熱氣血沸騰之赤疹豈非見之如仇乎夫善治溫病者原可不必出疹即有邪郁二三日或三五日既不得汗有不得不疹之勢亦可重者化輕輕者化無若一派辛溫剛燥氣受其災而移於血豈非自造斑疹乎再時醫每於疹已發出便稱放心不知邪熱熾甚之時正當謹慎一有疏忽為害不淺再疹不忌瀉若里結須微通之不可令大泄致內虛下陷法在中焦篇清宮湯方元參心三錢蓮子心五分竹葉捲心二錢連翹心二錢犀角尖磨沖二錢連心麥冬三錢加減法熱痰盛加竹瀝梨汁各五匙咯痰不清加栝蔞皮一錢五分熱毒盛加金汁人中黃漸欲神昏加銀花三錢荷葉二錢石菖蒲一錢方論此鹹寒甘苦法清膻中之方也謂之清宮者以膻中為心之宮城也俱用心者凡心有生生不已之意心能入心即以清穢濁之品便補心中生生不已之生氣救性命於微芒也火能令人昏水能令人清神昏譫語水不足而火有餘又有穢濁也且離以坎為體元參味苦屬水補離中之虛犀角靈異味鹹闢穢解毒所謂靈犀一點通善通心氣色黑補水亦能補離中之虛故以二物為君蓮心甘苦鹹倒生根由心走腎能使心火下通於腎又回環上升能使腎水上潮於心故以為使連翹象心心能退心熱竹葉心鋭而中空能通竅清心故以為佐麥冬之所以用心者本經稱其主心腹結氣傷中傷飽胃脈絡絶試問去心焉能散結氣補傷中通傷飽續胃脈絡絶哉蓋麥冬稟少隂癸水之氣一本橫生根顆連絡有十二枚者有十四五枚者所以然之故手足三陽三隂之絡共有十二加任之尾翳督之長強共十四又加脾之大絡共十五此物性合人身自然之妙也惟聖人能體物象察物情用麥冬以通續絡脈命名與天冬並稱門冬者冬主閉藏門主開轉謂其有開合之功能也其妙處全在一心之用從古並未有去心之明文張隱菴謂不知始自何人相沿已久而不可改瑭遍考始知自陶弘景始也蓋陶氏惑於諸心入心能令人煩之一語不知麥冬無毒載在上品久服身輕安能令人煩哉如參朮耆草以及諸仁諸子莫不有心亦皆能令人煩而悉去之哉陶氏之去麥冬心智者千慮之失也此方獨取其心以散心中穢濁之結氣故以之為臣安宮牛黃丸方牛黃一兩鬱金一兩犀角一兩黃連一兩硃砂一兩梅片二錢五分麝香二錢五分真珠五錢山梔一兩雄黃一兩金箔衣黃芩一兩上為極細末煉老蜜為丸每丸一錢金箔為衣蠟護脈虛者人參湯下脈實者銀花薄荷湯下每服一丸兼治飛尸卒厥五癇中惡大人小兒痙厥之因於熱者大人病重體實者日再服甚至日三服小兒服半丸不知再服半丸方論此芳香化穢濁而利諸竅鹹寒保腎水而安心體苦寒通火腑而瀉心用之方也牛黃得日月之精通心主之神犀角主治百毒邪鬼瘴氣真珠得太隂之精而通神明合犀角補水救火鬱金草之香梅片木之香按冰片洋外老杉木浸成近世以樟腦打成僞之樟腦發水中之火為害甚大斷不可用雄黃石之香麝香乃精血之香合四香以為用使閉固之邪熱溫毒深在厥隂之分者一齊從內透出而邪穢自消神明可復也黃連瀉心火梔子瀉心與三焦之火黃芩瀉膽肺之火使邪火隨諸香一齊俱散也硃砂補心體瀉心用合金箔墜痰而鎮固再合真珠犀角為督戰之主帥也紫雪丹方從本事方去黃金滑石一斤石膏一斤寒水石一斤磁石水煮二斤搗煎去渣入後藥羚羊角五兩木香五兩犀角五兩沉香五兩丁香一兩升麻一斤元參一斤炙甘草半斤以上八味共搗銼入前藥汁中煎去渣入後藥朴硝硝石各二斤提淨入前藥汁中微火煎不住手將柳木攪候汁欲凝再加入後二味辰砂研細三兩麝香研細一兩二錢入煎藥拌勻合成退火氣冷水調服一二錢方論諸石利水火而通下竅磁石元參補肝腎之隂而上濟君火犀角羚羊瀉心膽之火甘草和諸藥而敗毒且緩肝急諸藥皆降獨用一味升麻蓋欲降先升也諸香化穢濁或開上竅或開下竅使神明不致坐困於濁邪而終不克復其明也丹砂色赤補心而通心火內含汞而補心體為坐鎮之用諸藥用氣硝獨用質者以其水滷結成性峻而易消瀉火而散結也局方至寶丹方犀角鎊一兩硃砂飛一兩琥珀研一兩玳瑁鎊一兩牛黃五錢麝香五錢以安息重湯燉化和諸藥為丸一百丸蠟護方論此方會萃各種靈異皆能補心體通心用除邪穢解熱結共成撥亂反正之功大抵安宮牛黃丸最涼紫雪次之至寶又次之主治略同而各有所長臨用對證斟酌可也十七邪入心包舌蹇肢厥牛黃丸主之紫雪丹亦主之厥者盡也隂陽極造其偏皆能致厥傷寒之厥足厥隂病也溫熱之厥手厥隂病也舌卷囊縮雖同系厥隂現證要之舌屬手囊屬足也蓋舌為心竅包絡代心用事腎囊前後皆肝經所過斷不可以隂陽二厥混而為一若陶節庵所云冷過肘膝便為隂寒恣用大熱再熱厥之中亦有三等有邪在絡居多而陽明證少者則從芬香本條所云是也有邪搏陽明陽明太實上衝心包神迷肢厥甚至通體皆厥當從下法本論載入中焦篇有日久邪殺隂虧而厥者則從育隂潛陽法本論載入下焦篇牛黃丸紫雪丹方並見前十八溫毒咽痛喉腫耳前耳後腫頰腫面正赤或喉不痛但外腫甚則耳聾俗名大頭溫蝦蟆溫者普濟消毒飲去柴胡升麻主之初起一二日再去芩連三四日加之佳瘟毒者穢濁也凡地氣之穢未有不因少陽之氣而自能上升者春夏地氣發泄故多有是證秋冬地氣間有不藏之時亦或有是證人身之少隂素虛不能上濟少陽少陽升騰莫制亦多成是證小兒純陽火多隂未充長亦多有是證咽痛者經謂一隂一陽結謂之喉痺蓋少隂少陽之脈皆循喉嚨少隂主君火少陽主相火相濟為災也耳前耳後頰前腫者皆少陽經脈所過之地頰車不獨為陽明經穴也面赤者火色也甚則耳聾者兩少陽之脈皆入耳中火有餘則清竅閉也治法總不能出李東垣普濟消毒飲之外其方之妙妙在以涼膈散為主而加化清氣之馬勃殭蠶銀花得輕可去實之妙再加元參牛蒡板藍根敗毒而利肺氣補腎水以上濟邪火去柴胡升麻者以升騰飛越太過之病不當再用升也說者謂其引經亦甚愚矣凡藥不能直至本經者方用引經藥作引此方皆系輕藥總走上焦開天氣肅肺氣豈須用升柴直升經氣耶去黃芩黃連者芩連里藥也病初起未至中焦不得先用里藥故犯中焦也普濟消毒飲去升麻柴胡黃芩黃連方連翹一兩薄荷三錢馬勃四錢牛蒡子六錢芥穗三錢殭蠶五錢元參一兩銀花一兩板藍根五錢苦梗一兩甘草五錢上共為粗末每服六錢重者八錢鮮葦根湯煎去渣服約二時一服重者一時許一服十九溫毒外腫水仙膏主之並主一切癰瘡按水仙花得金水之精隆冬開花味苦微辛寒滑無毒苦能升火敗毒辛能散邪熱之結寒能勝熱滑能利痰其妙用全在汁之膠黏能拔毒外出使毒邪不致深入臟腑傷人也水仙膏方水仙花根不拘多少剝去老赤皮與根鬚入石臼搗如膏敷腫處中留一孔出熱氣干則易之以肌膚上生黍米大小黃瘡為度二十溫毒敷水仙膏後皮間有小黃瘡如黍米者不可再敷水仙膏過敷則痛甚而爛三黃二香散主之三黃取其峻瀉諸火而不爛皮膚二香透絡中餘熱而定痛三黃二香散方苦辛芳香法黃連一兩黃柏一兩生大黃一兩乳香五錢沒藥五錢上為極細末初用細茶汁調敷干則易之繼則用香油調敷二一溫毒神昏譫語者先與安宮牛黃丸紫雪丹之屬繼以清宮湯安宮牛黃丸紫雪丹清宮湯方法並見前暑溫二二形似傷寒但右脈洪大而數左脈反小於右口渴甚面赤汗大出者名曰暑溫在手太隂白虎湯主之脈芤甚者白虎加人參湯主之此標暑溫之大綱也按溫者熱之漸熱者溫之極也溫盛為熱木生火也熱極濕動火生土也上熱下濕人居其中而暑成矣若純熱不兼濕者仍歸前條溫熱例不得混入暑也形似傷寒者謂頭痛身痛發熱惡寒也水火極不同性各造其偏之極反相同也故經謂水極而似火也火極而似水也傷寒傷於水氣之寒故先惡寒而後發熱寒鬱人身衛陽之氣而為熱也故仲景傷寒論中有已發熱或未發熱之文若傷暑則先發熱熱極而後惡寒蓋火盛必剋金肺性本寒而復惡寒也然則傷暑之發熱惡寒雖與傷寒相似其所以然之故實不同也學者誠能究心於此思過半矣脈洪大而數甚則芤對傷寒之脈浮緊而言也獨見於右手者對傷寒之左脈大而言也右手主上焦氣分且火剋金也暑從上而下不比傷寒從下而上左手主下焦血分也故傷暑之左脈反小於右口渴甚面赤者對傷寒太陽證面不赤口不渴而言也火爍津液故口渴火甚未有不煩者面赤者煩也煩字從火後頁謂火現於面也汗大出者對傷寒汗不出而言也首白虎例者蓋白虎乃秋金之氣所以退煩暑白虎為暑溫之正例也其源出自金匱守先聖之成法也白虎湯白虎加人參湯方並見前二三金匱謂太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下則淋甚可與東垣清暑益氣湯張石頑注謂太陽中暍發熱惡寒身重而疼痛此因暑而傷風露之邪手太陽標證也手太陽小腸屬火上應心包二經皆能制金爍肺肺受火刑所以發熱惡寒似足太陽證其脈或見弦細或見芤遲小便已灑然毛聳此熱傷肺胃之氣陽明本證也愚按小便已灑然毛聳似乎非陽明證乃足太陽膀胱證也蓋膀胱主水火邪太甚而制金則寒水來為金母復仇也所謂五行之極反兼勝已之化發汗則惡寒甚者氣虛重奪當作傷其津當作陽也溫針則發熱甚者重傷經中之液轉助時火肄虐於外也數下之則淋甚者劫其在裡之隂熱勢乘機內陷也此段經文本無方治東垣特立清暑益氣湯足補仲景之未逮愚按此言太過仲景當日必有不可立方之故或曾立方而後世脫簡皆未可知豈東垣能立而仲景反不能立乎但細按此證恰可與清暑益氣湯曰可者僅可而有所未盡之詞尚望遇是證者臨時斟酌盡善至沈目南金匱要略注謂當用辛涼甘寒實於此證不合蓋身重疼痛證兼寒濕也即目南自注謂發熱惡寒身重疼痛其脈弦細芤遲內暑而兼隂濕之變也豈有隂濕而用甘寒柔以濟柔之理既曰隂濕豈辛涼所能勝任不待辨而自明清暑益氣湯方辛甘化陽酸甘化隂復法黃耆一錢黃柏一錢麥冬一錢青皮一錢白朮一錢五分升麻三分當歸七分炙草一錢神麯一錢人參一錢澤瀉一錢五味子八分陳皮一錢蒼朮一錢五分葛根三分生薑二片大棗二枚水五杯煮取二杯渣再煎一杯分溫三服虛者得宜實者禁用汗不出而但熱者禁用二四手太隂暑溫如上條證但汗不出者新加香薷飲主之證如上條指形似傷寒右脈洪大左手反小面赤口渴而言但以汗不能自出表實為異故用香薷飲發暑邪之表也按香薷辛溫芳香能由肺之經而達其絡鮮扁豆花凡花皆散取其芳香而散且保肺液以花易豆者惡其呆滯也夏日所生之物多能解暑惟扁豆花為最如無花時用鮮扁豆皮若再無此用生扁豆皮厚朴苦溫能泄食滿厚朴皮也雖走中焦究竟肺主皮毛以皮從皮不為治上犯中若黃連甘草純然里藥暑病初起且不必用恐引邪深入故易以連翹銀花取其辛涼達肺經之表純從外走不必走中也溫病最忌辛溫暑病不忌者以暑必兼濕濕為隂邪非溫不解故此方香薷厚朴用辛溫而余則佐以辛涼云下文濕溫論中不惟不忌辛溫且用辛熱也新加香薷飲方辛溫復辛涼法香薷二錢銀花三錢鮮扁豆花三錢厚朴二錢連翹二錢水五杯煮取二杯先服一杯得汗止後服不汗再服服盡不汗再作服二五手太隂暑溫服香薷飲微得汗不可再服香薷飲重傷其表暑必傷氣最令表虛雖有餘證知在何經以法治之按傷寒非汗不解最喜發汗傷風亦非汗不解最忌發汗只宜解肌此麻桂之異其治即異其法也溫病亦喜汗解最忌發汗只許辛涼解肌辛溫又不可用妙在導邪外出俾營衛氣血調和自然得汗不必強責其汗也若暑溫濕溫則又不然暑非汗不解可用香薷發之發汗之後大汗不止仍歸白虎法固不比傷寒傷風之漏汗不止而必欲桂附護陽實表亦不可屢虛其表致令厥脫也觀古人暑門有生脈散法其義自見二六手太隂暑溫或已經發汗或未發汗而汗不止煩渴而喘脈洪大有力者白虎湯主之脈洪大而芤者白虎加人參湯主之身重者濕也白虎加蒼朮湯主之汗多脈散大喘喝欲脫者生脈散主之此條與上文少異者只已經發汗一句白虎加蒼朮湯方即於白虎湯內加蒼朮三錢汗多而脈散大其為陽氣發泄太甚內虛不司留戀可知生脈散酸甘化隂守隂所以留陽陽留汗自止也以人參為君所以補肺中元氣也生脈散方酸甘化隂法人參三錢麥冬不去心二錢五味子一錢水三杯煮取八分二杯分二次服渣再煎服脈不斂再作服以脈斂為度二七手太隂暑溫發汗後暑證悉減但頭微脹目不了了餘邪不解者清絡飲主之邪不解而入中下焦者以中下法治之既曰餘邪不可用重劑明矣只以芳香輕藥清肺絡中餘邪足矣倘病深而入中下焦又不可以淺藥治深病也清絡飲方辛涼芳香法鮮荷葉邊二錢鮮銀花二錢西瓜翠衣二錢鮮扁豆花一枝絲瓜皮二錢鮮竹葉心二錢水二杯煮取一杯日二服凡暑傷肺經氣分之輕證皆可用之二八手太隂暑溫但咳無痰咳聲清高者清絡飲加甘草桔梗甜杏仁麥冬知母主之咳而無痰不嗽可知咳聲清高金音清亮久咳則啞偏於火而不兼濕也即用清絡飲清肺絡中無形之熱加甘桔開提甜杏仁利肺而不傷氣麥冬知母保肺隂而制火也清絡飲加甘桔甜杏仁麥冬湯知母方即於清絡飲內加甘草一錢枯梗二錢甜杏仁二錢麥冬三錢知母三錢二九兩太隂暑溫咳而且嗽咳聲重濁痰多不甚渴渴不多飲者小半夏加茯苓湯再加厚朴杏仁主之既咳且嗽痰涎復多咳聲重濁重濁者土音也其兼足太隂濕土可知不甚渴渴不多飲則其中之有水可知此暑溫而兼水飲者也故以小半夏加茯苓湯蠲飲和中再加厚朴杏仁利肺瀉濕預奪其喘滿之路水用甘瀾取其走而不守也此條應入濕溫𨚫列於此處者以與上條為對待之文可以互證也小半夏加茯苓湯再加厚朴杏仁方辛溫淡法半夏八錢茯苓塊六錢厚朴三錢生薑五錢杏仁三錢甘瀾水八杯煮取三杯溫服日三三十脈虛夜寐不安煩渴舌赤時有譫語目常開不閉或喜閉不開暑入手厥隂也手厥隂暑溫清營湯主之舌白滑者不可與也夜寐不安心神虛而陽不得入隂也煩渴舌赤心用恣而心體虧也時有譫語神明欲亂也目常開不閉目為火戶火性急常欲開以泄其火且陽不下交於隂也或喜閉不喜開者隂為亢陽所損隂損則惡見陽光也故以清營湯急清宮中之熱而保離中之虛也若舌白滑不惟熱重濕亦重矣濕重忌柔潤藥當於濕溫例中求之故曰不可與清營湯也清營湯方鹹寒苦甘法犀角三錢生地五錢元參三錢竹葉心一錢麥冬三錢丹參二錢黃連一錢五分銀花三錢連翹連心用二錢水八杯煮取三杯日三服三一手厥隂暑溫身熱不惡寒清神不了了時時譫語者安宮牛黃丸主之紫雪丹亦主之身熱不惡寒已無手太隂證神氣欲昏而又時時譫語不比上條時有譫語謹防內閉故以芳香開竅苦寒清熱為急安宮牛黃丸紫雪丹方義並見前三二暑溫寒熱舌白不渴吐血者名曰暑瘵為難治清絡飲加杏仁薏仁滑石湯主之寒熱熱傷於表也舌白不渴濕傷於裡也皆在氣分而又吐血是表裡氣血俱病豈非暑瘵重證乎此證純清則礙虛純補則礙邪故以清絡飲清血絡中之熱而不犯手加杏仁利氣氣為血帥故也薏仁滑石利在裡之濕冀邪退氣寧而血可止也清絡飲加杏仁薏仁滑石湯方即於清絡飲內加杏仁二錢滑石末三錢薏仁三錢服法如前三三小兒暑溫身熱卒然痙厥名曰暑癇清營湯主之亦可少與紫雪丹小兒之隂更虛於大人況暑月乎一得暑溫不移時有過衛入營者蓋小兒之臟腑薄也血絡受火邪逼迫火極而內風生俗名急驚混與發散消導死不旋踵惟以清營湯清營分之熱而保津液使液充陽和自然汗出而解斷斷不可發汗也可少與紫雪者清包絡之熱而開內竅也三四大人暑癇亦同上法熱初入營肝風內動手足瘛瘲可於清營湯中加勾藤丹皮羚羊角清營湯紫雪丹方法並見前伏暑按暑溫伏暑名雖異而病實同治法須前後互參故中下焦篇不另一門三五暑兼濕熱偏於暑之熱者為暑溫多手太隂證而宜清偏於暑之濕者為濕溫多足太隂證而宜溫溫熱平等者兩解之各宜分曉不可混也此承上起下之文按暑溫濕溫古來方法最多精妙不比前條溫病毫無尺度本論原可不必再議特以內經有先夏至為病溫後夏至為病暑之明文是暑與溫流雖異而源則同不得言溫而遺暑言暑而遺濕又以歷代名家悉有矇混之弊蓋夏日三氣雜感本難條分縷晰惟葉氏心靈手巧精思過人案中治法絲絲入扣可謂匯衆善以為長者惜時人不能知其一二然其法散見於案中章程未定淺學者讀之有望洋之嘆無怪乎後人之無階而升也故本論托拾其大概粗定規模俾學者有路可尋精妙甚多不及備録學者仍當參考名家細繹葉案而後可以深造再按張潔古云靜而得之為中暑動而得之為中熱中暑者隂證中熱者陽證嗚呼潔古筆下如是不了了後人奉以為規矩準繩此醫道之所以難言也試思中暑竟無動而得之者乎中熱竟無靜而得之者乎似難以動靜二字分暑熱又云中暑者隂證暑字從日日豈隂物乎暑中有火火豈隂邪乎暑中有隂耳濕是也非純隂邪也中熱者陽證斯語誠然要知熱中亦兼穢濁穢濁亦隂類也是中熱非純無隂也蓋潔古所指之中暑即本論後文之濕溫也其所指之中熱即本論前條之溫熱也張景嶽又細分隂暑陽暑所謂隂暑者即暑之偏於濕而成足太隂之裡證也陽暑者即暑之偏於熱而成手太隂之表證也學者非目無全牛不能批隙中款宋元以來之名醫多自以為是而不求之自然之法象無怪乎道之常不明而時人之隨手殺人也可勝慨哉三六長夏受暑過夏而發者名曰伏暑霜未降而發者少輕霜既降而發者則重冬日發者尤重子午醜未之年為多也長夏盛暑氣壯者不受也稍弱者但頭暈片刻或半日而已次則即病其不即病而內舍於骨髓外舍於分肉之間氣虛者也蓋氣虛不能傳送暑邪外出必待秋涼金氣相搏而後出也金氣本所以退煩暑金欲退之而暑無所藏故伏暑病發也其有氣虛甚者雖金風亦不能擊之使出必待深秋大涼初冬微寒相逼而出故尤為重也子午醜未之年為獨多者子午君火司天暑本於火也醜未濕土司天暑得濕則留也三七頭痛微惡寒面赤煩渴舌白脈濡而數者雖在冬月猶為太隂伏暑也頭痛惡寒與傷寒無異面赤煩渴則非傷寒矣然猶似傷寒陽明證若脈濡而數則斷斷非傷寒矣蓋寒脈緊風脈緩暑脈弱濡則弱之象弱即濡之體也濡即離中虛火之象也緊即坎中滿水之象也火之性熱水之性寒象各不同性則迥異何世人悉以伏暑作傷寒治而用足六經羌葛柴芩每每殺人哉象各不同性則迥異故曰雖在冬月定其非傷寒而為伏暑也冬月猶為伏暑秋日可知伏暑之與傷寒猶男女之別一則外實中虛一則外虛中實豈可混哉三八太隂伏暑舌白口渴無汗者銀翹散去牛蒡元參加杏仁滑石主之此邪在氣分而表實之證也三九太隂伏暑舌赤口渴無汗者銀翹散加生地丹皮赤芍麥冬主之此邪在血分而表實之證也四十太隂伏暑舌白口渴有汗或大汗不止者銀翹散去牛蒡子元參芥穗加杏仁石膏黃芩主之脈洪大渴甚汗多者仍用白虎法脈虛大而芤者仍用人參白虎法此邪在氣分而表虛之證也四一太隂伏暑舌赤口渴汗多加減生脈散主之此邪在血分而表虛之證也銀翹散去牛蒡子元參加杏仁滑石方即於銀翹散內去牛蒡子元參加杏仁六錢飛滑石一兩服如銀翹散法胸悶加鬱金四錢香豉四錢嘔而痰多加半夏六錢茯苓六錢小便短加薏仁八錢白通草四錢銀翹散加生地丹皮赤芍麥冬方即於銀翹散內加生地六錢丹皮四錢赤芍四錢麥冬六錢服法如前銀翹散去牛蒡子元參芥穗加杏仁石膏黃芩方即於銀翹散內去牛蒡子元參芥穗加杏仁六錢生石膏二兩黃芩五錢服法如前白虎法白虎加人參法俱見前加減生脈散方酸甘化隂沙參三錢麥冬二錢五味子一錢丹皮二錢細生地三錢水五杯煮二杯分溫再服四二伏暑暑溫濕溫證本一源前後互參不可偏執濕溫寒濕四三頭痛惡寒身重疼痛舌白不渴脈弦細而濡面色淡黃胸悶不飢午後身熱狀若隂虛病難速已名曰濕溫汗之則神昏耳聾甚則目瞑不欲言下之則洞泄潤之則病深不解長夏深秋冬日同法三仁湯主之頭痛惡寒身重疼痛有似傷寒脈弦濡則非傷寒矣舌白不渴面色淡黃則非傷暑之偏於火者矣胸悶不飢濕閉清陽道路也午後身熱狀若隂虛者濕為隂邪隂邪自旺於隂分故與隂虛同一午後身熱也濕為隂邪自長夏而來其來有漸且其性氤氳黏膩非若寒邪之一汗而解溫熱之一涼則退故難速已世醫不知其為濕溫見其頭痛惡寒身重疼痛也以為傷寒而汗之汗傷心陽濕隨辛溫發表之藥蒸騰上逆內蒙心竅則神昏上蒙清竅則耳聾目瞑不言見其中滿不飢以為停滯而大下之誤下傷隂而重抑脾陽之升脾氣轉陷濕邪乘勢內漬故洞泄見其午後身熱以為隂虛而用柔藥潤之濕為膠滯隂邪再加柔潤隂藥二隂相合同氣相求遂有錮如而不可解之勢惟以三仁湯輕開上焦肺氣蓋肺主一身之氣氣化則濕亦化也濕氣瀰漫本無形質以重濁滋味之藥治之愈治愈壞伏暑濕溫吾鄉俗名秋呆子悉以陶氏六書法治之不知從何處學來醫者呆反名病呆不亦誣乎再按濕溫較諸溫病勢雖緩而實重上焦最少病勢不甚顯張中焦病最多詳見中焦篇以濕為隂邪故也當於中焦求之三仁湯方杏仁五錢飛滑石六錢白通草二錢白蔻仁二錢竹葉二錢厚朴二錢生薏仁六錢半夏五錢甘瀾水八碗煮取三碗每服一碗日三服四四濕溫邪入心包神昏肢逆清宮湯去蓮心麥冬加銀花赤小豆皮煎送至寶丹或紫雪丹亦可濕溫著於經絡多身痛身熱之候醫者誤以為傷寒而汗之遂成是證仲景謂濕家忌發汗發汗則病痙濕熱相搏循經入絡故以清宮湯清包中之熱邪加銀花赤豆以清濕中之熱而又能直入手厥隂也至寶丹去穢濁復神明若無至寶即以紫雪代之清宮湯去蓮心麥冬加銀花赤小豆皮方犀角一錢連翹心三錢元參心二錢竹葉心二錢銀花二錢赤小豆皮三錢至寶丹紫雪丹方並見前四五濕溫喉阻咽痛銀翹馬勃散主之肺主氣濕溫者肺氣不化鬱極而一隂一陽謂心與膽也之火俱結也蓋金病不能平木木反挾心火來刑肺金喉即肺系其閉在氣分者即阻閉在血分者即痛也故以輕藥開之銀翹馬勃散方辛涼微苦法連翹一兩牛蒡子六錢銀花五錢射干三錢馬勃二錢上杵為散服如銀翹散法不痛但阻甚者加滑石六錢桔梗五錢葦根五錢四六太隂濕溫氣分痺鬱而噦者俗名為厄宣痺湯主之上焦清陽膹郁亦能致噦治法故以輕宣肺痺為主宣痺湯苦辛通法枇杷葉二錢鬱金一錢五分射干一錢白通草一錢香豆豉一錢五分水五杯煮取二杯分二次服四七太隂濕溫喘促者千金葦莖湯加杏仁滑石主之金匱謂喘在上焦其息促太隂濕蒸為痰喘息不寧故以葦莖湯輕宣肺氣加杏仁滑石利竅而逐熱飲若寒飲喘咳者治屬飲家不在此例千金葦莖湯加滑石杏仁湯辛淡法葦莖五錢薏苡仁五錢桃仁二錢冬瓜仁二錢滑石三錢杏仁三錢水八杯煮取三杯分三次服四八金匱謂太陽中暍身熱疼痛而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之此熱少濕多陽郁致病之方法也瓜蒂湧吐其邪暑濕俱解而清陽復辟矣一物瓜蒂湯方瓜蒂二十個上搗碎以逆流水八杯煮取三杯先服一杯不吐再服吐停後服虛者加參蘆三錢四九寒濕傷陽形寒脈緩舌淡或白滑不渴經絡拘束桂枝姜附湯主之載寒濕所以互證濕溫也按寒濕傷表陽中經絡之證金匱論之甚詳茲不備録獨採葉案一條以見濕寒濕溫不可混也形寒脈緩舌白不渴而經絡拘束全系寒證故以姜附溫中白朮燥溫桂枝通行表陽也桂枝姜附湯苦辛熱法桂枝六錢乾薑三錢白朮生三錢熟附子三錢水五杯煮取二杯渣再煮一杯服溫瘧五十骨節疼煩時嘔其脈如平但熱不寒名曰溫瘧白虎加桂枝湯主之隂氣先傷陽氣獨發故但熱不寒令人消爍肌肉與伏暑相似亦溫病之類也彼此實足以相混故附於此可以參觀而並見治以白虎加桂枝湯者以白虎保肺清金峻瀉陽明獨勝之熱使不消爍肌肉單以桂枝一味領邪外出作嚮導之官得熱因熱用之妙經云奇治之不治則偶治之偶治之不治則求其屬以衰之是也又謂之復方白虎加桂枝湯方辛涼苦甘復辛溫法知母六錢生石膏一兩六錢粳米一合桂枝木三錢炙甘草二錢水八碗煮取三碗先服一碗得汗為知不知再服知後仍服一劑中病即已五一但熱不寒或微寒多熱舌乾口渴此乃隂氣先傷陽氣獨發名曰疸瘧五汁飲主之仲景於疸瘧條下謂以飲食消息之並未出方調如是重病而不用藥特出飲食二字重胃氣可知陽明於臟象為陽土於氣運為燥金病系隂傷陽獨法當救隂何疑重胃氣法當救胃隂何疑制陽土燥金之偏勝配孤陽之獨亢非甘寒柔潤而何此喻氏甘寒之論其超卓無比倫也葉氏宗之後世學者咸當宗之矣五汁飲方見前加減法此甘寒救胃隂之方也欲清表熱則加竹葉連翹欲瀉陽明獨勝之熱而保肺之化源則加知母欲救隂血則加生地元參欲宣肺氣則加杏仁欲行三焦開邪出路則加滑石五二舌白渴飲咳嗽頻仍寒從背起伏暑所致名曰肺瘧杏仁湯主之肺瘧瘧之至淺者肺瘧雖云易解稍緩則深最忌用治瘧印板俗例之小柴胡湯蓋肺去少陽半表半裡之界尚遠不得引邪深入也故以杏仁湯輕宣肺氣無使邪聚則愈杏仁湯方苦辛寒法杏仁三錢黃芩一錢五分連翹一錢五分滑石三錢桑葉一錢五分茯苓塊三錢白蔻皮八分梨皮二錢水三杯煮取二杯日再服五三熱多昏狂譫語煩渴舌赤中黃脈弱而數名曰心瘧加減銀翹散主之兼穢舌濁口氣重者安宮牛黃丸主之心瘧者心不受邪受邪則死瘧邪始受在肺逆傳心包絡其受之淺者以加減銀翹散清肺與膈中之熱領邪出衛其受之重其邪閉心包之竅則有閉脫之危故以牛黃丸清宮城而安君主也加減銀翹散方辛涼兼芳香法連翹十分銀花八分元參五分麥冬五分不去心犀角五分竹葉三分共為粗末每服五錢煎成去渣點荷葉汁二三茶匙日三服安宮牛黃丸方見前秋燥五四秋感燥氣右脈數大傷手太隂氣分者桑杏湯主之前人有云六氣之中惟燥不為病似不盡然蓋以內經少秋感於燥一條故有此議耳如陽明司天之年豈無燥金之病乎大抵春秋二令氣候較夏冬之偏寒偏熱為平和其由於冬夏之伏氣為病者多其由於本氣自病者少其由於伏氣而病者重本氣自病者輕耳其由於本氣自病之燥證初起必在肺衛故以桑杏湯清氣分之燥也桑杏湯方辛涼法桑葉一錢杏仁一錢五分沙參二錢象貝一錢香豉一錢梔皮一錢梨皮一錢水二杯煮取一杯頓服之重者再作服輕藥不得重用重用必過病所再一次煮成三杯其二三次之氣味必變藥之氣味俱輕故也五五感燥而咳者桑菊飲主之亦救肺衛之輕劑也桑菊飲方見前五六燥傷肺胃隂分或熱或咳者沙參麥冬湯主之此條較上二條則病深一層矣故以甘寒救其津液沙參麥冬湯甘寒法沙參三錢玉竹二錢生甘草一錢冬桑葉一錢五分麥冬三錢生扁豆一錢五分花粉一錢五分水五杯煮取二杯日再服久熱久咳者加地骨皮三錢五七燥氣化火清竅不利者翹荷湯主之清竅不利如耳鳴目赤齦脹咽痛之類翹荷湯者亦清上焦氣分之燥熱也翹荷湯辛涼法薄荷一錢五分連翹一錢五分生甘草一錢黑梔皮一錢五分桔梗二錢緑豆皮二錢水二杯煮取一杯頓服之日服二劑甚者日三加減法耳鳴者加羚羊角苦丁茶目赤者加鮮菊葉苦丁茶夏枯草咽痛者加牛蒡子黃芩五八諸氣膹郁諸痿喘嘔之因於燥者喻氏清燥救肺湯主之喻氏云諸氣膹郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香行氣絶無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古今治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而惟喘屬之上矣所以千百方中亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即瀉氣間有一二用潤劑者又不得其肯綮總之內經六氣脫誤秋傷於燥一氣指長夏之濕為秋之燥後人不敢更端其說置此一氣於不理即或明知理燥而用藥夾雜如弋獲飛蟲茫無定法示人也今擬此方命名清燥救肺湯大約以胃氣為主胃土為肺金之母也其天門冬雖能保肺然味苦而氣滯恐反傷胃阻痰故不用也其知母能滋腎水清肺金亦以苦而不用至於病寒降火正治之藥尤在所忌蓋肺金自至於燥所存隂氣不過一線耳倘更以苦寒下其氣傷其胃其人尚有生理乎誠仿此增損以救肺燥變生諸證如沃焦救焚不厭其頻庶克有濟耳清燥救肺湯方辛涼甘潤法石膏二錢五分甘草一錢霜桑葉三錢人參七分杏仁泥七分胡麻仁炒研一錢阿膠八分麥冬不去心二錢枇杷葉去淨毛炙六分水一碗煮六分頻頻二三次溫服痰多加貝母栝蔞血枯加生地黃熱甚加犀角羚羊角或加牛黃補秋燥勝氣論按前所序之秋燥方論乃燥之復氣也標氣也蓋燥屬金而剋木木之子少陽相火也火氣來復故現燥熱乾燥之證又靈樞謂丙丁為手之兩陽合明辰巳為足之兩陽合明陽明本燥標陽也前人謂燥氣化火經謂燥金之下火氣承之皆謂是也案古方書無秋燥之病近代以來惟喻氏始補燥氣論其方用甘潤微寒葉氏亦有燥氣化火之論其方用辛涼甘潤乃素問所謂燥化於天熱反勝之治以辛涼佐以苦甘法也瑭襲前人之舊故但敘燥證復氣如前書已告成竊思與素問燥淫所勝不合故雜說篇中特著燥論一條詳言正化對化勝氣復氣以補之其於燥病勝氣之現於三焦者究未出方論乃不全之書心終不安嗣得沈目南先生醫徵溫熱病論內有秋燥一篇議論通達正大茲採而録之於後間有偏勝不園之處又詳辨之並特補燥證勝氣治法如下再按勝復之理與正化對化從本從標之道近代以來多不深求注釋之家亦不甚考如仲景傷寒論中之麻桂姜附治寒之勝氣也治寒之正化也治寒之本病也白虎承氣治寒之復氣也治寒之對化也治寒之標病也餘氣俱可從此類推太陽本寒標熱對化為火蓋水勝必剋火故經載太陽司天心病為多末總結之曰病本於心心火受病必剋金白虎所以救金也金受病則堅剛牢固滯塞不通復氣為土土性壅塞反來克本身之真水承氣所以泄金與土而救水也再經謂寒淫所勝以咸瀉之從來注釋家不過隨文釋義其所以用方之故究未達出本論不能遍注傷寒偶舉一端以例其餘明者得此門經熟玩內經自可迎刃而解能解傷寒其於本論自無難解者矣由是推之六氣皆然耳沈目南燥病論曰天元紀大論云天以六為節地以五為制蓋六乃風寒暑濕燥火為節五即木火土金水為制然天氣主外而一氣司六十日有奇地運主內而一運主七十二日有奇故五運六氣合行而終一歲乃天然不易之道也內經失去長夏傷於濕秋傷於燥所以燥證湮沒至今不明先哲雖有言之皆是內傷津血乾枯之證非謂外感清涼時氣之燥然燥氣起於秋分以後小雪以前陽明燥金涼氣司令經云陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳據此經文燥令必有涼氣感人肝木受邪而為燥也惟近代喻嘉言昂然表出可為後世蒼生之幸奈以諸氣膹郁諸痿喘嘔咳不止而出白血死謂之燥病此乃傷於內者而言誠與外感燥證不相及也更自制清燥救肺湯皆以滋隂清涼之品施於火熱刑金肺氣受熱者宜之若治燥病則以涼投涼必反增病劇殊不知燥病屬涼謂之次寒病與感寒同類經以寒淫所勝治以甘熱此但燥淫所勝平以苦溫乃外用苦溫辛溫解表與冬月寒冷而用麻桂姜附其法不同其和中攻裡則一故不立方蓋內經六氣但分隂陽主治以風熱火三氣屬陽同治但藥有辛涼苦寒鹹寒之異濕燥寒三氣屬隂同治但藥有苦熱苦溫甘熱之不同仲景所以立傷寒溫病二論為大綱也蓋性理大全謂燥屬次寒奈後賢悉謂屬熱大相徑庭如盛夏暑熱熏蒸則人身汗出濈濈肌肉潮潤而不燥也冬月寒凝肅殺而人身乾槁燥冽故深秋燥令氣行人體肺金應之肌膚亦燥乃火令無權故燥屬涼前人謂熱非矣按先生此論可謂獨具隻眼不為流俗所汩沒者其責喻氏補燥論用甘寒滋隂之品殊失燥淫所勝平以苦溫之法亦甚有理但謂諸氣膹郁諸痿喘嘔咳不止出白血盡屬內傷則於理缺園蓋因內傷而致此證者固多由外感餘邪在絡轉化轉熱而致此證者亦復不少瑭前於風溫咳嗽條下駁杏蘇散補桑菊飲方論內極言咳久留邪致損之故與此證同一理也謂清燥救肺湯治燥之復氣斷非治燥之勝氣喻氏自無從致辨若謂竟與燥不相及未免各就一邊談理蓋喻氏之清燥救肺湯即傷寒論中後半截之復脈湯也傷寒必兼母氣之燥故初用辛溫甘熱繼用辛涼苦寒終用甘潤因其氣化之所至而然也至謂仲景立傷寒溫病二大綱如素問所云寒暑六入暑統風火寒統燥濕一切外感皆包於內其說尤不盡然蓋尊信仲景太過而失之矣若然則仲景之書當名六氣論或外感論矣何以獨名傷寒論哉蓋仲景當日著書原為傷寒而設並未遍著外感其論溫論暑論濕偶一及之也即先生亦補醫徵溫熱病論若系全書何容又補哉瑭非好辨恐後學眉目不清尊信前輩太過反將一切外感總混入傷寒論中此近代以來之大弊禍未消滅尚敢如此立論哉一秋燥之氣輕則為燥重則為寒化氣為濕復氣為火揭燥氣之大綱兼敘其子母之氣勝復之氣而燥氣自明重則為寒者寒水為燥金之子也化氣為濕者土生金濕土其母氣也至真要大論曰陽明厥隂不從標本從乎中也又曰從本者化生於本從標本者有標本之化從中者以中氣為化也按陽明之上燥氣治之中見太隂故本論初未著燥金本氣方論而於瘧疝等證附見於寒濕條下葉氏醫案謂伏暑內發新涼外加多見於伏暑類中仲景金匱多見於腹痛瘧疝門中二燥傷本臟頭微痛惡寒咳嗽稀痰鼻塞嗌塞脈弦無汗杏蘇散主之本臟者肺胃也經有嗌塞而咳之明文故上焦之病自此始燥傷皮毛故頭微痛惡寒也微痛者不似傷寒之痛甚也陽明之脈上行頭角故頭亦痛也咳嗽稀痰者肺惡寒古人謂燥為小寒也肺為燥氣所搏不能通調水道故寒飲停而咳也鼻塞者鼻為肺竅嗌寒者嗌為肺系也脈弦者寒兼飲也無汗者涼搏皮毛也按杏蘇散減小青龍一等此條當與下焦篇所補之痰飲數條參看再杏蘇散乃時人統治四時傷風咳嗽通用之方本論前於風溫門中已駁之矣若傷燥涼之咳治以苦溫佐以甘辛正為合拍若受重寒夾飲之咳則有青龍若傷春風與燥已化火無痰之證則仍從桑菊飲桑杏湯例杏蘇散方蘇葉半夏茯苓前胡苦桔梗枳殼甘草生薑大棗去核桔皮杏仁加減法無汗脈弦甚或緊加羌活微透汗汗後咳不止去蘇葉羌活加蘇梗兼泄瀉腹滿者加蒼朮厚朴頭痛兼眉稜骨痛者加白芷熱甚加黃芩泄瀉腹滿者不用方論此苦溫甘辛法也外感燥涼故以蘇葉前胡辛溫之輕者達表無汗脈緊故加羌活辛溫之重者微發其汗甘桔從上開枳杏前芩從下降則嗌塞鼻塞宣通而咳可止桔半茯苓逐飲而補肺胃之陽以白芷易原方之白朮者白朮中焦脾藥也白芷肺胃本經之藥也且能溫肌肉而達皮毛薑棗為調和營衛之用若表涼退而里邪未除咳不止者則去走表之蘇葉加降里之蘇梗泄瀉腹滿金氣太實之裡證也故去黃芩之苦寒加朮朴之苦辛溫也三傷燥如傷寒太陽證有汗不咳不嘔不痛者桂枝湯小和之如傷寒太陽證者指頭痛身痛惡風寒而言也有汗不得再發其汗亦如傷寒例但燥較寒為輕故少與桂枝小和之也桂枝湯方見前四燥金司令頭痛身寒熱胸脅痛甚則疝瘕痛者桂枝柴胡各半湯加吳萸楝子茴香木香湯主之此金勝剋木也本病與金病並見表裡齊病故以柴胡達少陽之氣即所達肝木之氣合桂枝而外出太陽加芳香定痛苦溫通降也濕燥寒同為隂邪故仍從足經例桂枝柴胡各半湯加吳萸楝子茴香木香湯方治以苦溫佐以甘辛法桂枝吳茱萸黃芩柴胡人參廣木香生薑白芍大棗去核川楝子小茴香半夏炙甘草五燥淫傳入中焦脈短而澀無表證無下證胸痛腹脅脹痛或嘔或泄苦溫甘辛以和之燥雖傳入中焦既無表裡證不得誤汗誤下但以苦溫甘辛和之足矣脈短而澀者長為木短為金滑為潤澀為燥也胸痛者肝脈絡胸也腹痛者金氣剋木木病剋土也脅痛者肝木之本位也嘔者亦金剋木病也泄者陽明之上燥氣治之中見太隂也或者不定之辭有痛而兼嘔與泄者有不嘔而但泄者有不泄而但嘔者有不兼嘔與泄而但痛者病情有定病勢無定故但出法而不立方學者隨證化裁可也藥用苦溫甘辛者經謂燥淫所勝治以苦溫佐以甘辛以苦下之蓋苦溫從火化以剋金甘辛從陽化以勝隂也以苦下之者金性堅剛介然成塊病深堅結非下不可下文即言下之證六陽明燥證裡實而堅未從熱化下之以苦溫已從熱化下之以苦寒燥證陽明裡實而堅滿經統言以苦下之以苦泄之今人用下法多以苦寒不知此證當別已化未化用溫下寒下兩法隨證施治方為的確未從熱化之脈必仍短澀澀即兼緊也面必青黃苦溫下法如金匱大黃附子細辛湯新方天台烏藥散見下焦篇寒濕門加巴豆霜之類已從熱化之脈必數而堅面必赤舌必黃再以他證參之苦寒下法如三承氣之類而小承氣無芒硝輕用大黃或酒炒重用枳朴則微兼溫矣附治驗丙辰年瑭治一山隂幕友車姓年五十五歲鬚髮已白大半臍左堅大如盤隱隱微痛不大便數十日先延外科治之外科以大承氣下之三四次終不通延余診視按之堅冷如石面色青黃脈短澀而遲先尚能食屢下之後糜粥不進不大便已四十九日余曰此症也金氣之所結也以肝本抑鬱又感秋金燥氣小邪中里久而結成愈久愈堅非下不可然寒下非其治也以天台烏藥散二錢加巴豆霜一分薑湯和服設三伏以待之如不通第二次加巴豆霜分半再不通第三次加巴豆霜二分服至三次後始下黑亮球四十九枚堅莫能破繼以苦溫甘辛之法調理漸次能食又十五日不大便余如前法下至第二次而通下黑亮球十五枚雖亦堅結然破之能碎但燥極耳外以香油熬川椒尉其堅處內服苦溫芳香透絡月餘化盡於此證方知燥金氣傷人如此而溫下寒下之法斷不容紊也乙丑年治通廷尉久疝不愈時年六十八歲先是通廷尉外任時每發疝醫者必用人參故留邪在絡久不得愈至乙丑季夏受涼復發堅結肛門坐臥不得脹痛不可忍汗如雨下七日不大便余曰疝本寒邪凡結堅牢固皆屬金象況現在勢甚危急非溫下不可亦用天台烏藥散一錢巴豆霜分許下至三次始通通後痛漸定調以倭硫黃丸兼用金匱蜘蛛散漸次化淨以上治驗二條俱系下焦證以出陽明堅結下法連類而及七燥氣延入下焦搏於血分而成癥者無論男婦化癥回生丹主之大邪中表之燥證感而激發者誠如目南先生所云與傷寒同法學者衡其輕重可耳前所補數條除減傷寒法等差二條胸脅腹痛一條與傷寒微有不同余俱兼疝瘕者以經有燥淫所勝男子㿗疝女子少腹痛之明文疝瘕已多見寒濕門中瘧證泄瀉嘔吐已多見於寒濕濕溫門中此特補小邪中里深入下焦血分堅結不散之痼疾若不知絡病宜緩通治法或妄用急攻必犯瘕散為蠱之戒此蠱乃血蠱也在婦人更多為極重難治之證學者不可不預防之也化癥回生丹法系燥淫於內治以苦溫佐以甘辛以苦下之也方從金匱鱉甲煎丸與回生丹脫化而出此方以參桂椒姜通補陽氣白芍熟地守補隂液益母膏通補隂氣而消水氣鱉甲膠通補肝氣而消癥瘕余俱芳香入絡而化濁且以食血之蟲飛者走絡中氣分走者走絡中血分可謂無微不入無堅不破又以醋熬大黃三次約入病所不傷他臟久病堅結不散者非此不可或者病其藥味太多不知用藥之道少用獨用則力大而急多用衆用則功分而緩古人緩化之方皆然所謂有制之師不畏多無制之師少亦亂也此方合醋與蜜共三十六味得四九之數金氣生成之數也化癥回生丹方人參六兩安南桂二兩兩頭尖二兩麝香二兩片子薑黃二兩公丁香三兩川椒炭二兩虻蟲二兩京三稜二兩蒲黃炭一兩藏紅花二兩蘇木三兩桃仁三兩蘇子霜二兩五靈脂二兩降真香二兩乾漆二兩當歸尾四兩沒藥二兩白芍四兩杏仁三兩香附米二兩吳茱萸二兩元胡索二兩水蛭二兩阿魏二兩小茴香炭三兩川芎二兩乳香二兩良薑二兩艾炭二兩益母膏八兩熟地黃四兩鱉甲膠一斤大黃八兩共為細末以高米醋一斤半熬濃曬乾為末再加醋熬如是三次曬乾末之共為細末以鱉甲益母大黃三膠和勻再加煉蜜為丸重一錢五分蠟皮封護同時溫開水和空心服瘀甚之證黃酒下一治癥結不散不痛一治癥發痛甚一治血痺一治婦女乾血癆證之屬實者一治瘧母左脅痛而寒熱者一治婦女經前作痛古謂之痛經者一治婦女將欲行經而寒熱者一治婦女將欲行經誤食生冷腹痛者一治婦女經閉一治婦女經來紫黑甚至成塊者一治腰痛之因於跌撲死血者一治産後瘀血少腹痛拒按者一治跌撲昏暈欲死者一治金瘡棒瘡之有瘀滯者八燥氣久伏下焦不與血搏老年八脈空虛不可與化癥回生丹復亨丹主之金性沉著久而不散自非溫通絡脈不可既不與血搏成堅硬之塊發時痛脹有形痛止無形自不得傷無過之營血而用化癥矣復亨大義謂剝極而復復則能亨也其方以溫養溫燥兼用蓋溫燥之方可暫不可久況久病雖曰陽虛隂亦不能獨足至老年八脈空虛更當預護其隂故以石硫黃補下焦真陽而不傷隂之品為君佐以鹿茸枸杞人參茯苓蓯蓉補正而但以歸茴椒桂丁香萆薢通衝任與肝腎之邪也按解産難中已有通補奇經丸方此方可以不録但彼方專以通補八脈為主此則溫養溫燥合法且與上條為對待之方故並載之按難經任之為病男子為七疝女子為瘕聚七疝者朱丹溪謂寒疝水疝筋疝血疝氣疝狐疝㿗疝為七疝袖珍謂一厥二盤三寒四癥五附六脈七氣為七疝瘕者血病即婦人之疝也後世謂蛇瘕脂瘕青瘕黃瘕燥瘕狐瘕血瘕鱉瘕為八瘕蓋任為天癸生氣故多有形之積大抵有形之實證宜前方無形之虛證宜此方也按燥金遺病如瘧疝之類多見下焦篇寒濕濕溫門中再載在方書應收入燥門者尚多以限於篇幅不及備録已示門徑學者隅反可也復亨丹方苦溫甘辛法倭硫黃十分按倭硫黃者石硫黃也水土硫黃斷不可用鹿茸酒炙八分枸杞子六分人參四分雲茯苓八分淡蓯蓉八分安南桂四分全當歸酒浸六分小茴香六分酒浸與當歸同炒黑川椒炭三分萆薢六分炙龜板四分益母膏和為丸小梧桐子大每服二錢日再服冬日漸加至三錢開水下按前人燥不為病之說非將寒燥混入一門即混入濕門矣蓋以燥為寒之始與寒相似故混入寒門又以陽明之上燥氣治之中見太隂而陽明從中以中氣為化故又易混入濕門也但學醫之士必須眉目清楚復內經之舊而後中有定見方不越乎規矩也霹靂散方主治中燥吐瀉腹痛甚則四肢厥逆轉筋腿痛肢麻起臥不安煩躁不寧甚則六脈全無隂毒發斑疝瘕等證並一切凝寒痼冷積聚寒輕者不可多服寒重者不可少服以愈為度非實在純受濕燥寒三氣隂邪者不可服桂枝六兩公丁香四兩草果二兩川椒炒五兩小茴香炒四兩薤白四兩良薑三兩吳茱萸四兩五靈脂二兩降香五兩烏藥三兩乾薑三兩石菖蒲二兩防己三兩檳榔二兩蓽澄茄五兩附子三兩細辛二兩青木香四兩薏仁五兩雄黃五錢上藥共為細末開水和服大人每服三錢病重者五錢小人減半再病重者連服數次以痛止厥回或瀉止筋不轉為度方論按內經有五疫之稱五行偏勝之極皆可致疫雖癘氣之至多見火證而燥金寒濕之疫亦復時有蓋風火暑三者為陽邪與穢濁異氣相參則為溫癘濕燥寒三者為隂邪與穢濁異氣相參則為寒癘現在見證多有肢麻轉筋手足厥逆吐瀉腹痛脅肋疼痛甚至反惡熱而大渴思涼者經謂霧傷於上濕傷於下此證乃燥金寒濕之氣經謂陽明之上中見太隂又謂陽明從中治也直犯筋經由大絡別絡內傷三隂臟真所以轉筋入腹即死也既吐且瀉者隂陽逆亂也諸痛者燥金濕土之氣所搏也其渴思涼飲者少隂篇謂自利而渴者屬少隂虛故飲水求救也其頭面赤者隂邪上逼陽不能降所謂戴陽也其周身惡熱喜涼者隂邪盤踞於內陽氣無附欲散也隂病反見陽證所謂水極似火其受隂邪尤重也諸陽證畢現然必當臍痛甚拒按者方為陽中見純隂乃為真隂之證此處斷不可誤故立方會萃溫三隂經剛燥苦熱之品急溫臟真保住陽氣又重用芳香急驅穢濁一面由臟真而別絡大絡外出筋經經絡以達皮毛一面由臟絡腑絡以通六腑外達九竅俾穢濁隂邪一齊立解大抵皆扶陽抑隂所謂離照當空群隂退避也再此證自唐宋以後醫者皆不識系燥氣所幹凡見前證俗名曰痧近時竟有著痧證書者捉風捕影雜亂無章害人不淺即以痧論未有不幹天地之氣而漫然成痧者究竟所感何氣不能確切指出故立方毫無準的其誤皆在前人謂燥不為病又有燥氣化火之說瑭亦為其所誤故初刻書時再三疑慮辨難見於雜說篇中而正文只有化氣之火證無勝氣之寒證其燥不為病之誤誤在隂陽應象大論篇中脫秋傷於燥一條長夏傷於濕又錯秋傷於濕以為竟無燥證矣不知天元紀氣交變五運行五常政六微旨諸篇平列六氣燥氣之為病與諸氣同何嘗燥不為病哉經云風為百病之長按風屬木主仁大易曰元者善之長也得生生之機開生化之源尚且為病多端況金為殺厲之氣歐陽氏曰商者傷也主義主收主刑主殺其傷人也最速而暴竟有不終日而死者瑭目擊神傷故再三致意云
