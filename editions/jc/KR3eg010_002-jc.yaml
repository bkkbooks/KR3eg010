body:
  text: 卷二中焦篇風温温熱温疫温毒冬温一面目俱赤語聲重濁呼吸俱粗大便閉小便澀舌苔老黃甚則黑有芒刺但惡熱不惡寒日晡益甚者傳至中焦陽明温病也脈浮洪躁甚者白虎湯主之脈沉數有力甚則脈體反小而實者大承氣湯主之暑温濕温温瘧不在此例陽明之脈榮於面傷寒論謂陽明病面緣緣正赤火盛必剋金故目白睛亦赤也語聲重濁金受火刑而音不清也呼吸俱粗謂鼻息來去俱粗其粗也平等方是實證若來粗去不粗去粗來不粗或竟不粗則非陽明實證當細辨之粗則喘之漸也大便閉陽明實也小便澀火腑不通而隂氣不化也口燥渴火爍津也舌苔老黃肺受胃濁氣不化津也按靈樞論諸臟温病獨肺温病有舌苔之明文余則無有可見舌苔乃胃中濁氣熏蒸肺臟肺氣不化而然甚則黑者黑水色也火極而似水也又水勝火大凡五行之極盛必兼勝己之形芒刺苔久不化熱極而起堅硬之刺也倘刺軟者非實證也不惡寒但惡熱者傳至中焦已無肺證陽明者兩陽合明也温邪之熱與陽明之熱相搏故但惡熱也或用白虎或用承氣者證同而脈異也浮洪躁甚邪氣近表脈浮者不可下凡逐邪者隨其所在就近而逐之脈浮則出表為順故以白虎之金飆以退煩熱若沉小有力病純在裡則非下奪不可矣故主以大承氣按吳又可温疫論中雲舌苔邊白但見中微黃者即加大黃甚不可從雖云傷寒重在誤下温病重在誤汗即誤下不似傷寒之逆之甚究竟承氣非可輕嘗之品故云舌苔老黃甚則黑有芒刺脈體沉實的系燥結痞滿方可用之或問子言温病以手經主治力闢用足經藥之非今亦云陽明證者何陽明特非足經乎曰陽明如市胃為十二經之海土者萬物之所歸也諸病未有不過此者前人云傷寒傳足不傳手誤也一人不能分為兩截總之傷寒由毛竅而溪溪肉之分理之小者由溪而谷谷肉之分理之大者由谷而孫絡孫絡絡之至細者由孫絡而大絡由大絡而經此經即太陽經也始太陽終厥隂傷寒以足經為主未始不關手經也温病由口鼻而入鼻氣通於肺口氣通於胃肺病逆傳則為心包上焦病不治則傳中焦胃與脾也中焦病不治即傳下焦肝與腎也終上焦始下焦温病以手經為主未始不關足經也但初受之時斷不可以辛温發其陽耳葢傷寒傷人身之陽故喜辛温甘温苦熱以救其陽温病傷人身之隂故喜辛涼甘寒甘鹹以救其隂彼此對勘自可瞭然於心目中矣白虎湯方見上焦篇大承氣湯方大黃六錢芒硝三錢厚朴三錢枳實三錢水八杯先煮枳樸後納大黃芒硝煮取三杯先服一杯約二時許得利止後服不知再服一杯再不知再服方論此苦辛通降咸以入隂法承氣者承胃氣也葢胃之為腑體陽而用隂若在無病時本系自然下降今為邪氣蟠踞於中阻其下降之氣胃雖自欲下降而不能非藥力助之不可故承氣湯通胃結救胃隂仍系承胃腑本來下降之氣非有一毫私智鑿於其間也故湯名承氣學者若眞能透徹此義則施用承氣自無弊竇大黃盪滌熱結芒硝入隂軟堅枳實開幽門之不通厚朴瀉中宮之實滿厚朴分量不似傷寒論中重用者治温與治寒不同畏其燥也曰大承氣者合四藥而觀之可謂無堅不破無微不入故曰大也非眞正實熱蔽痼氣血俱結者不可用也若去入隂之芒硝則云小矣去枳樸之攻氣結加甘草以和中則云調胃矣二陽明温病脈浮而促者減味竹葉石膏湯主之脈促謂數而時止如趨者遇急忽一蹶然其勢甚急故以辛涼透表重劑逐邪外出則愈減味竹葉石膏湯方辛涼合甘寒法竹葉五錢石膏八錢麥冬六錢甘草三錢水八杯煮取三杯一時服一杯約三時令盡三陽明温病諸證悉有而微脈不浮者小承氣湯微和之以陽明温病發端者指首條所列陽明證而言也後凡言陽明温病者仿此諸證悉有以非下不可微則未至十分亢害但以小承氣通和胃氣則愈無庸芒硝之軟堅也四陽明温病汗多譫語舌苔老黃而乾者宜小承氣湯汗多津液散而大便結苔見干黃譫語因結糞而然故宜承氣五陽明温病無汗小便不利譫語者先與牛黃丸不大便再與調胃承氣湯無汗而小便不利則大便未定成硬譫語之不因燥屎可知不因燥屎而譫語者猶繫心包絡證也故先與牛黃丸以開內竅服牛黃丸內竅開大便當下葢牛黃丸亦有下大便之功能其仍然不下者無汗則外不通大小便俱閉則內不通邪之深結於隂可知故取芒硝之鹹寒大黃甘草之甘苦寒不取枳樸之辛燥也傷寒之譫語舍燥屎無他證一則寒邪不兼穢濁二則由太陽而陽明温病譫語有因燥屎有因邪陷心包一則温多兼穢二則自上焦心肺而來學者常須察識不可歧路亡羊也六陽明温病面目俱赤肢厥甚則通體皆厥不瘛瘲但神昏不大便七八日以外小便赤脈沉伏或並脈亦厥胸腹滿堅甚則拒按喜涼飲者大承氣湯主之此一條須細辨其的是火極似水熱極而厥之證方可用之全在目赤小便赤腹滿堅喜涼飲定之大承氣湯方法並見前七陽明温病純利稀水無糞者謂之熱結旁流調胃承氣湯主之熱結旁流非氣之不通不用枳樸獨取芒硝入隂以解熱結反以甘草緩芒硝急趨之性使之留中解結不然結不下而水獨行徒使藥性傷人也吳又可用大承氣湯者非是八陽明温病實熱壅塞為噦者下之連聲噦者中焦聲斷續時微時甚者屬下焦金匱謂噦而腹滿視其前後知何部不利利之即愈陽明實熱之噦下之裡氣得通則止但其兼證之輕重難以預料故但云下之而不定方以俟臨證者自為採取耳再按中焦實證之噦噦必連聲緊促者胃氣大實逼迫肺氣不得下降兩相攻擊而然若或斷或續乃下焦沖虛之噦其噦之來路也遠故其聲斷續也治屬下焦九陽明温病下利譫語陽明脈實或滑疾者小承氣湯主之脈不實者牛黃丸主之紫雪丹亦主之下利譫語柯氏謂腸虛胃實故取大黃之濡胃無庸芒硝之潤腸本論有脈實脈滑疾脈不實之辨恐心包絡之譫語而誤以承氣下之也仍主芳香開竅法小承氣湯苦辛通法重劑大黃五錢厚朴二錢枳實一錢水八杯煮取三杯先服一杯得宿糞止後服不知再服調胃承氣湯熱淫於內治以鹹寒佐以甘苦法大黃三錢芒硝五錢生甘草二錢牛黃丸方論並見上焦篇紫雪丹方論並見上焦篇十温病三焦俱急大熱大渴舌燥脈不浮而燥甚舌色金黃痰涎壅甚不可單行承氣者承氣合小陷胸湯主之三焦俱急謂上焦未清已入中焦陽明大熱大渴脈躁苔焦陽土燥烈煎熬腎水不下則隂液立見消亡下則引上焦餘邪陷入恐成結胸之證故以小陷胸合承氣湯滌三焦之邪一齊俱出此因病急故方亦急也然非審定是證不可用是方也承氣合小陷胸湯方苦辛寒法生大黃五錢厚朴二錢枳實二錢半夏三錢栝蔞三錢黃連二錢水八杯煮取三杯先服一杯不下再服一杯得快利止後服不便再服十一陽明温病無上焦證數日不大便當下之若其人隂素虛不可行承氣者增液湯主之服增液湯已周十二時觀之若大便不下者合調胃承氣湯微和之此方所以代吳又可承氣養榮湯法也妙在寓瀉於補以補藥之體作瀉藥之用既可攻實又可防虛余治體虛之温病與前醫誤傷津液不大便半虛半實之證專以此法救之無不應手而效增液湯方鹹寒苦甘法元參一兩麥冬連心八錢細生地八錢水八杯煮取三杯口乾則與飲令盡不便再作服方論温病之不大便不出熱結液干二者之外其偏於陽邪熾甚熱結之實證則從承氣法矣其偏於隂虧液涸之半虛半實證則不可混施承氣故以此法代之獨取元參為君者元參味苦鹹微寒壯水制火通二便啟腎水上潮於天其能治液干固不待言本經稱其主治腹中寒熱積聚其並能解熱結可知麥冬主治心腹結氣傷中傷飽胃絡脈絕羸瘦短氣亦系能補能潤能通之品故以為之佐生地亦主寒熱積聚逐血痺用細者取其補而不膩兼能走絡也三者合用作增水行舟之計故湯名增液但非重用不為功本論於陽明下證峙立三法熱結液干之大實證則用大承氣偏於熱結而液不幹者旁流是也則用調胃承氣偏於液干多而熱結少者則用增液所以迴護其虛務存津液之心法也按吳又可純恃承氣以為攻病之具用之得當則效用之不當其弊有三一則邪在心包陽明兩處不先開心包徒攻陽明下後仍然昏惑譫語亦將如之何哉吾知其必不救矣二則體虧液涸之人下後作戰汗或隨戰汗而脫或不蒸汗徒戰而脫三者下後雖能戰汗以隂氣大傷轉成上嗽下泄夜熱早涼之怯證補陽不可救隂不可有延至數月而死者有延至歲余而死者其死均也在又可當日温疫盛行之際非尋常温病可比又可創温病治法自有矯枉過正不暇詳審之處斷不可槪施於今日也本論分別可與不可與可補不可補之處以俟明眼裁定而又為此按語於後奉商天下之欲救是證者至若張氏喻氏有以甘温辛熱立法者濕温有可用之處然須兼以苦泄淡滲葢治外邪宜通不宜守也若風温温熱温疫温毒斷不可從十二陽明温病下後汗出當復其隂益胃湯主之温熱本傷隂之病下後邪解汗出汗亦津液之化隂液受傷不待言矣故云當復其隂此隂指胃隂而言葢十二經皆稟氣於胃胃隂復而氣降得食則十二經之隂皆可復矣欲復其隂非甘涼不可湯名益胃者胃體陽用隂取益胃用之義也下後急議復隂者恐將來液虧燥起而成乾咳身熱之怯證也益胃湯方甘涼法沙參三錢麥冬五錢冰糖一錢細生地五錢玉竹炒香一錢五分水五杯煮取二杯分二次服渣再煮一杯服十三下後無汗脈浮者銀翹湯主之脈浮洪者白虎湯主之脈洪而芤者白虎加人參湯主之此下後邪氣還表之證也温病之邪上行極而下下行極而上下后里氣得通欲作汗而未能以脈浮驗之知不在裡而在表逐邪者隨其性而宣泄之就其近而引導之故主以銀翹湯增液為作汗之具仍以銀花連翹解毒而輕宣表氣葢亦辛涼合甘寒輕劑法也若浮而且洪熱氣熾甚津液立見銷亡則非白虎不可若洪而且芤金受火克元氣不支則非加人參不可矣銀翹湯方辛涼合甘寒法銀花五錢連翹三錢竹葉二錢生甘草一錢麥冬四錢細生地四錢白虎湯白虎加人參湯方論並見前十四下後無汗脈不浮而數清燥湯主之無汗而脈數邪之未解可知但不浮無領邪外出之路既下之後又無連下之理故以清燥法增水敵火使不致為災一半日後相機易法即吳又可下後間服緩劑之法也但又可清燥湯中用陳皮之燥柴胡之升當歸之辛竄津液何堪以燥清燥有是理乎此條乃用其法而不用其方清燥湯方甘涼法麥冬五錢知母二錢人中黃一錢五分細生地五錢元參三錢水八杯煮取三杯分三次服加減法咳嗽膠痰加沙參三錢桑葉一錢五分梨汁半酒杯牡蠣三錢牛蒡子三錢按吳又可咳嗽膠痰之證而用蘇子桔紅當歸病因於燥而用燥藥非也在濕温門中不禁十五下後數日熱不退或退不盡口燥咽乾舌苔乾黑或金黃色脈沉而有力者護胃承氣湯微和之脈沉而弱者增液湯主之温病下後邪氣已淨必然脈靜身涼邪氣不淨有延至數日邪氣復聚於胃須再通其里者甚至屢下而後淨者誠有如吳又可所云但正氣日虛一日隂津日耗一日須加意防護其隂不可稍有鹵莽是在任其責者臨時斟酌盡善耳吳又可於邪氣復聚之證但主以小承氣本論於此處分別立法護胃承氣湯方苦甘法生大黃三錢元參三錢細生地三錢丹皮二錢知母二錢麥冬連心三錢水五杯煮取二杯先服一杯得結糞止後服不便再服增液湯方見前十六陽明温病下後二三日下證復現脈下甚沉或沉而無力止可與增液不可與承氣此恐犯數下之禁也十七陽明温病下之不通其證有五應下失下正虛不能運藥不運藥者死新加黃龍湯主之喘促不寧痰涎壅滯右寸實大肺氣不降者宣白承氣湯主之左尺牢堅小便赤痛時煩渴甚導赤承氣湯主之邪閉心包神昏舌短內竅不通飲不解渴者牛黃承氣湯主之津液不足無水舟停者間服增液再不下者增液承氣湯主之經謂下不通者死葢下而至於不通其為危險可知不忍因其危險難治而遂棄之茲按温病中下之不通者共有五因其因正虛不運藥者正氣既虛邪氣復實勉擬黃龍法以人參補正以大黃逐邪以冬地增液邪退正存一線即可以大隊補隂而生此邪正合治法也其因肺氣不降而里證又實者必喘促寸實則以杏仁石膏宣肺氣之痺以大黃逐腸胃之結此臟腑合治法也其因火腑不通左尺必現牢堅之脈左尺小腸脈也俗候於左寸者非細考內經自知小腸熱盛下注膀胱小便必涓滴赤且痛也則以導赤去淡通之陽藥加連柏之苦通火腑大黃芒硝承胃氣而通大腸此二腸同治法也其因邪閉心包內竅不通者前第五條已有先與牛黃丸再與承氣之法此條系已下而不通舌短神昏閉已甚矣飲不解渴消亦甚矣較前條僅僅譫語則更急而又急立刻有閉脫之虞陽明大實不通有消亡腎液之虞其勢不可少緩須臾則以牛黃丸開手少隂之閉以承氣急瀉陽明救足少隂之消此兩少隂合治法也再此條亦系三焦俱急當與前第九條用承氣陷胸合法者參看其因陽明太熱津液枯燥水不足以行舟而結糞不下者非增液不可服增液兩劑法當自下其或臟燥太甚之人竟有不下者則以增液合調胃承氣湯緩緩與服約二時服半杯沃之此一腑中氣血合治法也新加黃龍湯苦甘鹹法細生地五錢生甘草二錢人參一錢五分另煎生大黃三錢芒硝一錢元參五錢麥冬連心五錢當歸一錢五分海參洗二條薑汁六匙水八杯煮取三杯先用一杯沖參汁五分薑汁二匙頓服之如腹中有響聲或轉矢氣者為欲便也候一二時不便再如前法服一杯候二十四刻不便再服第三杯如服一杯即得便止後服酌服益胃湯一劑益胃湯方見前余參或可加入方論此處方於無可處之地勉盡人力不肯稍有遺憾之法也舊方用大承氣加參地當歸須知正氣久耗而大便不下者隂陽俱憊尤重隂液消亡不得再用枳樸傷氣而耗液故改用調胃承氣取甘草之緩急合人參補正微點薑汁宣通胃氣代枳樸之用合人參最宣胃氣加麥地元參保津液之難保而又去血結之積聚薑汁為宣氣分之用當歸為宣血中氣分之用再加海參者海參咸能化堅甘能補正按海參之液數倍於其身其能補液可知且蠕動之物能走絡中血分病久者必入絡故以之為使也宣白承氣湯方苦辛淡法生石膏五錢生大黃三錢杏仁粉二錢栝蔞皮一錢五分水五杯煮取二杯先服一杯不知再服導赤承氣湯赤芍三錢細生地五錢生大黃三錢黃連二錢黃柏二錢芒硝一錢水五杯煮取二杯先服一杯不下再服牛黃承氣湯即用前安宮牛黃丸二丸化開調生大黃末三錢先服一半不知再服增液承氣湯即於增液湯內加大黃三錢芒硝一錢五分水八杯煮取三杯先服一杯不知再服十八下後虛煩不眠心中懊憹甚至反復顛倒梔子豉湯主之若少氣者加甘草若嘔者加薑汁邪氣半至陽明半猶在膈下法能除陽明之邪不能除膈間之邪故證現懊憹虛煩梔子豉湯湧越其在上之邪也少氣加甘草者誤下固能傷隂此則以誤下而傷胸中陽氣甘能益氣故加之嘔加薑汁者胃中未至甚熱燥結誤下傷胃中陽氣木來乘之故嘔加薑汁和肝而降胃氣也胃氣降則不嘔矣梔子豉湯方見上焦篇梔子豉加甘草湯即於梔子豉湯內加甘草二錢煎法如前梔子豉加薑汁方即於梔子豉湯內加薑汁五匙十九陽明温病乾嘔口苦而渴尚未可下者黃連黃芩湯主之不渴而舌滑者屬濕温温熱燥病也其嘔由於邪熱夾穢擾亂中宮而然故以黃連黃芩徹其熱以芳香蒸變化其濁也黃連黃芩湯方苦寒微辛法黃連二錢黃芩二錢鬱金一錢五分香豆豉二錢水五杯煮取二杯分二次服二十陽明温病舌黃燥肉色絳不渴者邪在血分清營湯主之若滑者不可與也當於濕温中求之温病傳裡理當渴甚今反不渴者以邪氣深入血分格隂於外上潮於口故反不渴也曾過氣分故苔黃而燥邪居血分故舌之肉色絳也若舌苔白滑灰滑淡黃而滑不渴者乃濕氣蒸騰之象不得用清營柔以濟柔也清營湯方見上焦篇二一陽明斑者化斑湯主之方義並見上焦篇二二陽明温病下後疹續出者銀翹散去豆豉加細生地大青葉元參丹皮湯主之方義並見上焦篇二三斑疹用升提則衄或厥或嗆咳或昏痙用壅補則瞀亂此治斑疹之禁也斑疹之邪在血絡只喜輕宣涼解若用柴胡升麻辛温之品直升少陽使熱血上循清道則衄過升則下竭下竭者必上厥肺為華葢受熱毒之熏蒸則嗆咳心位正陽受升提之摧迫則昏痙至若壅補使邪無出路絡道比經道最細諸瘡痛癢皆屬於心既不得外出其勢必返而歸之於心不瞀亂得乎二四斑疹陽明證悉具外出不快內壅特甚者調胃承氣湯微和之得通則已不可令大泄大泄則內陷此斑疹下法微有不同也斑疹雖宜宣泄但不可太過令其內陷斑疹雖忌升提亦畏內陷方用調胃承氣者避枳樸之温燥取芒硝之入隂甘草敗毒緩中也調胃承氣湯方見前二五陽明温毒發痘者如斑疹法隨其所在而攻之温毒發痘如小兒痘瘡或多或少紫黑色皆穢濁太甚療治失宜而然也雖不多見間亦有之隨其所在而攻謂脈浮則用銀翹散加生地元參渴加花粉毒重加金汁人中黃小便短加芩連之類脈沉內壅者酌輕重下之二六陽明温毒楊梅瘡者以上法隨其所偏而調之重加敗毒兼與利濕此條當入濕温因上條温痘連類而及故編於此可以互證也楊梅瘡者形似楊梅輕則紅紫重則紫黑多現於背部面部亦因感受穢濁而然如上法者如上條治温痘之法毒甚故重加敗毒此證毒附濕而為災故兼與利濕如萆薢土茯苓之類二七陽明温病不甚渴腹不滿無汗小便不利心中懊憹者必發黃黃者梔子柏皮湯主之受邪太重邪熱與胃陽相搏不得發越無汗不能自通熱必發黃矣梔子柏皮湯方梔子五錢生甘草二錢黃柏五錢水五杯煮取二杯分二次服方論此濕淫於內以苦燥之熱淫於內佐以甘苦法也梔子清肌表解五黃又治內煩黃柏瀉膀胱療肌膚間熱甘草協利內外三者其色皆黃以黃退黃同氣相求也按又可但有茵陳大黃湯而無梔子柏皮湯温熱發黃豈皆可下者哉二八陽明温病無汗或但頭汗出身無汗渴欲飲水腹滿舌燥黃小便不利者必發黃茵陳蒿湯主之此與上條異者在口渴腹滿耳上條口不甚渴腹不滿胃不甚實故不可下此則胃家已實而黃不得退熱不得越無出表之理故從事於下趨大小便也茵陳蒿湯茵陳蒿六錢梔子三錢生大黃三錢水八杯先煮茵陳減水之半再入二味煮成三杯分三次服以小便利為度方論此純苦急趨之方也發黃外閉也腹滿內閉也內外皆閉其勢不可緩苦性最急故以純苦急趨下焦也黃因熱結瀉熱者必瀉小腸小腸丙火非苦不通勝火者莫如水茵陳得水之精開鬱莫如發陳茵陳生髮最速高出眾草主治熱結黃疸故以之為君梔子通水源而利三焦大黃除實熱而減腹滿故以之為佐也二九陽明温病無汗實證未劇不可下小便不利者甘苦合化冬地三黃湯主之大凡小便不通有責之膀胱不開者有責之上游結熱者有責之肺氣不化者温熱之小便不通無膀胱不開證皆上游指小腸而言熱結與肺氣不化而然也小腸火腑故以三黃苦藥通之熱結則液干故以甘寒潤之金受火刑化氣維艱故倍用麥地以化之冬地三黃湯方甘苦合化隂氣法麥冬八錢黃連一錢葦根汁半酒杯沖元參四錢黃柏一錢銀花露半酒杯沖細生地四錢黃芩一錢生甘草三錢水八杯煮取三杯分三次服以小便得利為度三十温病小便不利者淡滲不可與也忌五苓八正輩此用淡滲之禁也熱病有餘於火不足於水惟以滋水瀉火為急務豈可再以淡滲動陽而燥津乎奈何吳又可於小便條下特立豬苓湯乃去仲景原方之阿膠反加木通車前滲而又滲乎其治小便血分之桃仁湯中仍用滑石不識何解三一温病燥熱欲解燥者先滋其干不可純用苦寒也服之反燥甚此用苦寒之禁也温病有餘於火不用淡滲猶易明並苦寒亦設禁條則未易明也舉世皆以苦能降火寒能瀉熱坦然用之而無疑不知苦先入心其化以燥服之不應愈化愈燥宋人以目為火戶設立三黃湯久服竟至於瞎非化燥之明徵乎吾見温病而恣用苦寒津液乾涸不救者甚多葢化氣比本氣更烈故前條冬地三黃湯甘寒十之八九苦寒僅十之一二耳至茵陳蒿湯之純苦止有一用或者再用亦無屢用之理吳又可屢詆用黃連之非而又恣用大黃借乎其未通甘寒一法也三二陽明温病下後熱退不可即食食者必復周十二時後緩緩與食先取清者勿令飽飽則必復復必重也此下後暴食之禁也下後雖然熱退余焰尚存葢無形質之邪每惜有形質者以為依附必須堅壁清野勿令即食一日後稍可食清而又清之物若稍重濁猶必復也勿者禁止之詞必者斷然之詞也三三陽明温病下後脈靜身不熱舌上津回十數日不大便可與益胃增液輩斷不可再與承氣也下後舌苔未盡退口微渴面微赤脈微數身微熱日淺者亦與增液輩日深舌微乾者屬下焦復脈法也方見下焦勿輕與承氣輕與者肺燥而咳脾滑而泄熱反不除渴反甚也百日死此數下亡隂之大戒也下後不大便十數日甚至二十日乃腸胃津液受傷之故不可強責其便但與復隂自能便也此條脈靜身涼人猶易解至脈雖不燥而未靜身雖不壯熱而未涼俗醫必謂邪氣不盡必當再下在又可法中亦必再下不知大毒治病十衰其六但與存隂退熱斷不誤事下後邪氣復聚大熱大渴面正赤脈躁甚不在此例若輕與苦燥頻傷胃隂肺之母氣受傷陽明化燥肺無秉氣反為燥逼焉得不咳燥咳久者必身熱而渴也若脾氣為快利所傷必致滑泄滑泄則隂傷而熱渴愈加矣遷延三月天道小變之期其勢不能再延故曰百日死也三四陽明温病渴甚者雪梨漿沃之雪梨漿方法見前三五陽明温病下後微熱舌苔不退者薄荷末拭之以新布蘸新汲涼水再蘸薄荷細末頻擦舌上三六陽明温病斑疹温痘温瘡温毒發黃神昏譫語者安宮牛黃丸主之心居膈上胃居膈下雖有膜隔其濁氣太甚則亦可上干包絡且病自上焦而來故必以芳香逐穢開竅為要也安宮牛黃丸方見上焦篇三七風温温熱温疫温毒冬温之在中焦陽明病居多濕温之在中焦太隂病居多暑温則各半也此諸温不同之大關鍵也温熱等皆因於火以火從火陽明陽土以陽從陽故陽明病居多濕温則以濕從濕太隂隂土以隂從隂則太隂病居多暑兼濕熱故各半也暑温伏暑三八脈洪滑面赤身熱頭暈不惡寒但惡熱舌上黃滑苔渴欲涼飲飲不解渴得水則嘔按之胸下痛小便短大便閉者陽明暑温水結在胸也小陷胸湯加枳實主之脈洪面赤不惡寒病已不在上焦矣暑兼温熱熱甚則渴引水求救濕鬱中焦水不下行反來上逆則嘔胃氣不降則大便閉故以黃連栝蔞清在裡之熱痰半夏除水痰而強胃加枳實者取其苦辛通降開幽門而引水下行也小陷胸加枳實湯方苦辛寒法黃連二錢栝蔞三錢枳實二錢半夏五錢急流水五杯煮取二杯分二次服三九陽明暑温脈滑數不食不飢不便濁痰凝聚心下痞者半夏瀉心湯去人參乾薑大棗甘草加枳實杏仁主之不飢不便而有濁痰心下痞滿濕熱互結而阻中焦氣分故以半夏枳實開氣分之濕結黃連黃芩開氣分之熱結杏仁開肺與大腸之氣痺暑中熱甚故去乾薑非傷寒誤下之虛痞故去人參甘草大棗且畏其助濕作滿也半夏瀉心湯去乾薑甘草加枳實杏仁方苦辛寒法半夏一兩黃連二錢黃芩三錢枳實二錢杏仁三錢水八杯煮取三杯分三次服虛者復納人參二錢大棗三枚四十陽明暑温濕氣已化熱結獨存口燥咽乾渴欲飲水面目俱赤舌燥黃脈沉實者小承氣湯各等分下之暑兼濕熱其有體瘦質燥之人感受熱重濕輕之證濕先從熱化盡只餘熱結中焦具諸下證方可下之小承氣湯方義並見前此處不必以大黃為君三物各等分可也四一暑温蔓延三焦舌滑微黃邪在氣分者三石湯主之邪氣久留舌絳苔少熱搏血分者加味清宮湯主之神識不清熱閉內竅者先與紫雪丹再與清宮湯蔓延三焦則邪不在一經一臟矣故以急清三焦為主然雖云三焦以手太隂一經為要領葢肺主一身之氣氣化則暑濕俱化且肺臟受生於陽明肺之臟象屬金色白陽明之氣運亦屬金色白故肺經之藥多兼走陽明陽明之藥多兼走肺也再肺經通調水道下達膀胱肺痺開則膀胱亦開是雖以肺為要領而胃與膀胱皆在治中則三焦俱備矣是邪在氣分而主以三石湯之奧義也若邪氣久羈必歸血絡心主血脈故以加味清宮湯主之內竅欲閉則熱邪盛矣紫雪丹開內竅而清熱最速者也三石湯方飛滑石三錢生石膏五錢寒水石三錢杏仁三錢竹茹炒二錢銀花三錢花露更妙金汁一酒杯沖白通草二錢水五杯煮成二杯分二次温服方論此微苦辛寒兼芳香法也葢肺病治法微苦則降過苦反過病所辛涼所以清熱芳香所以敗毒而化濁也按三石紫雪丹中之君藥取其得庚金之氣清熱退暑利竅兼走肺胃者也杏仁通草為宣氣分之用且通草直達膀胱杏仁直達大腸竹茹以竹之脈絡而通人之脈絡金汁銀花敗暑中之熱毒加味清宮湯方即於前清宮湯內加知母三錢銀花二錢竹瀝五茶匙衝入方論此苦辛寒法也清宮湯前已論之矣加此三味者知母瀉陽明獨勝之熱而保肺清金銀花敗毒而清絡竹瀝除胸中大熱止煩悶消渴合清宮湯為暑延三焦血分之治也四二暑温伏暑三焦均受舌灰白胸痞悶潮熱嘔惡煩渴自利汗出溺短者杏仁滑石湯主之舌白胸痞自利嘔惡濕為之也潮熱煩渴汗出溺短熱為之也熱處濕中濕蘊生熱濕熱交混非偏寒偏熱可治故以杏仁滑石通草先宣肺氣由肺而達膀胱以利濕厚朴苦温而瀉濕滿芩連清裡而止濕熱之利鬱金芳香走竅而開閉結桔半強胃而宣濕化痰以止嘔惡俾三焦混處之邪各得分解矣杏仁滑石湯方苦辛寒法杏仁三錢滑石三錢黃芩二錢桔紅一錢五分黃連一錢鬱金二錢通草一錢厚朴二錢半夏三錢水八杯煮取三杯分三次服寒濕四三濕之入中焦有寒濕有熱濕有自表傳來有水穀內蘊有內外相合其中傷也有傷脾陽有傷脾隂有傷胃陽有傷胃隂有兩傷脾胃傷脾胃之陽者十常八九傷脾胃之隂者十居一二彼此混淆治不中款遺患無窮臨證細推不可泛論此統言中焦濕證之總綱也寒濕者濕與寒水之氣相搏也葢濕水同類其在天之陽時為雨露隂時為霜雪在江河為水在土中為濕體本一源易於相合最損人之陽氣熱濕者在天時長夏之際盛熱蒸動濕氣流行也在人身濕鬱本身陽氣久而生熱也兼損人之隂液自表傳來一由經絡而臟腑一由肺而脾胃水穀內蘊肺虛不能化氣脾虛不能散津或形寒飲冷或酒客中虛內外相合客邪既從表入而伏邪又從內發也傷脾陽在中則不運痞滿傳下則洞泄腹痛傷胃陽則嘔逆不食膈脹胸痛兩傷脾胃既有脾證又有胃證也其傷脾胃之隂若何濕久生熱熱必傷隂古稱濕火者是也傷胃隂則口渴不飢傷脾隂則舌先灰滑後反黃燥大便堅結濕為隂邪其傷人之陽也得理之正故多而常見其傷人之隂也乃勢之變故罕而少見治濕者必須審在何經何臟兼寒兼熱氣分血分而出辛涼辛温甘温苦温淡滲苦滲之治庶所投必效若脾病治胃胃病治脾兼下焦者單治中焦或籠統混治脾胃不分隂陽寒熱不辨將見腫脹黃疸洞泄衄血便血諸證蜂起矣惟在臨證者細心推求下手有準的耳葢土為雜氣兼證甚多最難分析豈可泛論濕氣而已哉四四足太隂寒濕痞結胸滿不飢不食半苓湯主之此書以温病名並列寒濕者以濕温緊與寒濕相對言寒濕而濕温更易明析痞結胸滿仲景列於太隂篇中乃濕鬱脾陽足太隂之氣不為鼓動運行臟病而累及腑痞結於中故亦不能食也故以半夏茯苓培陽土以吸隂土之濕厚朴苦温以瀉濕滿黃連苦以滲濕重用通草以利水道使邪有出路也半苓湯方此苦辛淡滲法也半夏五錢茯苓塊五錢川連一錢厚朴三錢通草八錢煎湯煮前藥水十二杯煮通草成八杯再入余藥煮成三杯分三次服四五足太隂寒濕腹脹小便不利大便溏而不爽若欲滯下者四苓加厚朴秦皮湯主之五苓散亦主之經謂太隂所至發為䐜脹又謂厥隂氣至為䐜脹葢木剋土也太隂之氣不運以致膀胱之氣不化故小便不利四苓辛淡滲濕使膀胱開而出邪以厚朴瀉脹以秦皮洗肝也其或肝氣不熱則不用秦皮仍用五苓中之桂枝以和肝通利三焦而行太陽之陽氣故五苓散亦主之四苓加厚朴秦皮湯方苦温淡法茅朮三錢厚朴三錢茯苓塊五錢豬苓四錢秦皮二錢澤瀉四錢水八杯煮成八分三杯分三次服五苓散甘温淡法豬苓一兩赤朮一兩茯苓一兩澤瀉一兩六錢桂枝五錢共為細末百沸湯和服三錢日三服四六足太隂寒濕四肢乍冷自利目黃舌白滑甚則灰神倦不語邪阻脾竅舌蹇語重四苓加木瓜草果厚朴湯主之脾主四肢脾陽郁故四肢乍冷濕漬脾而脾氣下溜故自利目白精屬肺足太隂寒則手太隂不能獨治兩太隂同氣也且脾主地氣肺主天氣地氣上蒸天氣不化故目睛黃也白滑與灰寒濕苔也濕困中焦則中氣虛寒中氣虛寒則陽光不治主正陽者心也心藏神故神昏心主言心陽虛故不語脾竅在舌濕邪阻竅則舌蹇而語聲遲重濕以下行為順故以四苓散驅濕下行加木瓜以平木治其所不勝也厚朴以温中行滯草果温太隂獨勝之寒芳香而達竅補火以生土驅濁以生清也四苓加木瓜厚朴草果湯方苦熱兼酸淡法生於白朮三錢豬苓一錢五分澤瀉一錢五分赤苓塊五錢木瓜一錢厚朴一錢草果八分半夏三錢水八杯煮取八分三杯分三次服陽素虛者加附子二錢四七足太隂寒濕舌灰滑中焦滯痞草果茵陳湯主之面目俱黃四肢常厥者茵陳四逆湯主之濕滯痞結非温通而兼開竅不可故以草果為君茵陳因陳生新生髮陽氣之機最速故以之為佐廣皮大腹厚朴共成瀉痞之功豬苓澤瀉以導濕外出也若再加面黃肢逆則非前湯所能濟故以四逆回厥茵陳宣濕退黃也草果茵陳湯方苦辛温法草果一錢茵陳三錢茯苓皮三錢厚朴二錢廣皮一錢五分豬苓二錢大腹皮二錢澤瀉一錢五分水五杯煮取二杯分二次服茵陳四逆湯方苦辛甘熱復微寒法附子三錢炮乾薑五錢炙甘草二錢茵陳六錢水五杯煮取二杯温服一杯厥回止後服仍厥再服盡劑厥不回再作服四八足太隂寒濕舌白滑甚則灰脈遲不食不寐大便窒塞濁隂凝聚陽傷腹痛痛甚則肢逆椒附白通湯主之此足太隂寒濕兼足少隂厥隂證也白滑灰滑皆寒濕苔也脈遲者陽為寒濕所困來去俱遲也不食胃陽痺也不寐中焦濕聚阻遏陽氣不得下交於隂也大便窒塞脾與大腸之陽不能下達也陽為濕困返遜位於濁隂故濁隂得以蟠踞中焦而為痛也凡痛皆邪正相爭之象雖曰陽困究竟陽未絕滅兩不相下故相爭而痛也後凡言痛者仿此椒附白通湯齊通三焦之陽而急驅濁隂也椒附白通湯方生附子炒黑三錢川椒炒黑二錢淡乾薑二錢蔥白三莖豬膽汁半燒酒杯去渣後調入水五杯煮成二杯分二次涼服方論此苦辛熱法複方也苦與辛合能降能通非熱不足以勝重寒而回陽附子益太陽之標陽補命門之眞火助少陽之火熱葢人之命火與太陽之陽少陽之陽旺行水自速三焦通利濕不得停焉能聚而為痛故用附子以為君火旺則土強乾薑温中逐濕痺太隂經之本藥川椒燥濕除脹消食治心腹冷痛故以二物為臣蔥白由內而達外中空通陽最速亦主腹痛故以為之使濁隂凝聚不散有格陽之勢故反佐以豬膽汁豬水畜屬腎以隂求隂也膽乃甲木從少陽少陽主開泄生髮之機最速此用仲景白通湯與許學士椒附湯合而裁製者也四九陽明寒濕舌白腐肛墜痛便不爽不喜食附子理中湯去甘草加廣皮厚朴湯主之九竅不和皆屬胃病胃受寒濕所傷故肛門墜痛而便不爽陽明失闔故不喜食理中之人參補陽明之正蒼朮補太隂而滲濕薑附運坤陽以劫寒葢脾陽轉而後濕行濕行而後胃陽復去甘草畏其滿中也加厚朴廣皮取其行氣合而言之辛甘為陽辛苦能通之義也附子理中湯去甘草加厚朴廣皮湯方辛甘兼苦法生茅朮三錢人參一錢五分炮乾薑一錢五分厚朴二錢廣皮一錢五分生附子一錢五分炮黑水五杯煮取八分二杯分二次服五十寒濕傷脾胃兩陽寒熱不飢吞酸形寒或脘中痞悶或酒客濕聚苓薑朮桂湯主之此兼運脾胃宣通陽氣之輕劑也苓薑朮桂湯方苦辛温法茯苓塊五錢生薑三錢炒白朮三錢桂枝三錢水五杯煮取八分二杯分温再服五一濕傷脾胃兩陽既吐且利寒熱身痛或不寒熱但腹中痛名曰霍亂寒多不欲飲水者理中湯主之熱多欲飲水者五苓散主之吐利汗出發熱惡寒四肢拘急手足厥逆四逆湯主之吐利止而身痛不休者宜桂枝湯小和之按霍亂一證長夏最多本於陽虛寒濕凝聚關係非輕傷人於頃刻之間奈時醫不讀金匱不識病源不問輕重一槪主以藿香正氣散輕者原有可愈之理重者死不旋踵更可笑者正氣散中加黃連麥冬大用西瓜治渴欲飲水之霍亂病者豈堪命乎瑭見之屢矣故將採金匱原文備錄於此胃陽不傷不吐脾陽不傷不瀉邪正不爭不痛營衛不乖不寒熱以不飲水之故知其為寒多主以理中湯原文系理中丸方後自注云然丸不及湯葢丸緩而湯速也且恐丸藥不精故直改從湯温中散寒人參甘草胃之守藥白朮甘草脾之守藥乾薑能通能守上下兩泄者故脾胃兩守之且守中有通通中有守以守藥作通用以通藥作守用若熱欲飲水之證飲不解渴而吐泄不止則主以五苓邪熱須從小便去膀胱為小腸之下游小腸火腑也五苓通前隂所以守後隂也太陽不開則陽明不闔開太陽正所以守陽明也此二湯皆有一舉兩得之妙吐利則脾胃之陽虛汗出則太陽之陽亦虛發熱者浮陽在外也惡寒者實寒在中也四肢拘急脾陽不榮四末手足厥冷中土濕而厥隂肝木來乘病者四逆湯善救逆故名四逆湯人參甘草守中陽乾薑附子通中陽人參附子護外陽乾薑甘草護中陽中外之陽復回則群隂退避而厥回矣吐利止而身痛不休者中陽復而表陽不和也故以桂枝湯温經絡而微和之理中湯方甘熱微苦法此方分量以及後加減法悉照金匱原文用者臨時斟酌人參甘草白朮乾薑各三兩水八杯煮取三杯温服一杯日三服加減法若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲飲水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自汗勿發揭衣服五苓散方見前加減法腹滿者加厚朴廣皮各一兩渴甚面赤脈大緊而急扇扇不知涼飲冰不知冷腹痛甚時時躁煩者格陽也加乾薑一兩五錢此條非仲景原文余治驗也百沸湯和每服五錢日三服四逆湯方辛甘熱法分量臨時斟酌炙甘草二兩乾薑一兩半生附子一枚去皮加人參一兩水五茶碗煮取二碗分二次服按原方無人參此獨加人參者前條寒多不飲水較厥逆尚輕仲景已用人參此條諸陽欲脫中虛更急不用人參何以固內柯韻伯傷寒注云仲景凡治虛證以里為重協熱下利脈微弱者便用人參汗後身痛脈沉遲者便加人參此脈遲而利清穀且不煩不咳中氣大虛元氣已脫但温不補何以救逆乎觀茯苓四逆之煩躁且以人參況通脈四逆豈得無參是必有脫落耳備錄於此存參五二霍亂兼轉筋者五苓散加防己桂枝薏仁主之寒甚脈緊者再加附子肝藏血主筋筋為寒濕搏急而轉故於五苓和霍亂之中加桂枝温筋防己急驅下焦血分之寒濕薏仁主濕痺腳氣扶土抑木治筋急拘攣甚寒脈緊則非純陽之附子不可五苓散加防己桂枝薏仁方即於前五苓散內加防己一兩桂枝一兩半足前成二兩薏仁二兩寒甚者加附子大者一枚杵為細末每服五錢百沸湯和日三劇者日三夜一得臥則勿令服五三卒中寒濕內挾穢濁眩冒欲絕腹中絞痛脈沉緊而遲甚則伏欲吐不得吐欲利不得利甚則轉筋四肢欲厥俗名發痧又名乾霍亂轉筋者俗名轉筋火古方書不載不載者不載上三條之俗名耳若是證當於金匱腹滿腹痛心痛寒疝諸條參看自得蜀椒救中湯主之九痛丸亦可服語亂者先服至寶丹再與湯藥按此證夏日濕蒸之時最多故因霍亂而類記於此中陽本虛內停寒濕又為蒸騰穢濁之氣所幹由口鼻而直行中道以致腹中陽氣受逼所以相爭而為絞痛胃陽不轉雖欲吐而不得脾陽困閉雖欲利而不能其或經絡亦受寒濕則筋如轉索而後者向前矣中陽虛而肝木來乘則厥俗名發痧者何葢以此證病來迅速或不及延醫或醫亦不識相傳以錢或用瓷碗口蘸薑湯或麻油刮其關節刮則其血皆分住則復合數數分合動則生陽關節通而氣得轉往往有隨手而愈者刮處必現血點紅紫如沙故名痧也但刮後須十二時不飲水方不再發不然則留邪在絡稍受寒發怒則舉發矣以其欲吐不吐欲利不利而腹痛故又名乾霍亂其轉筋名轉筋火者以常發於夏月夏月火令又病迅速如火也其實乃伏隂與濕相搏之故以大建中之蜀椒急驅隂濁下行乾薑温中去人參膠飴者畏其滿而守也加厚朴以瀉濕中濁氣檳榔以散結氣直達下焦廣皮通行十二經之氣改名救中湯急驅濁隂所以救中焦之眞陽也九痛丸一面扶正一面驅邪其驅邪之功最迅故亦可服再按前吐瀉之霍亂有隂陽二證乾霍亂則純有隂而無陽所謂天地不通閉塞而成冬有若否卦之義若語言亂者邪干心包故先以至寶丹驅包絡之邪也救中湯方苦辛通法蜀椒炒出汗三錢淡乾薑四錢厚朴三錢檳榔二錢廣皮二錢水五杯煮取二杯分二次服兼轉筋者加桂枝三錢防己五錢薏仁三錢厥者加附子二錢九痛丸方治九種心痛苦辛甘熱法附子三兩生狼牙一兩人參一兩乾薑一兩吳茱萸一兩巴豆去皮心熬碾如膏一兩蜜丸梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血病等證皆主之忌口如常法方論內經有五臟胃腑心痛並痰蟲食積即為九痛也心痛之因非風即寒故以乾薑附子驅寒壯陽吳茱萸能降肝臟濁隂下行生狼牙善驅浮風以巴豆驅逐痰蟲陳滯之積人參養正驅邪因其藥品氣血皆入補瀉攻伐皆備故治中惡腹脹痛等證附錄外臺走馬湯治中惡心痛腹脹大便不通苦辛熱法沈目南注云中惡之證俗謂絞腸烏痧即穢臭惡毒之氣直從口鼻入於心胸腸胃臟腑壅塞正氣不行故心痛腹脹大便不通是為實證非似六淫侵入而有表裡清濁之分故用巴豆極熱大毒峻猛之劑急攻其邪佐杏仁以利肺與大腸之氣使邪從後隂一掃盡除則病得愈若緩須臾正氣不通營衛隂陽機息則死是取通則不痛之義也巴豆去心皮熬二枚杏仁二枚上二味以綿纏槌令碎熱湯二合捻取白汁飲之當下老小強弱量之通治飛屍鬼擊病按醫方集解中治霍亂用隂陽水一法有協和隂陽使不相爭之義又治乾霍亂用鹽湯探吐一法葢閉塞至極之證除針灸之外莫如吐法通陽最速夫嘔厥隂氣也寒痛太陽寒水氣也否冬象也冬令太陽寒水得厥隂氣至風能上升則一陽開泄萬象皆有生機矣至針法治病最速取禍亦不緩當於甲乙經中求之非善針者不可令針也立生丹治傷暑霍亂痧證瘧痢泄瀉心痛胃痛腹痛吞吐酸水及一切隂寒之證結胸小兒寒痙母丁香一兩二錢沉香四錢茅蒼朮一兩二錢明雄黃一兩二錢上為細末用蟾酥八錢銅鍋內加火酒一小杯化開入前藥末丸綠豆大每服二丸小兒一丸温水送下又下死胎如神凡被蠍蜂螫者調塗立效惟孕婦忌之此方妙在剛燥藥中加芳香透絡蟾乃土之精上應月魄物之濁而靈者其酥入絡以毒攻毒而方又有所監製故應手取效耳獨勝散治絞腸痧痛急指甲唇俱青危在頃刻馬糞年久彌佳不拘分兩瓦上焙乾為末老酒沖服二三錢不知再作服此方妙在以濁攻濁馬性剛善走在卦為乾糞乃濁隂所結其象圓其性通故能摩蕩濁隂之邪仍出下竅憶昔年濟南方訒庵蒞任九江臨行一女子忽患痧證就地滾嚎聲嘶欲絕訒庵云偶因擇日不謹誤犯紅痧或應此乎余急授此方求馬糞不得即用騾糞並非陳者亦隨手奏功濕温瘧痢疸痺附五四濕熱上焦未清裡虛內陷神識如蒙舌滑脈緩人參瀉心湯加白芍主之濕在上焦若中陽不虛者必始終在上焦斷不內陷或因中陽本虛或因誤傷於藥其勢必致內陷濕之中人也首如裹目如蒙熱能令人昏故神識如蒙此與熱邪直入包絡譫語神昏有間裡虛故用人參護里陽白芍以護眞隂濕陷於裡故用乾薑枳實之辛通濕中兼熱故用黃芩黃連之苦降此邪已內陷其勢不能還表法用通降從里治也人參瀉心湯方苦辛寒兼甘法人參二錢乾薑二錢黃連一錢五分黃芩一錢五分枳實一錢生白芍二錢水五杯煮取二杯分二次服渣再煮一杯服五五濕熱受自口鼻由募原直走中道不飢不食機竅不靈三香湯主之三香湯方微苦微辛微寒兼芳香法栝蔞皮三錢桔梗三錢黑山梔二錢枳殼二錢鬱金二錢香豉二錢降香末三錢水五杯煮取二杯分二次温服方論按此證由上焦而來其機尚淺故用蔞皮桔梗枳殼微苦微辛開上山梔輕浮微苦清熱香豉鬱金降香化中上之穢濁而開鬱上條以下焦為邪之出路故用重此條以上焦為邪之出路故用輕以下三焦均受者則用分消彼此互參可以知葉氏之因證制方心靈手巧處矣惜散見於案中而人多不察茲特為拈出以槪其餘五六吸受穢濕三焦分布熱蒸頭脹身痛嘔逆小便不通神識昏迷舌白渴不多飲先宜芳香通神利竅安宮牛黃丸續用淡滲分消濁濕茯苓皮湯按此證表裡經絡臟腑三焦俱為濕熱所困最畏內閉外脫故急以牛黃丸宣竅清熱而護神明但牛黃丸不能利濕分消故繼以茯苓皮湯安宮牛黃丸方法見前茯苓皮湯淡滲兼微辛微涼法茯苓皮五錢生薏仁五錢豬苓三錢大腹皮三錢白通草三錢淡竹葉二錢水八杯煮取三杯分三次服五七陽明濕温氣壅為噦者新制桔皮竹茹湯主之按金匱桔皮竹茹湯乃胃虛受邪之治今治濕熱壅遏胃氣致噦不宜用參甘峻補故改用柿蒂按柿成於秋得陽明燥金之主氣且其形多方他果未之有也故治肺胃之病有獨勝肺之臟象屬金胃之氣運屬金柿蒂乃柿之歸束處凡花皆散凡子皆降凡降先收從生而散而收而降皆一蒂為之也治逆呃之能事畢矣再按草木一身蘆與蒂為升降之門戶載生氣上升者蘆也受隂精歸藏者蒂也格物者不可不於此會心焉新制桔皮竹茹湯苦辛通降法桔皮三錢竹茹三錢柿蒂七枚薑汁三茶匙沖水五杯煮取二杯分二次温服不知再作服有痰火者加竹瀝栝蔞霜有瘀血者加桃仁五八三焦濕鬱升降失司脘連腹脹大便不爽一加減正氣散主之再按此條與上第五十六條同為三焦受邪彼以分消開竅為急務此以升降中焦為定法各因見證之不同也一加減正氣散方藿香梗二錢厚朴二錢杏仁二錢茯苓皮二錢廣皮一錢神麯一錢五分麥芽一錢五分綿茵陳二錢大腹皮一錢水五杯煮二杯再服方論正氣散本苦辛温兼甘法今加減之乃苦辛微寒法也去原方之紫蘇白芷無須發表也去甘桔此證以中焦為扼要不必提上焦也只以藿香化濁厚朴廣皮茯苓大腹瀉濕滿加杏仁利肺與大腸之氣神麯麥芽升降脾胃之氣茵陳宣濕鬱而動生髮之氣藿香但用梗取其走中不走外也茯苓但用皮以諸皮皆涼瀉濕熱獨勝也五九濕鬱三焦脘悶便溏身痛舌白脈象模糊二加減正氣散主之上條中焦病重故以升降中焦為要此條脘悶便溏中焦證也身痛舌白脈象模糊則經絡證矣故加防己急走經絡中濕鬱以便溏不比大便不爽故加通草薏仁利小便所以實大便也大豆黃卷從濕熱蒸變而成能化蘊釀之濕熱而蒸變脾胃之氣也二加減正氣散苦辛淡法藿香梗三錢廣皮二錢厚朴二錢茯苓皮三錢木防己三錢大豆黃卷二錢川通草一錢五分薏苡仁三錢水八杯煮三杯三次服六十穢濕著里舌黃脘悶氣機不宣久則釀熱三加減正氣散主之前兩法一以升降為主一以急宣經隧為主此則以舌黃之故預知其內已伏熱久必化熱而身亦熱矣故加杏仁利肺氣氣化則濕熱俱化滑石辛淡而涼清濕中之熱合藿香所以宣氣機之不宣也三加減正氣散方苦辛寒法藿香連梗葉三錢茯苓皮三錢厚朴二錢廣皮一錢五分杏仁三錢滑石五錢水五杯煮二杯再服六一穢濕著里邪阻氣分舌白滑脈右緩四加減正氣散主之以右脈見緩之故知氣分之濕阻故加草果楂肉神麯急運坤陽使足太隂之地氣不上蒸手太隂之天氣也四加減正氣散方苦辛温法藿香梗三錢厚朴二錢茯苓三錢廣皮一錢五分草果一錢楂肉炒五錢神麯二錢水五杯煮二杯渣再煮一杯三次服六二穢濕著里脘悶便泄五加減正氣散主之穢濕而致脘悶故用正氣散之香開便泄而知脾胃俱傷故加大腹運脾氣穀芽升胃氣也以上二條應入前寒濕類中以同為加減正氣散法欲觀者知化裁古方之妙故列於此五加減正氣散苦辛温法藿香梗二錢廣皮一錢五分茯苓塊三錢厚朴二錢大腹皮一錢五分穀芽一錢蒼朮二錢水五杯煮二杯日再服按今人以藿香正氣散統治四時感冒試問四時止一氣行令乎抑各司一氣且有兼氣乎況受病之身軀臟腑又各有不等乎歷觀前五法均用正氣散而加法各有不同亦可知用藥非絲絲入扣不能中病彼泛論四時不正之氣與統治一切諸病之方皆未望見軒岐之堂室者也烏可云醫乎六三脈緩身痛舌淡黃而滑渴不多飲或竟不渴汗出熱解繼而復熱內不能運水穀之濕外復感時令之濕發表攻裡兩不可施誤認傷寒必轉壞證徒清熱則濕不退徒祛濕則熱愈熾黃芩滑石湯主之脈緩身痛有似中風但不浮舌滑不渴飲則非中風矣若系中風汗出則身痛解而熱不作矣今繼而復熱者乃濕熱相蒸之汗濕屬隂邪其氣留連不能因汗而退故繼而復熱內不能運水穀之濕脾胃困於濕也外復受時令之濕經絡亦困於濕矣倘以傷寒發表攻裡之法施之發表則誅伐無過之表陽傷而成痙攻裡則脾胃之陽傷而成洞泄寒中故必轉壞證也濕熱兩傷不可偏治故以黃芩滑石茯苓皮清濕中之熱蔻仁豬苓宣濕邪之正再加腹皮通草共成宣氣利小便之功氣化則濕化小便利則火腑通而熱自清矣黃芩滑石湯方苦辛寒法黃芩三錢滑石三錢茯苓皮三錢大腹皮二錢白蔻仁一錢通草一錢豬苓三錢水六杯煮取二杯渣再煮一杯分温三服六四陽明濕温嘔而不渴者小半夏加茯苓湯主之嘔甚而痞者半夏瀉心湯去人參乾薑大棗甘草加枳實生薑主之嘔而不渴者飲多熱少也故主以小半夏加茯苓逐其飲而嘔自止嘔而兼痞熱邪內陷與飲相摶有固結不通之患故以半夏瀉心去參薑甘棗之補中加枳實生薑之宣胃也小半夏加茯苓湯半夏六錢茯苓六錢生薑四錢水五杯煮取二杯分二次服半夏瀉心湯去人參乾薑甘草大棗加枳實生薑方半夏六錢黃連二錢黃芩三錢枳實三錢生薑三錢水八杯煮取三杯分三次服虛者復納人參大棗六五濕聚熱蒸蘊於經絡寒戰熱熾骨骱煩疼舌色灰滯面目萎黃病名濕痺宣痺湯主之經謂風寒濕三者合而為痺金匱謂經熱則痺葢金匱誠補內經之不足痺之因於寒者固多痺之兼乎熱者亦復不少合參二經原文細驗於臨證之時自有權衡本論因載濕温而類及熱痺見濕温門中原有痺證不及備載痺證之全學者欲求全豹當於內經金匱喻氏葉氏以及宋元諸名家合而參之自得大抵不越寒熱兩條虛實異治寒痺勢重而治反易熱痺勢緩而治反難實者單病軀殼易治虛者兼病臟腑夾痰飲腹滿等證則難治矣猶之傷寒兩感也此條以舌灰目黃知其為濕中生熱寒戰熱熾知其在經絡骨骱疼痛知其為痺證若泛用治濕之藥而不知循經入絡則罔效矣故以防己急走經絡之濕杏仁開肺氣之先連翹清氣分之濕熱赤豆清血分之濕熱滑石利竅而清熱中之濕山梔肅肺而瀉濕中之熱薏苡淡滲而主攣痺半夏辛平而主寒熱蠶砂化濁道中清氣痛甚加片子薑黃海桐皮者所以宣絡而止痛也宣痺湯方苦辛通法防己五錢杏仁五錢滑石五錢連翹三錢山梔三錢薏苡五錢半夏醋炒三錢晚蠶砂三錢赤小豆皮三錢赤小豆乃五穀中之赤小豆味酸肉赤涼水浸取皮用非藥肆中之赤小豆藥肆中之赤豆乃廣中野豆赤皮蒂黑肉黃不入藥者也水八杯煮取三杯分温三服痛甚加片子薑黃二錢海桐皮三錢六六濕鬱經脈身熱身痛汗多自利胸腹白疹內外合邪純辛走表純苦清熱皆在所忌辛涼淡法薏苡竹葉散主之上條但痺在經脈此則臟腑亦有邪矣故又立一法汗多則表陽開身痛則表邪郁表陽開而不解表邪其為風濕無疑葢汗之解者寒邪也風為陽邪尚不能以汗解況濕為重濁之隂邪故雖有汗不解也學者於有汗不解之證當識其非風則濕或為風濕相搏也自利者小便必短白疹者風濕鬱於孫絡毛竅此濕停熱鬱之證故主以辛涼解肌表之熱辛淡滲在裡之濕俾表邪從氣化而散里邪從小便而驅雙解表裡之妙法也與下條互斟自明薏苡竹葉散方辛涼淡法亦輕以去實法薏苡五錢竹葉三錢飛滑石五錢白蔻仁一錢五分連翹三錢茯苓塊五錢白通草一錢五分共為細末每服五錢日三服六七風暑寒濕雜感混淆氣不主宣咳嗽頭脹不飢舌白肢體若廢杏仁薏苡湯主之雜感混淆病非一端乃以氣不主宣四字為扼要故以宣氣之藥為君既兼雨濕中寒邪自當變辛涼為辛温此條應入寒濕類中列於此者以其為上條之對待也杏仁薏苡湯苦辛温法杏仁三錢薏苡三錢桂枝五分生薑七分厚朴一錢半夏一錢五分防己一錢五分白蒺藜二錢水五杯煮三杯渣再煮一杯分温三服六八暑濕痺者加減木防己湯主之此治痺之祖方也風勝則引引者吊痛掣痛之類或上或下四肢遊走作痛經謂行痺是也加桂枝桑葉濕勝則腫腫者土曰敦阜加滑石萆薢蒼朮寒勝則痛痛者加防己桂枝薑黃海桐皮面赤口涎自出者靈樞謂胃熱則廉泉開重加石膏知母絕無汗者加羌活蒼朮汗多者加黃耆炙甘草兼痰飲者加半夏厚朴廣皮因不能備載全文故以祖方加減如此聊示門徑而已加減木防己湯辛温辛涼復法防己六錢桂枝三錢石膏六錢杏仁四錢滑石四錢白通草二錢薏仁三錢水八杯煮取三杯分温三服見小效不即退者加重服日三夜一六九濕熱不解久釀成疸古有成法不及備載聊列數則以備規矩下瘧痢等證仿此本論之作原補前人之未備已有成法可循者安能盡錄因橫列四時雜感不能不列濕温連類而及又不能不列黃疸瘧痢不過略標法則而已按濕温門中其證最多其方最夥葢土居中位穢濁所歸四方皆至悉可兼證故錯綜參伍無窮極也即以黃疸一證而言金匱有辨證三十五條出治一十二方先審黃之必發不發在於小便之利與不利疸之易治難治在於口之渴與不渴再察瘀熱入胃之因或因外並或因內發或因食谷或固酣酒或因勞色有隨經蓄血入水黃汗上盛者一身盡熱下郁者小便為難又有表虛里虛熱除作噦火劫致黃知病有不之因故治有不紊之法於是脈弦脅痛少陽未罷仍主以和渴飲水漿陽明化燥急當瀉熱濕在上以辛散以風勝濕在下以苦泄以淡滲如狂蓄血勢以必攻汗後溺白自宜投補酒客多蘊熱先用清中加之分利後必顧其脾陽女勞有穢濁始以解毒繼以滑竅終當峻補眞隂表虛者實衛裡虛者建中入水火劫以及治逆變證各立方論以為後學津梁至寒濕在裡之治陽明篇中惟見一則不出方論指人以寒濕中求之葢脾本畏木而喜風燥制水而惡寒濕今隂黃一證寒濕相摶譬如卑監之土須暴風日之陽純隂之病療以辛熱無疑方雖不出法已顯然奈丹溪云不必分五疸總是如盦醬相似以為得治黃之扼要殊不知以之治陽黃猶嫌其混以之治隂黃惡乎可哉喻嘉言於隂黃一證竟謂仲景方論亡失恍若無所循從惟羅謙甫具有卓識力辨隂陽遵仲景寒濕之旨出茵陳四逆湯之治塘於隂黃一證究心有年悉用羅氏法而化裁之無不應手取效間有始即寒濕從太陽寒水之化繼因其人陽氣尚未十分衰敗得燥熱藥數帖陽明轉燥金之化而為陽證者即從陽黃例治之七十夏秋疸病濕熱氣蒸外干時令內蘊水穀必以宣通氣分為要失治則為腫脹由黃疸而腫脹者苦辛淡法二金湯主之此揭疸病之由與治疸之法失治之變又因變制方之法也二金湯方苦辛淡法雞內金五錢海金沙五錢厚朴三錢大腹皮三錢豬苓三錢白通草二錢水八杯煮取三杯分三次温服七一諸黃疸小便短者茵陳五苓散主之沈氏目南云此黃疸氣分實證通治之方也胃為水穀之海營衛之源風入胃家氣分風濕相蒸是為陽黃濕熱流於膀胱氣鬱不化則小便不利當用五苓散宣通表裡之邪茵陳開鬱而清濕熱茵陳五苓散五苓散方見前五苓散系苦辛温法今茵陳倍五苓乃苦辛微寒法茵陳末十分五苓散五分共為細末和勻每服三錢日三服金匱方不及備載當於本書研究獨採此方者以其為實證通治之方備外風內濕一則也七二黃疸脈沉中痞噁心便結溺赤病屬三焦里證杏仁石膏湯主之前條兩解表裡此條統治三焦有一縱一橫之義杏仁石膏開上焦薑半開中焦枳實則由中驅下矣山梔通行三焦黃柏直清下焦凡通宣三焦之方皆扼重上焦以上焦為病之始入且為氣化之先雖統宣三焦之方而湯則名杏仁石膏也杏仁石膏湯方苦辛寒法杏仁五錢石膏八錢半夏五錢山梔三錢黃柏三錢枳實汁每次三茶匙沖薑汁每次三茶匙沖水八杯煮取三杯分三次服七三素積勞倦再感濕温誤用發表身面俱黃不飢溺赤連翹赤豆飲煎送保和丸前第七十條由黃而變他病此則由他病而變黃亦遙相對待證系兩感故方用連翹赤豆飲以解其外保和丸以和其中俾濕温勞倦治逆一齊解散矣保和丸苦温而運脾陽行在裡之濕陳皮連翹由中達外其行濕固然矣兼治勞倦者何經云勞者温之葢人身之動作云為皆賴陽氣為之主張積勞傷陽勞倦者困勞而倦也倦者四肢倦怠也脾主四肢脾陽傷則四肢倦而無力也再肺屬金而主氣氣者陽也脾屬土而生金陽氣雖分內外其實特一氣之轉輸耳勞雖自外而來外陽既傷則中陽不能獨運中陽不運是人之賴食濕以生者反為食濕所困脾即困所食濕安能不失牝馬之貞而上承乾健乎古人善治勞者前者有仲景後則有東垣均從此處得手奈之何後世醫者但云勞病輒用補隂非惑于丹溪一家之說哉本論原為外感而設並不及內傷茲特因兩感而略言之連翹赤豆飲方苦辛微寒法連翹二錢山梔一錢通草一錢赤豆二錢花粉一錢香豆豉一錢煎送保和丸三錢保和丸方苦辛温平法山楂神麯茯苓陳皮匐子連翹半夏七四濕甚為熱瘧邪痞結心下舌白口渴煩躁自利初身痛繼則心下亦痛瀉心湯主之此瘧邪結心下氣分之方也瀉心湯方法見前七五瘡家濕瘧忌用發散蒼朮白虎湯加草果主之金匱謂瘡家忌汗發汗則病痙葢以瘡者血脈間病心主血脈血脈必虛而熱然後成瘡既成瘡以後瘡膿又系血液所化汗為心液由血脈而達毛竅再發汗以傷其心液不痙何待故以白虎辛涼重劑清陽明之熱濕由肺衛而出加蒼朮草果温散脾中重滯之寒濕亦由肺衛而出陽明陽土清以石膏知母之辛涼太隂隂土温以蒼朮草果之苦温適合其臟腑之宜矯其一偏之性而已蒼朮白虎湯加草果方辛涼復苦温法即前白虎湯內加蒼朮草果七六背寒胸中痞結瘧來日晏邪漸入隂草果知母湯主之此素積煩勞未病先虛故伏邪不肯解散正陽餒弱邪熱固結是以草果温太隂獨勝之寒知母瀉陽明獨勝之熱厚朴佐草果瀉中焦之濕蘊合薑半而開痞結花粉佐知母而生津退熱脾胃兼病最畏木克烏梅黃芩清熱而和肝瘧來日晏邪欲入隂其所以升之使出者全賴草果俗以烏梅五味等酸斂是知其一莫知其他也酸味秉厥之氣居五味之首與辛味合用開發陽氣最速觀小青龍湯自知草果知母湯方苦辛寒兼酸法草果一錢五分知母二錢半夏三錢厚朴二錢黃芩一錢五分烏梅一錢五分花粉一錢五分薑汁五匙沖水五杯煮取二杯分二次温服按此方即吳又可之達原飲去檳榔加半夏烏梅薑汁治中焦熱結陽陷之證最為合拍吳氏乃以治不兼濕邪之温疫初起其謬甚矣再按前賢制方與集書者選方不過示學者知法度為學者立模範而已未能預測後來之病證其變幻若何其兼證若何其年歲又若何所謂大匠誨人能與人規矩不能使人巧至於奇巧絕倫之處不能傳亦不可傳可遇而不可求可暫而不可常者也學者當心領神會先務識其所以然之故而後增減古方之藥品分量宜重宜輕宜多宜寡自有準的所謂神而明之存乎其人七七瘧傷胃陽氣逆不降熱劫胃液不飢不飽不食不便渴不欲飲味變酸濁加減人參瀉心湯主之此雖陽氣受傷隂汁被劫恰偏於陽傷為多故救陽立胃基之藥四存隂瀉邪熱之藥二喻氏所謂變胃而不受胃變之法也加減人參瀉心湯苦辛温復鹹寒法人參二錢黃連一錢五分枳實一錢乾薑一錢五分生薑二錢牡蠣二錢水五杯煮取二杯分二次温服按大辛大温與大苦大寒合方乃厥隂經之定例葢別臟之與腑皆分而為二或上下或左右不過經絡貫通臆膜相連耳惟肝之與膽合而為一膽即居於肝之內肝動則膽亦動膽動而肝即隨肝宜温膽宜涼仲景烏梅丸瀉心湯立萬世法程矣於小柴胡先露其端此證瘧邪擾胃致命胃氣上逆而亦用此辛温寒苦合法者何葢胃之為腑體陽而用隂本系下降無上升之理其嘔吐噦痞有時上逆升者胃氣所以使胃氣上升者非胃氣也肝與膽也故古人以嘔為肝病今人則以為胃病已耳七八瘧傷胃隂不飢不飽不便潮熱得食則煩熱愈加津液不復者麥冬麻仁湯主之暑濕傷氣瘧邪傷隂故見證如是此條與上條不飢不飽不便相同上條以氣逆味酸不食辨陽傷此條以潮熱得食則煩熱愈加定隂傷也隂傷既定復胃隂者莫若甘寒復酸味者酸甘化隂也兩條胃病皆有不便者何九竅不和皆屬胃病也麥冬麻仁湯方酸甘化隂法麥冬連心五錢火麻仁四錢生白芍四錢何首烏三錢烏梅肉二錢知母二錢水八杯煮取三杯分三次温服七九太隂脾瘧寒起四末不渴多嘔熱聚心胸黃連白芍湯主之煩躁甚者可另服牛黃丸一丸脾主四肢寒起四末而不渴故知其為脾瘧也熱聚心胸而多嘔中土病而肝木來乘故方以兩和肝胃為主此偏於熱甚故清熱之品重而以芍藥收脾隂也黃連白芍湯方苦辛寒法黃連二錢黃芩二錢半夏三錢枳實一錢五分白芍三錢薑汁五匙沖水八杯煮取三杯分三次温服八十太隂脾瘧脈濡寒熱瘧來日遲腹微滿四肢不暖露姜飲主之此偏於太隂虛寒故以甘温補正其退邪之妙全在用露清肅能清邪熱甘潤不傷正隂又得氣化之妙諦露姜飲方甘温復甘涼法人參一錢生薑一錢水兩杯半煮成一杯露一宿重湯温服八一太隂脾瘧脈弦而緩寒戰甚則嘔吐噫氣腹鳴溏泄苦辛寒法不中與也苦辛温法加味露姜飲主之上條純是太隂虛寒此條邪氣更甚脈兼弦則土中有木矣故加温燥泄木退邪加味露姜飲方苦辛温法人參一錢半夏二錢草果一錢生薑二錢廣皮一錢青皮醋炒一錢水二杯半煮成一杯滴荷葉露三匙温服渣再煮一杯服八二中焦瘧寒熱久不止氣虛留邪補中益氣湯主之留邪以氣虛之故自以升陽益氣立法補中益氣湯方炙黃耆一錢五分人參一錢炙甘草一錢白朮炒一錢廣皮五分當歸五分升麻炙三分柴胡炙三分生薑三片大棗去核二枚水五杯煮取二杯渣再煮一杯分温三服八三脈左弦暮熱早涼汗解渴飲少陽瘧偏於熱重者青蒿鱉甲湯主之少陽切近三隂立法以一面領邪外出一面防邪內入為要領小柴胡湯以柴胡領邪以人參大棗甘草護正以柴胡清表熱以黃芩甘草苦甘清裡熱半夏生薑兩和肝胃蠲內飲宣胃陽降胃隂疏肝用生薑大棗調和營衛使表者不爭里者內安清者清補者補升者升降者降平者平故曰和也青蒿鱉甲湯用小柴胡法而小變之𨚫不用小柴胡之藥者小柴胡原為傷寒立方瘧緣於暑濕其受邪之源本自不同故必變通其藥味以同在少陽一經故不能離其法青蒿鱉甲湯以青蒿領邪青蒿較柴胡力軟且芳香逐穢開絡之功則較柴胡有獨勝寒邪傷陽柴胡湯中之人參甘草生薑皆護陽者也暑熱傷隂故改用鱉甲護隂鱉甲乃蠕動之物且能入隂絡搜邪柴胡湯以脅痛乾嘔為飲邪所致故以薑半通陽降隂而清飲邪青蒿鱉甲湯以邪熱傷隂則用知母花粉以清熱邪而止渴丹皮清少陽血分桑葉清少陽絡中氣分宗古法而變古方者以邪之偏寒偏熱不同也此葉氏之讀古書善用古方豈他人之死於句下者所可同日語哉八四少陽瘧如傷寒證者小柴胡湯主之渴甚者去半夏加栝蔞根脈弦遲者小柴胡加乾薑陳皮湯主之少陽瘧如傷寒少陽證乃偏於寒重而熱輕故仍從小柴胡法若內躁渴甚則去半夏之燥加栝蔞根生津止渴脈弦遲則寒更重矣金匱謂脈弦遲者當温之故於小柴胡湯內加乾薑陳皮温中且能由中達外使中陽得伸逐邪外出也青蒿鱉甲湯方苦辛鹹寒法青蒿三錢知母二錢桑葉二錢鱉甲五錢丹皮二錢花粉二錢水五杯煮取二杯瘧來前分二次温服小柴胡湯方苦辛甘温法柴胡三錢黃芩一錢五分半夏二錢人參一錢炙甘草一錢五分生薑三片大棗去核二枚水五杯煮取二杯分二次温服加減如傷寒論中法渴甚者去半夏加栝蔞根三錢小柴胡加乾薑陳皮湯方苦辛温法即於小柴胡湯內加乾薑二錢陳皮二錢水八杯煮取三杯分三次温服八五舌白脘悶寒起四末渴喜熱飲濕蘊之故名曰濕瘧厚朴草果湯主之此熱少濕多之證舌白脘悶皆温為之也寒起四末濕鬱脾陽脾主四肢故寒起於此渴熱也當喜涼飲而反喜熱飲者濕為隂邪瀰漫於中喜熱以開之也故方法以苦辛通降純用温開而不必苦寒也厚朴草果湯方苦辛温法厚朴一錢五分杏仁一錢五分草果一錢半夏二錢茯苓塊三錢廣皮一錢水五杯煮取二杯分二次温服按中焦之瘧脾胃正當其沖偏於熱者胃受之法則偏於救胃偏於濕者脾受之法則偏於救脾胃陽腑也救胃必用甘寒苦寒脾隂臟也救脾必用甘温苦辛兩平者兩救之本論列瘧證寥寥數則略備大綱不能偏載然於此數條反復對勘彼此互印再從上焦篇究來路下焦篇閱歸路其規矩準繩亦可知其大略矣八六濕温內蘊夾雜飲食停滯氣不得運血不得行遂成滯下俗名痢疾古稱重證以其深入臟腑也初起腹痛脹者易治日久不痛並不脹者難治脈小弱者易治脈實大數者難治老年久衰實大小弱並難治脈調和者易治日數十行者易治一二行或有或無者難治面色便色鮮明者易治穢暗者難治噤口痢屬實者尚可治屬虛者難治先滯俗所謂痢疾後利俗謂之泄瀉者易治先利後滯者難治先滯後瘧者易治先瘧後滯者難治本年新受者易治上年伏暑酒客積熱老年陽虛積濕者難治季脅少腹無動氣疝瘕者易治有者難治此痢疾之大綱雖羅列難治易治十數條總不出邪機向外者易治深入臟絡者難治也諺云餓不死的傷寒撐不死的痢疾時人解云凡病傷寒者當禁其食令病者餓則不至與外邪相搏而死也痢疾日下數十行下者既多腸胃空虛必令病者多食則不至腸胃盡空而死也不知此二語乃古之賢醫金針度人處後人不審病情不識句讀以致妄解耳按內經熱病禁食在少愈之際不在受病之初仲景傷寒論中現有食粥𨚫病之條但不可食重濁肥膩耳痢疾暑濕夾飲食內傷邪非一端腸胃均受其殃古人每云淡薄滋味如何可以恣食與邪氣團成一片病久不解耶吾見痢疾不戒口腹而死者不可勝數葢此二語餓字䐜字皆自為一句謂患傷寒之人尚知餓而思食是不死之證其死者醫殺之也葢傷寒暴發之病自外而來若傷衛而未及於營病人知餓病機尚淺醫者助胃氣捍外侮則愈故云不死若不餓則重矣仲景謂風病能食寒病不能食是也痢疾久伏之邪由內下注若臟氣有餘不肯容留邪氣彼此互爭則䐜邪機向外醫者順水推舟則愈故云不死若臟氣已虛純遜邪氣則不䐜而寇深矣八七自利不爽欲作滯下腹中拘急小便短者四苓合芩芍湯主之既自利俗謂泄瀉矣理當快利而又不爽者何葢濕中藏熱氣為濕熱鬱傷而不得暢遂其本性故滯臟腑之中全賴此一氣之轉輸氣既滯矣焉有不欲作滯下之理乎曰欲作作而未遂也拘急不爽之象積滯之情狀也小便短者濕注大腸闌門小腸之末大腸之始不分水膀胱不滲濕也故以四苓散分闌門通膀胱開支河使邪不直注大腸合芩芍法宣氣分清積滯預奪其滯下之路也此乃初起之方久痢隂傷不可分利故方後云久利不在用之按浙人倪涵初作瘧痢三方於痢疾條下先立禁汗禁分利禁大下禁温補之法是誠見世之妄醫者誤汗誤下誤分利誤温補以致沉疴不起痛心疾首而有是作也然一槪禁之未免因噎廢食且其三方亦何能包括痢門諸證是安於小成而不深究大體也瑭勤求古訓靜與心謀以為可汗則汗可下則下可清則清可補則補一視其證之所現而不可先有成見也至於誤之一字醫者時刻留心猶恐思慮不及學術不到豈可謬於見聞而不加察哉四苓合芩芍湯方苦辛寒法蒼朮二錢豬苓二錢茯苓二錢澤瀉二錢白芍二錢黃芩二錢廣皮一錢五分厚朴二錢木香一錢水五杯煮取二杯分二次温服久痢不在用之八八暑濕風寒雜感寒熱迭作表證正盛里證復急腹不和而滯下者活人敗毒散主之此證乃傷水穀之釀濕外受時令之風濕中氣本自不足之人又氣為濕傷內外俱急立方之法以人參為君坐鎮中州為督戰之帥以二活二胡合川芎從半表半裡之際領邪出外喻氏所謂逆流挽舟者此也以枳殼宣中焦之氣茯苓滲中焦之濕以桔梗開肺與大腸之痺甘草和合諸藥乃陷者舉之之法不治痢而治致痢之源痢之初起憎寒壯熱者非此不可也若云統治傷寒温疫痺氣則不可凡病各有所因豈一方之所得而統之也哉此方在風濕門中用處甚多若濕不兼風而兼熱者即不合拍奚況温熱門乎世醫用此方治温病已非一日吾只見其害未見其利也活人敗毒散辛甘温法羌活獨活茯苓川芎枳殼柴胡人參前胡桔梗以上各一兩甘草五錢共為細末每服二錢水一杯生薑三片煎至七分頓服之熱毒沖胃噤口者本方加陳倉米各等分名倉廩散服法如前加一倍噤口屬虛者勿用之八九滯下已成腹脹痛加減芩芍湯主之此滯下初成之實證一以疏利腸間濕熱為主加減芩芍湯方苦辛寒法白芍三錢黃芩二錢黃連一錢五分厚朴二錢木香煨一錢廣皮二錢水八杯煮取三杯分三次温服忌油膩生冷加減法肛墜者加檳榔二錢腹痛甚欲便便後痛減再痛再便者白滯加附子一錢五分酒炒大黃三錢紅滯加肉桂一錢五分酒炒大黃三錢通爽後即止不可頻下如積未淨當減其制紅積加歸尾一錢五分紅花一錢桃仁二錢舌濁脈實有食積者加楂肉一錢五分神麯二錢枳殼一錢五分濕重者目黃舌白不渴加茵陳三錢白通草一錢滑石一錢九十滯下濕熱內蘊中焦痞結神識昏亂瀉心湯主之滯下由於濕熱內蘊以致中痞但以瀉心治痞結之所由來而滯自止矣瀉心湯方法並見前九十一滯下紅白舌色灰黃渴不多飲小溲不利滑石藿香湯主之此暑濕內伏三焦氣機阻窒故不肯見積治積乃以辛淡滲濕宣氣芳香利竅治所以致積之因庶積滯不期愈而自愈矣滑石藿香湯方辛淡合芳香法飛滑石三錢白通草一錢豬苓二錢茯苓皮三錢藿香梗二錢厚朴二錢白蔻仁錢廣皮一錢水五杯煮取二杯分二次服九十二濕温下利脫肛五苓散加寒水石主之此急開支河俾濕去而利自止五苓散加寒水石方辛温淡復寒法即於五苓散內加寒水石三錢如服五苓散法久痢不在用之九十三久痢陽明不闔人參石脂湯主之九竅不和皆屬胃病久痢胃虛虛則寒胃氣下溜故以堵截陽明為法人參石脂湯方辛甘温合澀法即桃花湯之變法也人參三錢赤石脂細末三錢炮姜二錢白粳米炒一合水五杯先煮人參白米炮姜令濃得二杯後調石脂細末和勻分二次服九十四自利腹滿小便清長脈濡而小病在太隂法當温臟勿事通腑加減附子理中湯主之此偏於濕合臟隂無熱之證故以附子理中湯去甘守之人參甘草加通運之茯苓厚朴加減附子理中湯方苦辛温法白朮三錢附子二錢乾薑二錢茯苓三錢厚朴二錢水五杯煮取二杯分二次温服九十五自利不渴者屬太隂甚則噦俗名呃忒沖氣逆急救土敗附子粳米湯主之此條較上條更危上條隂濕與臟隂相合而臟之眞陽未敗此則臟陽結而邪隂與臟隂毫無忌憚故上條猶系通補此則純用守補矣扶陽抑隂之大法如此附子粳米湯方苦辛熱法人參三錢附子二錢炙甘草二錢粳米一合乾薑二錢水五杯煮取二杯渣再煮一杯分三次温服九十六瘧邪熱氣內陷變痢久延時日脾胃氣衰面浮腹膨裡急肛墜中虛伏邪加減小柴胡湯主之瘧邪在經者多較之痢邪在臟腑者淺痢則深於瘧矣內陷云者由淺入深也治之之法不出喻氏逆流挽舟之議葢陷而入者仍提而使之出也故以柴胡由下而上入深出淺合黃芩兩和隂陽之邪以人參合谷芽宣補胃陽丹皮歸芍內護三隂穀芽推氣分之滯山楂推血分之滯穀芽升氣分故推谷滯山楂降血分故推肉滯也加減小柴胡湯苦辛温法柴胡三錢黃芩二錢人參一錢丹皮一錢白芍炒二錢當歸土炒一錢五分穀芽一錢五分山楂炒一錢五分水八杯煮取三杯分三次温服九十七春温內陷下痢最易厥脫加減黃連阿膠湯主之春温內陷其為熱多濕少明矣熱必傷隂故立法以救隂為主救隂之法豈能出育隂堅隂兩法外哉此黃連之堅隂阿膠之育隂所以合而名湯也從黃連者黃芩從阿膠者生地白芍也炙草則統甘苦而並和之此下三條應列下焦以與諸內陷並觀故列於此加減黃連阿膠湯甘寒苦寒合化隂氣法黃連三錢阿膠三錢黃芩二錢炒生地四錢生白芍五錢炙甘草一錢五分水八杯煮取三杯分三次温服九十八氣虛下陷門戶不藏加減補中益氣湯主之此邪少虛多偏於氣分之證故以升補為主加減補中益氣湯甘温法人參二錢黃耆二錢廣皮一錢炙甘草一錢歸身二錢炒白芍三錢防風五分升麻三分水八杯煮取三杯分三次温服九十九內虛下陷熱利下重腹痛脈左小右大加味白頭翁湯主之此內虛濕熱下陷將成滯下之方仲景厥隂篇謂熱利下重者白頭翁湯主之按熱注下焦設不瘥必圊膿血脈右大者邪從上中而來左小者下焦受邪堅結不散之象故以白頭翁無風而搖者稟甲乙之氣透發下陷之邪使之上出又能有風而靜稟庚辛之氣清能除熱燥能除濕濕熱之積滯去而腹痛自止秦皮得水木相生之氣色碧而氣味苦寒所以能清肝熱黃連得少隂水精能清腸澼之熱黃柏得水土之精滲濕而清熱加黃芩白芍者內陷之證由上而中而下且右手脈大上中尚有餘邪故以黃芩清腸胃之熱兼清肌表之熱黃連黃柏但走中下黃芩則走中上葢黃芩手足陽明手太隂藥也白芍去惡血生新血且能調血中之氣也按仲景太陽篇有表證未罷誤下而成協熱下利之證心下痞硬之寒證則用桂枝人參湯脈促之熱證則用葛根黃連黃芩湯與此不同加味白頭翁湯苦寒法白頭翁三錢秦皮二錢黃連二錢黃柏二錢白芍二錢黃芩三錢水八杯煮取三杯分三次服秋燥一燥傷胃隂五汁飲主之玉竹麥門冬湯亦主之五汁飲方法並見前玉竹麥門冬湯甘寒法玉竹三錢麥冬三錢沙參二錢生甘草錢水五杯煮取二杯分二次服土虛者加生扁豆氣虛者加人參一一胃液乾燥外感已淨者牛乳飲之此以津血填津血法也牛乳飲甘寒法牛乳杯重湯燉熟頓服之甚者日再服一二燥證氣血兩燔者玉女煎主之玉女煎方見上焦篇
