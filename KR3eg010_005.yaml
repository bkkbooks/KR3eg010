body:
  text: 卷五解産難解産難題詞天地化生萬物人為至貴四海之大林林總總孰非母産然則母之産子也得天地四時日月水火自然之氣化而亦有難云乎哉曰人為之也産後偶有疾病不能不有賴於醫無如醫者不識病亦不識藥而又相沿故習偽立病名或有成法可守者而不守或無成法可守者而妄生議論或固執古人一偏之論而不知所變通種種遺患不可以更僕數夫以不識之藥處於不識之病有不死之理乎其死也病家不知其所以然死者更不知其所以然而醫者亦復不知其所以然嗚呼冤哉瑭目擊神傷作解産難産後總論産後治法前人頗多非如溫病混入傷寒論中毫無尺度者也奈前人亦不無間有偏見且散見於諸書之中今人讀書不能搜求揀擇以致因陋就簡相習成風茲特指出路頭學者隨其所指而進步焉當不岐於路矣本論不及備録古法之闕略者補之偏勝者論之流俗之壞亂者正之治驗之可者表之産後三大證論一産後驚風之説由來已久方中行先生駁之最詳茲不復議金匱謂新産婦人有三病一者病痙二者病鬱冒三者大便難新産血虛多汗出喜中風故令人病痙亡血復汗故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡隂血虛陽氣獨盛故當汗出隂陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日復發熱者此為胃實大承氣湯主之按此論乃産後大勢之全體也而方則為汗出中風一偏之證而設故沈目南謂仲景本意發明産後氣血雖虛然有實證即當治實不可顧慮其虛反致病劇也産後三大證論二按産後亦有不因中風而本臟自病鬱冒痙厥大便難三大證者蓋血虛則厥陽孤則冒液短則大便難冒者汗者脈多洪大而芤痙者厥者脈則弦數葉氏謂之肝風內動余每用三甲復脈大小定風珠及專翕大生膏而愈方法注論悉載下焦篇淺深次第臨時斟酌産後三大證論三心典云血虛汗出筋脈失養風入而益其徑此筋病也亡隂血虛陽氣遂厥而寒復郁之則頭眩而目瞀此神病也胃藏津液而灌溉諸陽亡津液胃燥則大腸失其潤而大便難此液病也三者不同其為亡血傷津則一故皆為産後所有之病即此推之凡産後血虛諸證可心領而神會矣按以上三大證皆可用三甲復脈大小定風珠專翕膏主之蓋此六方皆能潤筋皆能守神皆能增液故也但有淺深次第之不同耳産後無他病但大便難者可與增液湯方注並見中焦篇溫熱門以上七方産後血虛液短雖微有外感或外感已去大半邪少虛多者便可選用不必俟外感盡淨而後用之也再産後誤用風藥誤用辛溫剛燥致令津液受傷者並可以前七方斟酌救之余制此七方實從金匱原文體會而來用之無不應手而效故敢以告來者産後瘀血論張石頑云産後元氣虧損惡露乘虛上攻眼花頭眩或心下滿悶神昏口噤或痰涎壅盛者急用熱童便主之或血下多而暈或神昏煩亂芎歸湯加人參澤蘭童便兼補而散之此條極須斟酌血下多而暈血虛可知豈有再用芎歸澤蘭辛竄走血中氣分之品以益其虛哉其方全賴人參固之然人參在今日值重難辦方既不善人參又不易得莫若用三甲復脈大小定風珠之為愈也明者悟之又敗血上衝有三或歌舞談笑或怒罵坐臥甚則逾牆上屋此敗血衝心多死用花蕊石散或琥珀黑龍丹如雖悶亂不至癲狂者失笑散加鬱金若飽悶嘔惡腹滿脹痛者此敗血沖胃五積散或平胃加薑桂不應送來復丹嘔逆復脹血化為水者金匱下瘀血湯若面赤嘔逆欲死或喘急者此敗血沖肺人參蘇木甚則加芒硝湯蕩滌之大抵衝心者十難救一沖胃者五死五生沖肺者十全一二又産後口鼻起黑色而鼻衄者是胃氣虛敗而血滯也急用人參蘇木稍遲不救愚按産後原有瘀血上衝等證張氏論之詳矣産後瘀血實證必有腹痛拒按情形如果痛處拒按輕者用生化湯重者用回生丹最妙蓋回生丹以醋煮大黃約入病所而不傷他臟內多飛走有情食血之蟲又有人參護正何瘀不破何正能傷近見産婦腹痛醫者並不問拒按喜按一概以生化湯從事甚至病家亦不延醫每至産後必服生化湯十數帖成隂虛勞病可勝悼哉余見古本達生篇中生化湯方下注云專治産後瘀血腹痛兒枕痛能化瘀生新也方與病對確有所據近日刻本直云治産後諸病甚至有注産下即服者不通已極可惡可恨再達生篇一書大要教人靜鎮待造化之自然妙不可言而所用方藥則未可盡信如達生湯下懷孕九月後服多服尤妙所謂天下本無事庸人自憂之矣豈有不問孕婦之身體脈象一概投藥之理乎假如沉澀之脈服達生湯則可若流利洪滑之脈血中之氣本旺血分溫暖何可再用辛走氣乎必致産後下血過多而成痙厥矣如此等不通之語辨之不勝其辨可為長太息也産後宜補宜瀉論朱丹溪云産後當大補氣血即有雜病從末治之一切病多是血虛皆不可發表張景嶽云産後既有表邪不得不解既有火邪不得不清既有內傷停滯不得不開通消導不可偏執如産後外感風寒頭痛身熱便實中滿脈緊數洪大有力此表邪實病也又火盛者必熱渴躁煩或便結腹脹口鼻舌焦黑酷喜冷飲眼眵尿痛溺赤脈洪滑此內熱實病也又或因産過食致停蓄不散此內傷實病也又或鬱怒動肝胸脅脹痛大便不利脈弦滑此氣逆實病也又或惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難小便利此血逆實證也遇此等實證若用大補是養虎為患誤矣愚按二子之説各有見地不可偏廢亦不可偏聽如丹溪謂産後不可發表仲景先師原有亡血禁汗之條蓋汗之則痙也産後氣血誠虛不可不補然雜證一概置之不問則亦不可張氏駁之誠是但治産後之實證自有妙法妙法為何手揮目送是也手下所治系實證目中心中意中注定是産後識證真對病確一擊而罷治上不犯中治中不犯下目中清楚指下清楚筆下再清楚治産後之能事畢矣如外感自上焦而來固云治上不犯中然藥反不可過輕須用多備少服法中病即已外感已即復其虛所謂無糧之兵貴在速戰若畏産後虛怯用藥過輕延至三四日後反不能勝藥矣余治産後溫暑每用此法如腹痛拒按則化瘀喜按即補絡快如轉丸總要醫者平日用功參悟古書臨證不可有絲毫成見而已産後六氣為病論産後六氣為病除傷寒遵仲景師外孕婦傷寒後人有六合湯法當於前三焦篇中求之斟酌輕重或速去其邪所謂無糧之師貴在速戰者是也或兼護其虛一面扶正一面驅邪大抵初起以速清為要重證亦必用攻余治黃氏溫熱妊娠七月胎已欲動大實大熱目突舌爛乃前醫過於瞻顧所致用大承氣一服熱退胎安今所生子二十一歲矣如果六氣與痙瘛之因暾然心目俗傳産後驚風之説可息矣産後不可用白芍辨朱丹溪謂産後不可用白芍恐伐生生之氣則大謬不然但視其為虛寒虛熱耳若系虛寒雖非産後亦不可用如仲景有桂枝湯去芍藥法小青龍去芍藥法若系虛熱必宜用之收隂後世不善讀書者古人良法不知守此等偏謬處偏牢記在心誤盡大事可發一嘆按白芍花開春末夏初稟厥隂風木之全體得少隂君火之氣化炎上作苦故氣味苦平本經芍藥並無酸字但云苦平無毒酸字後世妄加者也主治邪氣腹痛除血痺破堅積寒熱疝瘕止痛利小便益氣豈伐生生之氣者乎使伐生氣仲景小建中湯補諸虛不足而以之為君乎張隱菴本草崇原中論之最詳産後誤用歸芎亦能致瘛論當歸川芎為産後要藥然惟血寒而滯者為宜若血虛而熱者斷不可用蓋當歸秋分始開花得燥金辛烈之氣香竄異常甚於麻辛不過麻辛無汁而味薄當歸多汁而味厚耳用之得當功力最速用之不當為害亦不淺如亡血液虧孤陽上冒等證而欲望其補血不亦愚哉蓋當歸止能運血裒多益寡急走善竄不能靜守誤服致瘛瘛甚則脫川芎有車輪紋其性更急於當歸蓋物性之偏長於通者必不長於守也世人不改用白芍而恣用當歸川芎何其顛倒哉産後當究奇經論産後虛在八脈孫真人創論於前葉天士暢明於後婦科所當首識者也蓋八脈麗於肝腎如樹木之有本也隂陽交媾胎前産後生生化化全賴乎此古語云醫道通乎仙道者此其大門也下死胎不可拘執論死胎不下不可拘執成方而悉用通法當求其不下之故參之臨時所現之證若何補偏救弊而胎自下也余治一婦死胎不下二日矣診其脈則洪大而芤問其證則大汗不止精神恍惚欲脫余曰此心氣太虛不能固胎不問胎死與否先固心氣用救逆湯加人參煮三杯服一杯而汗斂服二杯而神清氣寧三杯未服而死胎下矣下後補肝腎之隂以配心陽之用而愈若執成方而用平胃朴硝有生理乎催生不可拘執論催生亦不可拘執一轍陽虛者補陽隂損者翕隂血滯者通血余治一婦素日脈遲而有癥瘕寒積厥痛余用通補八脈大劑丸料服半載而成胎産時五日不下是夕方延余診視余視其面青診其脈再至用安邊桂五錢加入溫經補氣之品作三杯服二杯而生矣亦未曾服第三杯也次日診其脈澀腹痛甚拒按仍令其服第三杯又減其制用一帖下癥塊長七八寸寬二三寸其人腹中癥塊本有二枚茲下其一不敢再通矣仍用溫通八脈由漸而愈其他治驗甚多略舉一二以見門徑耳産後當補心氣論産後心虛一證最為吃緊蓋小兒稟父之腎氣母之心氣而成胞宮之脈上繫心包産後心氣十有九虛故産後補心氣亦大扼要再水火各自為用互相為體産後腎液虛則心體亦虛補腎隂以配心陽取坎填離法也余每於産後驚悸脈芤者用加味大定風珠獲效多矣方見溫熱下焦篇即大定風珠加人參龍骨浮小麥茯神者産後一切外感當於本論三焦篇中求之再細參葉案則備矣産後虛寒虛熱分別論治論産後虛熱前則有三甲復脈三方大小定風珠二方專翕膏一方增液湯一方三甲增液原為溫病善後而設定風珠專翕膏則為産後虛損無力服人參而設者也古人謂産後不怕虛寒單怕虛熱蓋溫經之藥多能補虛而補虛之品難以清熱也故本論詳立補隂七法所以補丹溪之未備又立通補奇經丸為下焦虛寒而設又立天根月窟膏為産後及勞傷下焦隂陽兩傷而設也乃從陽補隂從隂補陽互法所謂天根月窟間來往三十六宮都是春也保胎論一每殞胎五六月者責之中焦不能蔭胎宜平日常服小建中湯下焦不足者天根月窟膏蒸動命門真火上蒸脾陽下固八脈真精充足自能固胎矣保胎論二每殞胎必三月者肝虛而熱古人主以桑寄生湯夫寄生臨時保胎多有鞭長莫及之患且方中重用人參合天冬豈盡人而能用者哉莫若平時長服二十四味專翕膏方見下焦篇秋燥門輕者一料即能大生重者兩料滑過三四次者永不墮胎每一料得干丸藥二十斤每日早中晚服三次每次三錢約服一年必須戒房事毋令速速成胎方妙蓋肝熱者成胎甚易虛者又不能保速成速墮速墮速成嘗見一年內二三次墮者不死不休仍未曾育一子也專翕純靜翕攝陽動之太過肝虛熱易成易墮豈非動之太過乎藥用有情者半以補下焦精血之損以洋參數斤代人參九制以去其苦寒之性煉九日以合其純一之體約費不過三四錢人參之價可辦矣愚制二十一味專翕膏原為産後亡血過多虛不肯復痙厥心悸等證而設後加鹿茸桑寄生天冬三味保三月殞胎三四次者獲效多矣故敢以告來者通補奇經丸方甘鹹微辛法鹿茸八兩力不能者以嫩毛角代之紫石英生研極細二兩龜板炙四兩枸杞子四兩當歸炒黑四兩肉蓯蓉六兩小茴香炒黑四兩鹿角膠六兩沙苑蒺黎二兩補骨脂四兩人參力綿者以九制洋參代之人參用二兩洋參用四兩杜仲二兩上為極細末煉蜜為丸小梧子大每服二錢漸加至三錢大便溏者加蓮子芡實牡蠣各四兩以蒺藜洋參熬膏法丸淋帶者加桑螵蛸菟絲子各四兩癥瘕久聚少腹痛者去補骨蒺藜杜仲加肉桂丁香各二兩天根月窟膏方酸苦鹹微辛法隂陽兩補通守兼施復法也鹿茸一斤烏骨雞一對鮑魚二斤鹿角膠一斤雞子黃十六枚海參二斤龜板二斤羊腰子十六枚桑螵蛸一斤烏賊骨一斤茯苓二斤牡蠣二斤洋參三斤菟絲子一斤龍骨二斤蓮子三斤桂元肉一斤熟地四斤沙苑蒺藜二斤白芍二斤芡實二斤歸身一斤小茴香一斤補骨脂二斤拘杞子二斤肉蓯蓉二斤萸肉一斤紫石英一斤生杜仲一斤牛膝一斤萆薢一斤白蜜三斤上三十二味熬如專翕膏法用銅鍋四口以有情歸有情者二無情歸無情者二文火次第煎煉取汁另入一淨鍋內細鍊九晝夜成膏後下膠蜜以方中有粉無汁之茯苓蓮子芡實牡蠣龍骨鹿茸白芍烏賊骨八味為極細末和前膏為丸梧子大每服三錢日三服此方治下焦隂陽兩傷八脈告損急不能復胃氣尚健胃弱者不可與恐不能傳化重濁之藥也無濕熱證者男子遺精滑泄精寒無子腰膝痠痛之屬腎虛者以上數條有濕熱皆不可服也老年體瘦痱中頭暈耳鳴左肢麻痺緩縱不收屬下焦隂陽兩虛者以上諸證有單屬下焦隂虛者宜專翕膏不宜此方婦人産後下虧淋帶癥瘕胞宮虛寒無子數數殞胎或少年生育過多年老腰膝尻胯痠痛者
